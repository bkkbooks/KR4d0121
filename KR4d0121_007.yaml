body:
  text: 灌園集卷七宋吕南公撰議追難皮日休鄙孝議皮子作鄙孝議二篇疾時之剔股濟親及廬於墓者後二百年余讀其文復病皮子之不強於道也造語以難之難曰孝非淺狹之道也大推之彌六合不能限小存之尋常方寸亦足以與之經曰聖人之德何以加於孝乎非莫大之謂耶用天之道分地之利是亦為孝非小存之謂耶蓋聖人之明孝以報也主之以愛恭不礙其迹而特原其心心茍有在矣不必科其所趨也古之為孝者多矣其時勢迹狀艱難平坦未嘗一轍要其所歸惟愛親而已矣奚必聖人開以如此而後行之乎今人能哀其親之疾苦而憂窮無䇿於是剔股以進焉此豈以無益望其親哉用父母之遺體濟父母之危命經雖不言然未為不道也若曰吾身可寶而吾親有命則悠悠世習誰非頑忍耶雖大舜曽參茍其親病苦而有以此告亦必為之矣二人之孝應不繫於避杖而漢景之不肯吮癰亦未足賢也凡人之情便安佚而畏煩苦世衰而教不振者久矣民之無良有生不能養而死不能葬者為人上者取寸心而勸激之猶不足以􅋏動今有人哀思其親不足而從之夙夕於草樹荒涼之間諒非偶然必又禁之是愛親者反得刑也夫剔股甚痛而廬墓甚不便也人情顧近而忽逺安有快於瘡割利於野處而直幸悠悠之旌賞耶萬一為之而上之人不恤則其人亦將遽已耶天下之姦頑冀幸者時甚不少儻令剔股廬墓皆主於邀名免徭則其剔且廬者奚其不紛紛耶若人之心固易原也原其心而不害雖聖人出固亦與之况經語哉惜乎皮子之隘吾名教而欲禁人愛恭於親也論經行論經明行修非相因之事是以古今講授之士雖以傳解顯聞而有不免得罪於名教者也漢以來學經家衆矣顧違行則猶多董仲舒號大儒而下流禳厭類巫覡不自羞至推災異險受禍乃吞聲而絶口劉向燒金幸寵罪延其父鄭康成八十不葬其親孔光張禹曲説卑意亡國以存家戴聖見糾不法范升廢於出妻馬融驕奢王弼躁急賈逵附圖讖以希貴顯祝欽明誣周官以媚祅后劉歆助新蔡雍懷卓譙周致主於輿襯陸質效鷹犬於叔文是皆內不令於身外不祥於世清議之所投竄而學者之人所為共羞而數君則為之夫豈經之所能救哉蓋學之於人所以輔益其器資器資或陋雖力於學亦安能保其措置不涉於小人譬諸染然同是朱藍而入是則各有分繒之入不異黂之入而黂自然賤繒自然貴貴賤豈色之預哉而論治者或稱行修出乎經明吾詎敢信且數君之學皆世用其書不可闕者而行已若此彼其學數君而不就者其有過而可羞誰能計之謂明經人為必無罪焉吾終大笑此論耳夫明天下之善曰德而德之所成有吉凶當天下之務曰才而才之所設有邪正維吉以正故賢人君子業履所以全維凶以邪故數君所以不免於過惡豈數君之願哉主於中者無以勝於外之所行則經亦何能豫奪於其間但聖人之於教不欲引己望人又不欲駭以所不及是故存經以為輔性之本使之上智益明下愚或畏雖然終不必以經為母而行為子為其吉凶邪正之所自成設有不齊故也蓋古之人有經行兼長者矣然而非實相因也負可貴之器質而成德於吉設才於正焉則如薪火之遇膏有加壯而益揚而非俟膏然後為火也語而用此則聖人之意與士之所兼非實相因蓋亦可亮矣嗟乎吾安得若人而見之以孝事君則忠論道之在人莫不資之以得其德成其行然而得之未必能不汨成之未必能由序是故天下之名有生於不足而實之所受有非因於有餘而性命自茲爛漫矣蓋生而知之無待於外之學所以著愛親之心也推吾致愛之道以自盡其力則得名於孝固裕然矣是之謂不汨義無施而不宜則行無入而不出移吾致養之勤以效於職業之官則得名於忠其必然矣是之謂由序經曰以孝事君則忠以敬事長則順豈非謂其不汩而由序者歟蓋天下之治待政而後治而政之所舉待人而後明則出身以仕於當時何可以不蘄其能竭心思此忠所以見貴於人臣之節也夫唯能竭其心思則力之所致不擇事而安之唯其稱而已矣夫既出而安之不擇其事則其未出也必亦不擇地而安矣夫非明其固有而推之不奪於物修之不喪於怠則安能移不欺之志於黽勉之次乎傳所謂求忠臣於孝子之門者以其得於天者能定則立於人者易以成序故也先王之盛時作德有教而天下之人材小以成其小大以成其大於家無或不理於官無或不忠則士之履籍名不足以標之蓋人愛其親各敏其事則孝忠誰與為異及夫王迹下熄禮義之澤稍涸而後名生於不足矣雖然從事而不敢告勞念靡盬而憂父母至於陟岵屺以思望歎稻粱之不藝則人之內性非其外之必能滅可知矣事親之至不異於許國而公義不以廢私恩然也惟其有內之實不勝其汩者之多則誠衰且漓官瘝職曠其上自不能信操藥以進慈父其色焦然而聖人以為羞而陳蕃江革之徒方以獨高取名於世其逺于先王之盛又可知矣夫資道以成其德性命序於日可見之行此理之不易而事之易為者也而何曾王祥孝足於父母而忠不足於舊君則利之喪真亦可戒矣序韋蘇州集序初余未讀韓退之杜子美集時適讀薛許昌鄭守愚詩而嘗讀韓杜者以余為笑謂其讀之卑也方是時余遭笑駴且自恨不識夫讀之入於高者奚獨人能而我頑莫入者何故其後余年二十三始能讀昌黎文又明年亦讀少陵詩矣而間以論於人則莫余明也時又自悲以為余真用愚見外於人哉則又疾焉以求異時更讀孟東野王摩詰張文昌李太白等詩乃至泛讀沈宋以來至于晚唐詩人集本焉人雖漸不笑吾卑然往往怪之以為是無益於進取者何必困眼最後讀松陵唱和編則復見笑於人余於是而灑然損愚之悲亦不復論知昔之笑者未必識其卑而今之笑者未必在於高其怪者亦不足問也夫入宫者自坂而門自門而屏自屏而庭而廡而階然後堂奧可至今不容薛鄭又笑皮陸而特喧然稱韓杜之高此何以異於不涉門庭而已至堂奧者耶諒非鬼物恐不能至也未之至而亟以為言豈能得其所以言乎哉甚矣人之不足尤也所見之不明而務因稱傳之顯晦以定論學之高卑其亦不思而已矣安能笑人熙寧三年豫歸自建康始讀韋蘇州集於舟中愛而歎焉嗟乎蘇州已能使余得怪於人矣庸詎知茍無欲笑者耶然豫既饜聞而駴恨矣書豫所遭於帙方以自憐云送葉著作序熙寧二年夏某歸自淮南將至故園鄰境之鄙人有迎某者言若將為賀而不果言時怪而問焉徒曰儂欲有賀於子然患辭之不勝也子亦行當具見之矣入邑則所見居者安行者肅有知者談無識者謠皆曰天畀特厚於吾人今得賢大夫矣問其所以賢皆叩額曰無傾河之辨與通幽之智亦何以壯我大夫之美維子亦徐而察之得矣奚言之俟於是某往拜大夫焉初瞻公門蕭乎無故時之紛紛而有未嘗見之肅肅已見大夫則淵兮泰然終日不睹其懌愠之容而持評文學引諭開擊如不足者私獨怪大夫之臨冗劇而不失雍容則以為其緩於聽斷也又竊視庭廡則將事者不喧被罪者色泰縲有塵械有菌鞭梃稀鳴而勃詬已平吏胥不勞而契牒已理出而觀於鄉則塗相謝而室相慶者又多多也則又問焉曰爾之謝且慶也昔者莫之為而今則為之其何以乎皆曰吾負大夫大夫以仁恕禮義治我而我曹不令尚或爭焉今吾慚是以謝之其慶者亦曰信吾父祖之言如大夫之賢非特未之見實亦罕聞今吾得身見之奈何不慶於是某亦歎嗟纍旬不能休是以讀循良吏傳十餘年而不意親遇於今日又不知其所以致此何修而吾人又何幸得此也是年之冬復以事走京師比明年之秋乃歸至則又拜大夫焉凡前年之肅者安者謠而叩額者不喧而色泰者平者理者與夫塗相謝而室相慶者皆仍昔也獨觀談者有蹙容時又勤而問焉乃曰天雖畀吾人甚厚而特不以久今吾大夫被敕書當移官於蜀去有日矣吾悲焉顧末如之何是以起憂某曰何為其然蓋亦理遣而已矣天之生賢也理不專為爾一方閩吳燕蜀中土之人其誰不願得如父母者為之長然願而得者幾何今大夫之賢而既知為難有且以為雖吾父祖皆未之見而既得之夫豈不幸固欲戾天理以專所願乎大夫之賢其美利在而身其無窮之傳惠而子孫孰使而子孫所逢皆得賢如今大夫者耶今之大夫既在而所得蓋已無憾即無有焉則是而身之幸已上越父祖而下過子孫矣獨何為窘窘於所末如之何於是憂者稍平因曰子之言然其為我敘而次之以慰我難忘之思亦書以告大夫使知吾人之樂愛焉可也某曰慰汝而次之言是已若以告者毋乃非大夫之意乎皆曰是何傷乎仲尼之不見敬於鄉鄰也千百世之後人莫不譏魯人之不令神龍丹鳯之為祥慶茍有口者莫不頌而美之未聞龍恥而鳯恚也今吾人樂愛大夫而得怒焉是誦甘棠之詩者可褫而讀循良傳者皆可撻矣大夫必不然吾子其文之某曰然則吾文不足奈何皆曰不足則為之何害於有意以不足而遂不為是吾子與鄰境鄙人無以異矣某不敢復辭即具書之并贊大夫之皂徒云傅巖字夢弼序學聖賢者學其內而已矣若夫軒裳祿位何足慕之有其內而外者至焉審之義而宜觀之時而合君子於是受之有其內而外者不至君子蓋不恤也顔淵欲為舜豈主於百官牛羊公明儀欲為文王豈主於三分天下有其二孟子學孔子豈主於魯司冦揚子比孟子豈主於齊卿然則君子之慕古聖賢名實可知矣吾鄉學者傅巖其友字之為夢弼蓋勉以輔佐之器業云爾豈可以空疏無有者為哉勉之逺大其內也字之固當而或人譏其虛喝以為傅吕之事非布衣書生取次所能享嗚呼此論外而遺其內慕其德而折巾角之流也何足傾聽巖與余待試於浚都亦同館舍嘗以其字之疑道焉余為之説如此巖因請為之序是嵗熙寧三年送傅亨父序自史館公在中書搜能而餌善天下之士尺寸之長細大各伸方患無有不患莫知方患未知不患莫用譬如貴豪張宴其筵十里有豆如山有尊如澤有座如陳味無品而不薦樂無工而不陳當是時賓之上者以賢其未必賢者以親其次以附以幸以役大之有笑歌獻酬以備福祿小之有筐篚幣帛以給沾丐不在是者身以為歉人亦以為宜棄焉嗚呼熙寧之盛蓋如此遇豈易哉而比嵗之冬南城傅亨父始摩髯欠伸有必出之意自言坐書邊四十年窮鉛竭丹吟口渴而捉指疼八十吾親而三十吾子尚無所遇正獨困於雕蟲之有司耳若今科衆路多人各以所負致其聞達我則不能強行非聖人之訓學者之事朋舊聞而壯且是之吕南公曰速乎夫子之運踵也吾聞士之學道不貴乎以己忘物亦不使物忘己己忘物則不仁物忘己則非有德夫見忘於物者世之謂無能之人而夫子寧固處之雖彼忘物者尚未果賢或者本無能而借高以自幸爾從者審非不仁又實有德而直樂於退藏吾又有説必令志局異此則人俟時乎時俟人耶自古傑人俊士所以功名成遂蓋棺無餘恨者亦各會時而已矣以夫子之所有解括而露懷上可以聞于相君旁可以請援於故知之人得無遇歟夫遇有小大我所不能知所可知者豆尊既展聲味既給不在乎賓之上亦宜在於其次不在於獻酬亦必在於沾丐為夫子計惟亟進勿緩毋使身出乎投轄反關之後而銜歉棄之悲耳於是聞而壯之者皆曰信然盍相與賦詩以贊其行某既為之賦又序之以俟其所遇時則四年十一月之丙申思亭詩序余欲序思亭詩執筆而歎已歎而嘉蓋孝思之為德其取名甚美而致實甚不難然世之人率難于不難以自棄于馬牛既自棄矣又回首于美名銘乎其心其最無恥者則斐偽熏馳盜取經傳愛敬其親之辭開屋而榜之幸自標飾夫若人者只欲勝馬牛于毫髮之差其安可得蓋馬牛去離衣冠又未嘗盜經傳之辭以自欺且用欺人則雖不足于孝思不猶可恕哉嗚呼余飽於恕久若于所嘉則未之頻煩今而值於江君是故先之以歎頃嘗聞之江君喪父不但依于禮而又深長其情于祭葬凡以自盡而哀摧念慕日月愈久而愈憂未至也因葬已而為屋于隧前與其仲季宵晝于其間以致其思感涕之餘講讀先生之遺文曰吾親昔以是飭我者也不敢忘治其田桑以足衣食之奉曰吾親昔以是為之家者也不敢隳命其子孫誘之戒之毋不令曰善慶有先莫之思而紹者為取誅蓋如是者至于除喪矣而屋未嘗命名焚衰之明年邂逅余而及之適言親之于子也愛無窮則子之思親亦豈有窮為之祥禫之期節者禮之名文云爾感德思報而罔極者人子之情烏可已哉吾于學行思率吾親之訓以成吾身於四時肸蠁想繹吾親之聲容以永吾懷于展墓而倣徨則思夫親之所以位此而昔同仲季之所以留此者何緣乎歸而述吾所思以鐫勉于所臨也故初題隧前之屋為之思亭蓋所以深長愛敬之情若夫美名吾安取也余謂江君其勿固于謙天下豈有決于致實而疑于受名君之所致無所避於嘉矣亟歸大其榜足以識君之意并録余之所歎于壁以懲艾夫馬牛之徒若嘗為詩者過焉為謝之曰毋茍以章句媚人而不審諸己可也江君字子儀與其弟子發皆以進士薦于鄉而子發先及第解汀州司法執喪于亭熙寧六年正月序豫亭詩序潁川陳君益既一新其居宅有亭在堂之左而以豫題其楹他日為余説其名豫之意曰豫也者人情以之為悅而莫不同喜者也然知喜而不明所以為悅豫之道則亦有時而不得其所喜焉而或者因以豫為不可常其亦過矣蓋夫萬物之兆象也時各有所用有所用者所以輔資于人情乃今不此之察則以我而赴物其為流連荒亡孰禦哉故吾之所以居豫者不以物用先我者也吾如主物如輔如是可矣吾韝有禽吾尊有酒吾絲竹有音吾架有書吾壁有琴吾局有碁吾園有花木吾池有魚可繫可醉可聽可讀可彈可奕可玩可釣無非樂事顧吾不以在意則彼未有能起我者吾固不以物象而先我也是所命亭為豫之意又曰人之不得所以居豫之道也因其莫思而已使嘗思之庸有不察吾亭之內有齋吾于是而燕休且以默題之蓋默者吾之所以思也如之何余聽君益之言而不能易也亦曰嗟乎允矣歌吟斐亹之士新與留辭詠于壁間余為敘次其題楹之説如上陳君益宅觀假山序上豫亭北顧其牆廡之間小山叢然面南如畫幛者即而觀之工之塑繪所就也而幽致乃不少凡其為山枝者為峯頓者為阜灑者為岩崖捍者為岡嶺攤之成阪衍之成隰竇之成洞陷之成谷有鳥道有夷路有裊繚之徑有邐迤之坡而交聱蟠勃變狀總總又引自牆後穴而釃之流乎絶壁之前垂為瀑注為潭平為溪析為渠遏為陂如是者又多態其間列茂林突枯楂渚沙磯石層雜附見乃至人物諸類皆在焉其正中峯特險而長其頂冢之隂亂石駢羅若可坐憩處有兩書生趨之視其緣陟危然乎哉而猶未至也其路由東洞出者稍近寬原有二遊僧出焉軒軒有得色北下而西一徑更深有道士跨驢背之而南一樵翁沾沾望驢後以行其東洲橋堰之交則又有三牧兒伴二牛息焉夫工之所就亦勞矣余既徘徊觀之已乃興感于中夫山林藪澤之深懿為天所覆皆有之然人常徒愛之以言而身不肯安之此文雅之士每借耕漁清曠為説而要知其所願不在焉者皆是矣况下此者乎哉今道士僧俱背而去之而書生則方抵巘未止豈非道士僧朴直不知矯飾其情迹而書生善詐乃區區蘄出峻絶之上以成其好高之妄歟道士僧皆背去山林而僧徒步道士乘豈僧貧于道士而然歟世言僧之徒工以罪福脅誘人得皆常厚而道士之説不及此故不為流俗所恤今見于此乃不然其亦有偶然者歟今又豈塑家病世故之非平而作此以譏之歟言之座客皆大笑君益曰是皆不足議不若平之以酒于是取酒而散焉座客前循州司戶吳充道新青州察推陳才甫陳留蔡彥臣南陽鄧信臣才甫之弟純隴西李孝孺并余合八人是時熙寧癸丑之仲秋送傅濟道赴漳浦序傅濟道為漳浦尉初之官過其友吕某焉某念別方逺不當無言以贈也摻其祛而告之辭曰嘗論士之所以賢在全乎其美不全其美非所以賢也全美之事有二曰能文曰飲酒蓋博學而力行者士之正功而無得於文酒則齷齪不奇短缺而卑譬如為車高箱暢軸輈軫轂輻莫不材集四驪六轡襄而總之其於厚載致逺何陸之不可行然一不置轄則雖有善御無以運動一不載脂則雖運不流故文之於士猶轄而酒猶脂使遂無之何害其為致用之名顧聚而莫運運而莫流終亦不奇而已大丈夫智識出沒六合而下筆如鳥跂黐才幹振攝萬務而對杯盞愁眉則齷齪而卑夫酒之於人豈但足以銷憂蓋所以平和其心而壯直其氣心平則德厚氣直則行正是寧小補而世俗之人因屈原一語獨醒便謂實爾此何嘗知原之意吳時韋昭以好學顯惟不能飲酒故朝宴則竊以水漿代之終用此失吳主意以至滅身夫齷齪固可憐而况滅身乎士不願賢則已如或願之必致思於此矣且文酒人在襁褓時豈其能之蓋亦長而得於習耳視今濟道之全美唯酒宜進之耳頃吾初識濟道時云我值糟亦神昏吾嘗為之歎恨以為雖有文辭異於學究而不識醉鄉終亦不全而已及前年同舍於汴陽則濟道已能竭三盞既別一年重見則又進至六七矣蓋造物者之於人業賦以賢則詎容不備唯其所習有至不至則各止其止矣夫世豈有不可能之事哉濟道行矣吾聞漳浦瘴癘之邑唯酒為能禦其毒於濟道之習尤利也異時歸來名兼飲户則吾當大喜賀拜矣濟道勉之俗人護短必稱禹惡旨酒而好善言又曰市道衆人率能劇飲何足領略此言亦誤發何則禹之所以聖者豈在於惡酒而已使其無德與功則其異於市道衆人何也彼今稱禹之人未必能好善言又無功德而特效其惡酒其謬何翅千里此言願濟道勿聽熙寧五年三月甲午序測幽記序灌園先生曰無物不有然後為天地無事不有然後為世道通乎此而盡之則所謂非常之故不慮之變皆適然耳孰復諄諄然問觸觸然驚哉夫有無之相因其順矣雖或戾逆猶未始違乎理是故天地之所以生隂陽之所以行日月之所以明鬼神之所以靈山川之所以凝人物之所以成皆在乎不得不然之故而未足以言其妙彼或謂之難知者未之思而已矣蓋理之所出數之所必前既有是後則未睹者特未睹耳今而有是昔或無傳者特偶無耳精也氣也非委何因命也性也非復何真形也品也非廣何伸廣之又廣未離乎息復之又復未離乎極委之以無所委而不失其則此非理之大致歟數因乎此者也明以是入幽以是立出無不藏入無不陽以化合機或戢或張其亦何常何異之有悲夫世之人特以耳目廢其心而已矣古之得道者之于物也智有所原有所不原言有所宣有所不宣書有所載有所不載其所以不為者非真不可也以為姑不必爾三才五行歙協推摩未有一日相無之道則事物之變故舉足而值掀睫而際何必過而問為哉而有問焉是則寡見淺聞足以窒其靈府而開其愚徑也余少之時讀書不出六經聽覽不離閭井以為天下之理具諸此矣窘窘乎追逐衆儒之步武而稱誦不語怪神之説以拒乎諔詭之術如是者固久天誘吾使有超脫之幸是以泛觀春秋以來諸子百家之文章太史公至于國朝之史録乃至山經地志野載私紀無所棄擲故識其所為非常者多矣助之以凍餒漂浮屢遊乎數千里之他邦而親見審問合于前識又多矣于是深思極索遂見理數之始終知古人之于此言不言各有意也時又浩歎乎夏蟲井蛙不幸而不知氷海也讀阮瞻之事見其弊于慚懼而重悲之熙寧乙卯年始記于書所記隨所憶故不復品列率二十四事為一篇第而積之沒吾齒而後止命之曰測幽言讀而能思者幽可測也自古記異之筆不少余雖不敢有記然無害于理數之所存而遂記焉趣異于蟲蛙而已矣若夫守經束教余雖不爾其憂無人乎哉
