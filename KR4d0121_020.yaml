body:
  text: 灌園集巻二十宋吕南公撰墓誌銘故袁州李君墓誌銘君諱冕字某處士彦珪之孫建寧軍節度推官修永之子弱冠與弟茂元省其舅晏臨淄公於京師至數月請歸臨淄公曰遲之比上郊天吾奏爾一官去君辭曰幸在舉子後足以俟時茂元少失學問舅必恩之於義為允臨淄公歎息從之明年詔補茂元太廟齋郎而君就養於家蓋數年乃調建州崇安縣主簿縣民謝叟無子養他姓兒兒長大能相與營圗起什一販為蓄户晩年婢生一兒叟垂死戒曰吾家故窘今所有皆汝兄佐吾所致汝後勿忘少分財而優汝兄可也叟死婢兒少壯乃詣官乞還兄姓縣令欲判可君掣令肘詰婢兒曰利貨貲至此乎汝憸人也不服更訴於州州議哄然疑之是時莆田蔡君謨為轉運使聞議徑之崇安君迎辯曰法縁人情今與人同苦淡致富足而終奪其食使數十口遽凍餒何以處情願公論其弊君謨曰㣲主簿吾幾誤任法即具奏論朝廷是之遂為續勅建於閩為劇州崇安於建為劇縣吏乘劇相要為姦無已君在持之使手不敢展臺􅊾君受縣倉吏無所得進曰官為察吏不敢私謀然嵗結簿上州須賕吏數萬事乃訖願官恤此而已君曰簿我主之汝何預既而封簿上送州吏果駁拒且詰縣何不遣倉吏來移促之吏涕泣而往君未有以奪也無幾何民有訟倉吏借馬不還者君喜曰是可因以除害立呼倉吏疏之即疏曰貧無賕故買所借馬以紓急某吏受若干某吏受若干疏本末盡備君為翻三狀一上轉運一上提刑一上州州將怒曰膏粱兒敢爾今破之如滅蟣耳旦日君謨檄州曰盡縛受賕吏送崇安委主簿治獄於是郡諸司為一空吏到君痛鞫之盡服辭上臺君謨命君括獄來决有役有流建人大震君出市人聚語指之曰此崇安李主簿也去為舒州司禮叅軍懷寧令上囚稱一時獲刼盜十三人君時在告疑徒中有自首及為從宜减者以為必縣貪賞典而匿其辭乃請覆訊果當活三人是時臨川王介甫為州通判私於君曰果爾而令當抵罪奈何君曰活囚而䧟令非我志也聽懷寧盡易獄辭可矣介甫喜曰明且仁者也舒大饑日開常平倉飢民競糴相軋有老嫗踣死衆躪其屍脱面皮州聞之怒議劾倉官不能約勒君請見曰按皮生而脱則既死必攣縮今嫗皮柔伸引覆無缺然則嫗飢死而屍仆衆不知其見躪非躪而死之也介甫曰司理説是州怒乃息司理院月平物價君持絹直髙於市平同寮患之㑹慶朔介甫對衆詰君君曰有之今嵗㓙飢民為盜無數誠知市賣一絹錢七百然必髙之為千二百者以計贜難滿匹可以緩窮人之死故也不然三絹殺一人矣吾寮有禄俸欲得絹則凖市平取之誰敢厚求於官今何用患吾平乎介甫曰吾慮不及此去為興國軍通山縣令縣去君逺官嵗賦蠶鹽遣吏受於軍而主給之民常受虚數而吏刻其實十七人君為請於臺得縣置倉而官自領之民乃不苦去丁父憂終制為袁州軍事推官州將有不謹事為猾吏所持噤不敢整而吏益横州將召君屏左右言之泣下君曰此易劘者數日擿其姦而竄之吏有年勞應被優奬而將死者臨終乞以子自承州通判欲與他吏君爭曰優奬所以待年勞吏勤知為其家而已今不幸死而子不得承然則吏無事於勤矣彼他吏獨無年勞可俟乎於是從君議萍鄉令不職轉運使以君易之君至縣囚數百旬日平决之獄遂空萍鄉獄未嘗空也轉運使諷君發前令罪以逞君輙謝以不能而為救解之曰不敏人可恕前令得善解數月君疾病以治平元年十一月某甲子不禄某年月日歸葬於先塋夀四十君為人愷悌端厚内外無間言至所宜辯則亢激無避已所允蹈不以顧慕少移也在舒時王介甫躬尚儉素僚佐皆強傚之君獨鮮明被服如常介甫滋重之曰不驕偽以失己所以為賢也自君謨介甫南都蔡子直諸公皆世知名巨人而各薦君其餘使將愛君蓋又多而臨淄兄弟未嘗以君託大吏或問之公曰是甥有才當自顯何賴吾言言之乃所以慁甥君之見待於公如此自為布衣時師儒有所乏輙力濟之寒而解衣飢而分食歿齒不怠至今士大夫及識君者言至必悼惜再三君娶南城危氏有一子曰孚為進士四女當君棄世時皆未許嫁蓋葬後十有若干年孚用相地師説改葬君於某所之原而南公為之序誌其畧亦銘之曰異哉邱乎有穿斯藏而不宅乎愚萬億之年歎其賢於此書臨川王君墓誌銘臨川處士王君棄世即小祥其孤擇㨿持援擬以狀來言將葬先人得吉地於郡南五十里大科山之陽占以明年某月某甲子封維誌有石謁子文刻之余與擇等游蓋久故不辭而為之序次初違命底亡大兵嵗臨江生人困於賦調則㪚徙以蘄脱禍於是時閩平已久撫建昌間無邊檄警擾故徙者依焉處士之鼻祖實始挈家以來臨川諱某諱某諱某者次鼻祖以至處士者也好善力田為邑良門處士諱曠字若谷為人端潔靜恭事父兄盡力與人交以信常年饑减榖價以予民不為財戸挽掣治藥劑赴窮疾不幸無以瘞則具棺掩之里之人以是銜恩特敬儒生教子學必附豪傑士資遣之惟恐後制誥王舍人辭召卧金陵天台王令棄官從之游日講文義士子歸赴如市處士命㨿往焉既而舍人入翰林遂預大政更新學校持一道德同風俗之論學者響集京師以數千㨿在其中淬濯磋磨器業大成亟欲歸養處士諭止之故捐館之日㨿不及見處士少壯時讀經傳諸子能汎通其意而嗜釋老説深篤其志以徼福於親而已前卒之五旬自呼匠治棺衾家人異之諗曰勞佚迭更何怪焉及病且殆猶盥櫛應賔戚其莊蓋如此元豐元年十月乙邜處士實啟手足距其始生為春秋五十二妻周氏有子五人㨿嘗試禮部矣擇持皆吉士善治生援擬尚㓜女一人嫁進士陳習銘曰尊德樂義非賢莫安事親從兄致實其難咨若人兮惇慕弗諼畏日不足詎知盡年五子六孫唯善之勤沄沄其術汩汩其源曷予尚之銘坎其文亡友黄顯翁墓誌銘顯翁姓黄諱塏余少時與同里學其父諱某余銘其墓以為賢丈人者也顯翁㓜頴俊日納千言俄遽記憶自作篇詠靈指諷不俟聲律師教曉稍長竊出隨諸兄治舉業山舍宗黨愛異之既冠遊閩吳庠序程課輒登上列二十五被鄉貢罷歸愈刻激期得仕一再不合年四十餘矣於是放懷除當世慕望朋遊為咄嗟而顯翁不戚戚也曰士不見於懵繆則又何求熈寧十年正月己巳出三十里訪故人辛未還過從祖姑留飲大醉卧子夜撫床呼同館笑語良久起出戶便旋復就枕鼻不鳴其僮以掌㣲伺之呌曰氣絶矣旦日􅐝歸遂成䘮明年改元元豐壬辰葬父墓面五百歩所曰溪白北原其息子充來請銘曰善先人能叙其平生捨君宜誰歸實許之嗚呼顯翁不幸止爾孰為使之者夫士誠有才無適而不利用顧其所極有大小良惡則亦惟其時焉耳必當夏后商周之盛其有不盡之歎不用之恨矣乎地居一同而長正宰師待焉其藴每厚則其任每上夫何歎恨之有黄氏籍南城餘百載其世溢十其宗從雜六七百室其名頴俊初維顯翁然亦止此爾是則士生漢魏以後雖誠有才猶與凢民無必異之勢也嗚呼顯翁孰使不幸遷固至昫史述千巻南城人列於傳兩武夫而已周廸危全諷是也名德公卿亡矣賢豪固不出下國乎遭遇無期運乎一何寥落之窮哉余不得而論之徒遺顯翁以銘其辭曰曷不信古慮時我棄相邀脆腐曰尚德志謂子則戾有既似之謂出且恊有曽莫施舒餘斯岡東近先塜唅無珠矣安此奚恐黄士衡墓誌銘士衡諱均南城人為鄉盛宗曽祖惠傳祖光震父質皆好善不仕士衡少篤學師友所稱為人沈毅恭慤嶷然士君子器也熙寧七年客逰淮湖五月某甲子疾病卒於廣州黄陂縣之逆旅於是夀四十六其子無逸以柩歸元豐元年三月某甲子葬於某鄉某里之桃原士衡娶胡氏有四子無逸其長也通經術富辭才能使其家有聞宜在乎此次曰某某某二女嫁饒某銘曰父母好善子未必才亦既才矣志或不諧猗咨士衡嗣慶方來特不及仕詎已焉哉堂堂襟衷委翳幽埃於穿列銘維用告哀傅野墓誌銘君傅氏諱野字亨甫㓜有節操屹然慕古豪傑風逮以進士試數不中而人推其才學李覯初有鄉曲名聲君抵以書曰名不可妄得也當共賦短長耳覯異而交焉其後覯黜於祕閣歸君與陳次公以師長事之旴人由此知有先生弟子君辭髙古於詩最竒崛常執韓栁李杜編語人曰必知此乃當下筆嘗客舒州與建人黄莘余翼文酒相酬士民傳美以為未有是時之人王韶年少學官在舒投記願交君納之别十許年韶為建昌司理掾訪君沙溪山延置門下且薦於守使㑹諸生黄察等許君髙才滯淹守使以聞有旨賜君粟帛以充軍學教授然君不習佞與俗子殊品致益顦顇無聊久之韶受命治熈河功有緒信呼君君往依之奏為熈學教授督役築香子城城成例賞君得試將作監主簿明年召還朝論事殿中方已即言傅野有文章學術而老未仕願補東南一官以便養母上可之君調明州定海縣尉未幾熙河市易務檄浙使者責君償貸務錢絹七百貫匹其實華隂人有與君同姓名者貸之而務官前後不參詳謬以責君君不服浙使者上言明州去熈河萬里移檄來徃甚煩請及傅野官滿録送理對有旨即遣不必官滿於是時君尉定海既四年而無代者後於華隂已得其人矣使者以朝㫖不敢違君遂至熈河而無所辨君有子久於熈河無鄉思君以為感及是日促之歸子辭以營什一息未竟君為少留而經畧使用君攝領糧餉廹賊界中寒氣下利卧十旬死於河州學舍元豐五年五月戊申也七年君孫蔡裹君骨歸以某月某日𦵏於某所君為人軒豁善醉不修恩讎方窮悴時俗子多所侮慢而君終身不忿憾其於孝弟尤力雖侮慢於君者不敢揜也許抗為人言觀傅野負米奉親則吾徒有禄為可愧君在軍學也詔去試祕閣而小人媢忌君䝉慰薦相與造飛語謗君於守守䟽君於是時君窮為平生第一然百計不使老母愁辛身與妻兒糴官倉腐米鬻菜粥以度日而母獨常魚肉白飯不悟其貧云其族沙溪數百口有以事抵城邑君必飲食之久而不怠其財之有無與兄弟無彼我雖侮慢於君者不敢不歎息也君所為文章號通藁二十四巻鄧潤甫嘗序之君既卒而兄子黙復集後書雜益之總三十巻去通藁之號藏於家君父諱垂範李覯銘其墓者也母鄧妻陳各有婦德君生丁巳死壬戌首尾六十六年銘曰力為古文章兮與衆殊途裕吾江海兮人則潢汚舉國醉兮醒者非夫千金技就兮焉屠猗嗟君兮偉儒而卒於﨑嶇文之故乎抑命歟何居吁陳子純墓誌銘職方員外郎南城陳㣲之之嫡子約字子純天姿聰明竒畧人也自職方始仕為州縣吏四方以至為郎領郡未嘗恤其私一以付子純而其經理調胹委曲盡善其始年貲一其季年百千之而未艾其為無所欲則已欲無不致致無不具具無不寧蓋常視成於文酒笑謔之間而他人則僇力殘身莫之及者江嶺閩吳之人語為家子純必在所稱南城則樵漁牧豎阬谷細甿無不知誦子純姓字余為學時聆聽所熟云爾比少長從羈旅游而子純既不幸早世矣識其子妷而友之嵗月攷詰子純所以為家其規畫綱條暢逹剛強去四五十許年而不紊或小易之輒失其宜竊嘗嘆息以為古之人得一國而輔之言入計行四境歙張畢在股掌之内世以謀臣命之矣然目一瞑而法度所陳能使後人毋我變者幾何人哉以子純志之所營才之所集卓越如此誠令得國而謀之其有不給乎哉夫時之所遭則有不同而謂世或無士者幪幕之論也子純之死以嘉祐七年四月乙酉其夀四十二是時職方為循州訃至職方曰吾亡二子矣安能復仕遂告老歸𦵏子純於可封鄉之王家原後二十五年墓宅師訂其地為不吉於是子純之長子京亦已死矣次子亢改卜得可封之鼔樓岡遷而窆焉是嵗乙丒元豐八年七月乙未也余固嘗推美子純之設施惜其止於一家矣而亢友於余良厚故為之銘曰哿矣謀國而莫吾用于其為家如屋斯棟我運我智我成我才則兢則完由彼乎哉嗚呼止矣其夀維嗇其誰知之列此幽刻傅夫人墓誌銘余妻之母危危母傅氏兩家皆業儒術子姪以俊秀游友其鄉是故世有姻好維南城之危起家始拱辰實淳化三年進士終屯田貟外郎贈光禄卿傅氏始容慶厯六年丙科以鄱陽尉謝病歸遂不出然兩家之仕者自是不絶夫人容之娣而拱辰之第三男婦也年二十而歸歸三十六年而嫠嫠二十六年而卒維光禄為人崛傑髙亢其配長安縣君丁亦以肅飭為閨門常而夫人在娣姒間見謂無違不激不委唯正之師唯是之從其及既嫠則壹素以嚴刻刻勤辛惡衣菲食以致給足治絲枲紉縫諸兒能誦書使坐前旁持久與俱不夜分不言寐子㓜則子孫㓜則孫無日不然聞人為善喜見於顔語如其色賔客過家供具饌飲頻數不厭嫁子娶婦問其世於禮義何如而不及貧富也有二男一女長之武嘉祐二年禮部試不中死汴京次之邰今為惠州河源縣主簿女適袁州軍事推官豐城李冕凡夫人之女孫外女孫皆以予名士為愜其三男孫曰淳力行好古曰滂早死曰涇亦試禮部矣嗟乎夫人好德樂善懇至如此使其所以值待每若盛古之時則其志意之得可勝道哉熈寧十年九月某日夫人卒夀八十二明年十一月某日𦵏於富陽里之簀原𦵏八年矣之邰始於銘取余文余辭而不許則為之其文曰處則靜女嫁而正婦曰既有子欝為嚴母假哉德矣維具之為賢維任之攸艱而夫人舉焉弗序弗傳疇以慰其然丁氏墓誌銘夫人為丁氏女十有七年而後嫁為黄氏婦二十有八年而下世熈寧十年十二月癸未小斂明年二月庚申封其生也譽者傾鄉其病也問者色憂其死也吊者聲哀丁黄俱富族而夫人不䧟於侈泰之非娣姒數十百而衆無間於賢善之名謂文王不作而汝墳江汜之風不可髣髴者豈非迂儒之論哉諱文惠父也希敀夫也淵子也陳識丁茢聶扆皆婿也禮教鄉之龍穴𦵏地也淵好進士學號勤敏其從予游也久故於是來請銘為之文曰室家之宜兮夀考之虧兮世道之悲兮陳處士妻葉氏墓誌銘陳處士之夫人葉氏世居建安曽王父某父某皆故不仕夫人為女慧為婦順為母慈以明内外稱之歸陳氏經事三姑後姑處之每過前姑凢嵗時祭祀滌器調饌必躬親未嘗以委奴役其於族與賔如其祭其視夫之兄弟息如己出處士早世夫人遵其志教飭子孫延儒師能盡情誠鄉閭有急輙憫濟之飢給以食危援以力蓋其常夫人母春秋髙所以存奉踵武相望母為人言吾女敬養我賢於男云其至行如此元豐元年夏六月某甲子夫人卒於是夀七十餘一凢生七男四女男某某舉進士女嫁張孝傑林景則張倞雷殊某月某甲子葬夫人祔處士君之塋實丁阮山銘曰孰不有歸我圗必宜無非無儀允蹈成之雝雝夫人正順之師載揚其芬刻以銘詩湯處士游夫人墓誌銘元豐五年冬十一月壬辰南豐處士湯君䘮其内游夫人不即葬明年春二月己未飯僧於見客堂處士拜佛稽首百下亦卒是冬十月癸酉其孤舉二䘮窆於龍池鄉東户里之佛塔窠同位而異穴先時以牛馬走來請曰維亡父生平好善足未嘗歴州縣庭口未嘗揚人過惡事親期適而已不敢壯有餘而老不足接人趨恭而已不敢論賢而詆不肖夫然故州閭以廸吉歸之而逺近賔客日至維亡母實能佐佑其治非不生財也而知以發其身故内無奉養之闕而外有賙濟之譽雖不積而不悔是維吾親德行願得銘以誌諸幽以傳無窮其許我哉余蓋未識處士特熟其孤於逆旅耳請勒銘詩非所敢愛也按湯氏之先閩産或言本姓殷為國朝諱而改或言亦南史湯之系無譜牒可據未知其孰是其徙家南豐距處士為五世曽祖某祖某父某處士諱某字順之游姓出九國時亦不知其所受若徙之初也曽祖某祖某父某夫人夀五十五而處士多其三嵗有五男子曰震桓復濟深而震深為進士各有時名二女子適游某楊某孫若干人銘詩曰相從載祀六六乎而方隆縡義淑睦乎而遽終傾兮躅續乎而渠以占之其使之孰乎而書以誌之其履之榖乎而祭文祭傅夢弼文嗚呼辭場屢雋頴悟多才人以為祥君以為災庚子來今春秋十四子於其間薦名相繼上求聲律子㨿人先上求經術子占萬全惟子之文無往不適譬如江濤悍浩衝擊湍瀾所到骨竦毛寒一篇時出百室願觀師勉其徒翁祝其孺期子之肖否則憂虞謂子程轍超遥過人青雲坐登指在朝曛命不與謀差因所擬誰令駿足不極千里東人之子一薦罷歸白首摧頽卒換藍衣西人之子再薦如忝等之閒常亦攝官檢嗟子視此兩不一如五試南宫夙願徒虚淮康關塗六出六入終以失意客死其邑游舊莫顧宗姻弗聞一世胸襟奄忽埃塵本欲榮親先親而沒亦曰行道位將名咈辛勤二紀刻礪瑳磨毫髪不諧非災謂何䝉莊有言外物難必嗟子之智于何不察勢有所軋情無不馳嗟子雖才意困於為早泰晩屯前夷後慼人間共諱唯子兼得利不可究名無足云首陽東陵同是誤身惟彼彭殤兹不在計行情致哀愚智一揆傾觴展訣旅櫬在斯靈乎清寧其尚知之
