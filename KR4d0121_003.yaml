body:
  text: 灌園集卷三宋吕南公撰五言古詩煙雨朝來煙雨重天與平田接輕風更蕭蕭清快繞我睫開扉覔高嶺沒若隔世劫不見蒼翠顔徘徊坐搘頰農夫一何樂羣輩聚稠疊移秧塞塍圈狼籍衣不攝喧闐交野語蹲踞就晨饁臺笠映扉蓬端能勝經笈人生慕溫飽萬趣歸一愜何必少髭頦區區羡長鬛吾村有荒圃吾屋葺未輟早晚畫度全方將事農業耕耘黨既入歌笑聲可躡雖欲著新書無妨理鍬鍤傍湖行觀十日不出門厭聞水車聲昨來新雨足耳外忽晏清步屧踏初霽舒徐繞塍行向時荼蓼處荒穢略殄平青秧漸瀰漫黑手益縱橫固知農趨時豈特勸督明下士能致力高天得無情願言成嵗豐庶免冦盜驚覆船山高數十仞廣十餘里形如覆船後映㑹仙諸峯秀色排空葱蒼倚壘逺當縣治之前邑之名山也峩峩覆船山特起秀蟠勃當前百十里已見青突兀行瞻漸詳諦依約認毫忽西峯自排列儼若魁健卒羣阜復東回欽如搢圭笏橫岡挺戈劍堅重不可杌峻嶺擾騧驪豪雄欲相揬或寬侔放蕩或迫類齚􅀈或象喜紆餘或同怒詬咄林高盛巾幗畬破露鬝秃有險狀飢癯有坌似壯腯偉哉形態衆盡叙難以猝憶隨遊覽後深入禪宅窟樵徑坦復﨑遙村現還沒是時五月晦寒氣尚切骨汲泉煮茶雲石鼎沸鬻雪夜垂紙帳卧疑近鬼窸窣曉引杖屨行嵓巒遍緣踤幽坡獸跳􅀈佳樹鳥咽嗢飛瀑下層崖鏗清斷汚淈分流浹田壤千里利耕搰愛此爽灑都擬詠屢蹇訥何由結廬舍靜取蔬茹捽夢想空洞靈孤雲動颷􅂒奉和內翰太中城南放魚沾沾水中魚生死豈有知成形四氣中積漸長鱗鬐但喜藻可依未諳龍可隨茫洋天地間寄命此郡西嵗有竭澤例肯縱捨者誰秋潦走海去荒壕已愁飢方將赴烹芼逃避計若為萬里雷雨解一時離兑暌夫何遇仁賢顧盻成嗟嘻載憫口腹纍鮮能毫髮遺支川以三千此獨數畝池脫爾倉猝急吾其亡肉糜呼舟送中流狡吏敢挾私曽是潰爛勢忽稱太平時波瀾網罟多要在慎所之香餌不足愛古言未應非丙寅元祐年內相守楚夷愷悌見篇詠魚乎爾恩斯偶遊仙都道先以長句見寄依韻奉答吹燈染小帖借馬忤廄人豈其事朝恭强欲觀雲泉盥櫛具袍帶超遙石橋間同征二十蹄駑駿亂後先朝曦遽突兀送我溢背溫樂郊民何知桃李自滿園逶迤松下路不踐已八年道翁喜吾來煮茗巨石根導我復勉我攀躋繞巑岏依依夢中遊忽得驚覺魂一聽鐘鼓響載慚塵土昏顧兹清泚流照洗憔悴顔曀曀金碧光嘈嘈杉檜喧樓臺有新增碑版多舊觀嘯客遍廂闥周爰訊黃冠白頭師靈仙不免歸丘墳太息五濁士慿癡待飛翻譬持數寸膠擬救九曲渾往者不肯說來乎付誰怨唯當悟至真可入了世論崔嵬黃守庵本是劉伶褌憶我初借卧嗒焉過西曛踏黑叩歸户倉忙遭罵言寧知復來時邂逅乃見尊中從鮑兄至三嵗四五畨題詩不知我命酌戒醒還丹霞所未識西望久目存畏雨我獨止于今負長嘆鮑去死令長無人辨龍岏我窮羞白襴引分逃山樊俯仰十五載恍如畢晨餐方為此日游忽計後戚歡何以遣孤憤隨鞍有殘樽焚魚濯瓷甌浩蕩臨前軒適舉共悄默屢觴漸紛紜步兵俄鼎來四座驚欲奔授我大紙卷捧承疑未安披張縱眼力審是陳侯篇上序天質壞借余盡情文下傷素交稀慶快未契敦憂我困跋履且令慎盤飱平生慣衆憎讀罷腸輪囷引筆欲作報停杯類含酸人間有義好蘄嚮異轍轅權勢之所在萬夫呈肺肝風雲茍不至親戚爭棄捐此謬匪朝夕期誰反狂瀾餘齡既蹉跎乃得逸駕攀感槩捨酒去衝煙下耕村黎明候鈴齊再拜以謝聞蔡翁蔡翁高古士終始素踐清曉然不欺心可抵日月明二十弄賦筆周流教諸生四十背辭場歸來閉柴荆長子力近利㫖甘足謀營次男治詩書庭户弦歌聲居止在城邑身如隱林坰舊交勢富門十載不一登稼穡有凶稔翁無田可耕閭閻多是非翁耳不為傾蕭條一畝宅裕若據八紘書囊配酒樽此外毫髮輕晚醉有癭枕朝飢有藜羮未知窮與通何者當逹情維彼九章衮暖外未覺榮維彼八味珍飽來無足矜妻子亦垂白息孫初習行歡愈同百年世患安得攖嗟我稍濩落晚能慕幽貞何由似吾翁坦坦寄餘齡早穫溫風扇炎節高壤見新稻蒼黃色猶雜鎌擔力已到時當艱食久不暇論贏耗奔奔竭頃畝翕翕資釡竈蒸炊防碎折焙煏取乾燥鄉鄰自齊同早暮誰諷告老翁操匕筋一食九嗟懊豐凶存後憂飽飫偶今暴驕陽有炕暵積雨或淹潦未是安眠人兒童但嬉譟窮鬼窮鬼斷去志送之豈無文譬如衢路埃屢歸已復新隨我三十載間關不辭勤誘我上債臺為我擁愁根羈旅風雨夕空廬氷雪晨贊成蹇拙謀謹守冷靜門遇酒或略避見錢輒生嗔亦憎富貴兒永矢不失身昨者試羣士閴亡忽連旬謂其捨我行忍不許我聞乃復跳籬棘譸張幻司閽吹沙衆官眼使視玉為珉詭計動有效更誰評正真歸來只康然知我恥奏論憶昔熙寧初與子俱食貧相語厭此鬼多方願崩分宗伯正憒惑委其制風雲倉黃刖我足置我寂寞濵子脫白布衣鬼顔愁不欣自子有官守辭鄉八青春坐想廪俸優寧復鬼敢親今者枉書札無財亦云云信哉此鬼多不限吳楚閩隂靈雖叵測要自有婚姻族黨各生子子嬪又生孫宗支繞天下焉往不見存子行改京官途轍異凡民閨房漸珠翠盤桉溢羶葷萬一鬼不喜乖離在逡巡顧我慣與君應來合朋羣益五以為十其徒日滋蕃吾文雖極高鬼去無沿因讀東方朔傳武皇肆荒惑公卿噤忠齦先生有直舌談笑開吾君董偃不敢怨夀王誰與伸堂堂補衮心不厭犯怒頻豈不顧仕養崇卑位泥雲耻同高論儒瑟縮憂烹焚賢人事昏主獻替視所因不爾朝野間誰非愛其身彼哉下世士所見異吾聞醜謬無不為乃思謗遺塵國風歌善戲孔聖許狂人何嫌班孟堅區區記餘芬過巫師步還過巫師步竚立想平昔不見舊門閭蒼蒼但榛棘當時修竹圃十里認濃碧佳樹鬱瓏璁高能百餘尺連甍覆多瓦厚塹疊堅甓生計具安恬鄰人總歡適非無四時樂乃預五等籍不知九載間剗滅自誰力或尤近川水川水豈其蹙隄岸盡民廬何斯最崩析有疑㳂鬼道浮誕致淫慝僻術固欺人窮祅蓋傷德不然當合㑹大數名終極幽𤣥竟難量理意浪參測憶初羈角嵗文字未深識此地事遨嬉隨羣慣經歷波瀾澆暑汗略彴騁霜屐逗曉集圍魚連宵按傳覡走聽鐃鼓動就視符籙敇座軋歌神兒盤分受釐食中家餽牲果豪屋送金帛弟子爭聚藏巫師坐欣懌顧余方眇弱比衆似岐嶷撫省更呼留殷勤賜遮扼持杯勸醇酒引筋指香臘牽袖索吟哦嗟天賞英特期將雪侵鬢見慶雲路翼童稚喜矜稱徘徊重低默豈圖専轗軻所望一差忒荏苒至巾冠奔馳為甔石光隂與愁度肝膽遭事役文藻漫雄渾途程轉迤塞翦翎看逺舉蹀足羡橫擊何以副鄉評徒能冠經席虛聲漸凌厲謗口遂壓積辭山寄他州封紙問故國驚心存沒異刺耳榮謝亟偶爾跨歸鞍蕭然又行客凄凉到今日憔悴對遺迹澗影冷茫茫塍泥新拍拍春風吹駘蕩夜月照岑寂曽是禍福場翻為馬牛陌誰能逃死喪乃獨久酸惻無處瀝餘觴空思詠漸麥人間屢興廢世路真阻厄愜快一難逢暌違千易得布衣甘我老耕耒非上逼飽暖即逍遙功名可拋擲雖慚巫師語且免荷蓧責自作好詩書寧須位侯伯過辭歸嶺老翁愛園廬未省越鄰塢婚姻挽他鄉送客犯修阻委蛇上高嶺四顧異吾土相揖遽辭歸驚如避豺虎漂浮千世下出意能近古游子笑安居相傳入名譜黃塵壓碎石嵗月知何許但有鬱蒼松亭亭待斤斧秋風吹我馬路向此山取因名重徘徊不獨行役苦過憂劫嶺强步已半日前岡更悠悠下如趨龍宮上若登雲樓不見人舍宅但聞鳥喧啾我行只空囊盜劫誰知憂五月二十五日三陂橋晚眺漲水久已退擎泥草扶疏平疇極我目一來施犁鋤九夏行過六尚憂復汚瀦哀咨此鄉民耕力豈躊躇地勢苦卑薄况無古川渠愁潦懼熯乾不可保終初昨者多暑雨洪波日凌虛新來滿旬晴滲涸類灌蒩垂秋且當蒔到否知何如搖搖衆農心凛若畏簡書逺瞻來南山其壤似郊墟依微緑秀間浮白略散舒間喜早稻吐因高得紆餘幸無風早催聊濟升斗儲天下有大福唯民樂田廬樂哉俟豐登快我羈旅居詠榴花敷敷英乍含春盡葉已碧垂垂實稍殘秋晚花尚拆鮮妍誰造化遲暮我彩色方託晨露滋何知早霜烈天時豈顧望生理自溢逼根柢或未衰芳葩肯無益徐娘老情重武后善塗澤所美出虛踈其殃乃窮極參差共冲氣窈窕負靈識草木可毋譏吾傷在人德俗士俗士各何在來登蓋徒然彼其見湖山乃特論價錢為此可徑絶隂梯阻狙猿當有詩酒豪相將快留連一醉抵萬寶高吟對遙天下視闤闠兒汚埃盡癡年嗟我濩落手平生負雲煙題詩不放縱或似摹印圈安得氷雪才同聨座中篇嵗除感舊舊德無路報衰年又增多平生感激心恐懼成蹉跎幽幽黃鍾原總角便經過一飯倚從毋徘徊類媕婀學書隨羣童歡呌抵鴈鵝相逞知字畫勇於渴尋河羞耻道趙一矜誇有甘羅豈云幼殷勤乃取晚坎軻荏苒三十載萬千窮祟魔舊遊不得尋聽問徒悲歌秋霜壓芳蘭豈復異徑莎願見故根畹邈如隔岷峨老窮怯脂韋趣尚近笠簑此恨長不沒安能辨蒿峩偶題北軒說儒論四方以北為背明蓋言幽隂位有嚮即非亨遂令口耳兒惡北如近刑安知壬癸交於此兆萬靈天元氣始降坎水首五行理數漸推遷至兑乃秋成餘隂與初陽分此朔易庭故為始終地變化容可輕不但天道爾人為亦該并帝王宅九垓輔相羅賢英德雖若伊周稽首為公卿如其惡北靣誰以臣庶稱吾知講析師茍以巧自矜何能亂逹識止可欺愚冥吾來坐書屋軒楹有北名題詩非賦詠聊以說儒憎初遊投子山東山未嘗到興言往遊觀尋幽味已淡全勝交凡官揚鞭遂出郭樵路行縈彎遇險輒捨馬聽松頻側冠霜天正枵寥野吹何蕭酸强步且數里猶在荒林間峯回得古寺一叩雲中關高僧奪睡出迎對如嗔煩解榻迸伏鼠煮茶爆新泉東亭一何高岌若崖臨淵西庵更爽亢基與堂甍班延緣遍登坐共羡閒人閒同遊二三子取酒醺吾顔約略飣市果橫斜列山盤飲語快不徹望睫張無端曦光忽銜西歸思攻餘歡撩樵灑醉毫拂壁羅矛干調笑下前坂暮色凄漫漫行矣重回首林凹數聲猿答濟道外物不可必一官非我心榮生在適分素願乃山林知恩已三年趣幕不覺深因君纍幅書更激浩歎音衮衮旦復暮勞勞古猶今其誰有功名不顧憂患侵富貴豈不欲才力視所任長鯨舞天淵寸鮒安牛涔性亦各得耳何為辨差參夫子方得路未應棄光隂咨余厭卑摧謀望止尺尋誓買五畝宅歸休以浮沉耕漁入程途文字亦所欽看子展雲翼騰凌和薰琴還將草堂書敵子朱與金答陳公美少壯事已逺舊文良可懷百年能幾何十載不得偕念昔居鄉里游處了無猜飲食不相捨談笑久所陪拜君以為兄分密誰敢開齒髮俱未老未至衰與頽我子在襁褓君猶無嬰孩君後獨捨去為吏天一涯我又厭奔走逺引不復來嵗月杳難恃區區老吾儕况從與君别多事嵗若排心力不能究衰病侵筋骸二子皆已冠如吾苦無才君亦已有嗣眉目秀且佳人事知幾變㑹合終不諧昨者本不出豪傑苦見咍鬱鬱自不樂誰為子悲哀幡然感其說東走凌巔崖不意君在此得奉笑與詼君顔蔚如故大噱飛塵灰我老應可怪白髭生兩腮新句辱先贈古詩許見推賢俊非獨少故舊每所乖作詩報嘉貺亦聊以相催擬古仲尼魯司冦官職亦已優從祭肉不及戴冕奔諸侯當時不之知為肉誠可羞君子意有在衆人但愆尤置之待後世皎皎無足憂仲尼為羣婢一走四十年荀卿老不出五十猶力田顧彼二夫子豈其陷狂顛出處固無定不失稱聖賢彼亦誠自信誰能恤多言公孫昔放逐牧羊滄海濵勉强聽鄉里埀老西遊秦自顧未為壯徒為久辛勤君子豈必隱孔子皆旅人竹榻竹榻破壞久隅稜類繩橋扶身輕坐之不敢直我腰動小響已大搘嚴勢仍搖鋪氊蔽其顔倚以度晨霄醉卧稍安貼如舟乍停橈愁醒輾轉多似泛八月潮欲下必以緩將登未嘗跳奴僮為我憂疑我或悵怊訝我合改置我心豈其遙所嗟成與虧本以材用招念此蒼翠幹初非願枯焦唯難逃匠手遂與嵗月凋物固不求舊人貧自無聊憐强棄其衰此志亦已恌我有四壁宅塵書映空瓢何嫌此榻存且以異貴驕寄陳道先寄聲西山閣知我新近否病嗽輒彌旬無錢雇醫叟夫何稍除去乃自得醇酒美味既沾腸清甘更悅口適從耕壟上杯盞不在手坎坎遂連傳喧如擊盆缶清秋田舍事秫糯或稀有傾渴聖賢心囊空欲狂走思君綵衣次與我異好醜病少官壺多何因到衰朽古人說天道高下常更受此語儻可徴豐荒竟誰久慈濟塔僧說姦雄人亦發歸依願秪今慈濟塔乃自張崇建雲空土石乾碑倒龜龍斷悠長香火事豈以非夫賤一日復一日一日復一日夜眠復朝興不見事物窮但覺憂患增千慮不必免不思亦如恆未知此世間有用智與能少壯怯鬱屈衰殘念軒騰方如夏中蟬忽若秋後蠅非譽等毫絲善惡計合升可醉且勿道雲來譬高曽理髮我髮日以少我梳未嘗頻過旬一理之每理愁缺伸壯長足癢屑奔馳更埃塵搔爬不覺勞垢結類組紃雖復强櫛沐憚如負千鈞鉤牽就平直流汗益苦辛當時結似拳漸細效梅榛懸知又十載幾許及變銀萬物有盛衰吾何為喜嗔借令但兩鬢豈害有冠巾人言髮既凋乃稍異癡民題詩且自賀漸係老成人宿熯塘村盡日繞岡嶺孤征凌險巇春風處處豪游子行安之過午或未飯人煙信遐稀暮投熯塘村正見牛羊歸黯黯亂山腹茅廬壓笆籬陽光向餘霞畏虎先掩扉繫馬就屋尾解冠挂門眉怡聲問前程乞火照寢衣夜半雨忽惡長雷撼坤維奴僕亦睡覺雨㵼百箭馳草草卷席避倚墻顧晨雞故園豈無情一夢不可期我有三畝宅比鄰勇鉏犁何曽問三旌自足了四時不肯卧寂寂亦來走栖栖幸無王事驅或是竒鬼欺咄咄復咄咄生平笑狂癡明朝遇清溪莫洗腳上泥西村東村豈不佳南村自清幽北村亦可居俗悍不易投維此兑嶺曲陂陀繞川流桑麻有清園耕稼有緑疇雲峯十里外足舉曠望頭本無車馬喧豈有聲利愁伊我先君子故家待增修還當起簷楹此志敢不求開闢三處徑疏通四前溝有軒列琴書有室貯鋤耰壓麴擬長醉藏芻待肥牛超然了餘生不問萬户侯我策久已决我身强悠悠安能荷蓧翁不以意相收鏡鑷鏡鑷亦何功鏗鏗漫從事助人飾形骸初若逞意思須毛何足簡塵垢何足剃端為兒女懷豐靚以言貴余家在農畝耘耔當傳世朝犁泥糊糊暮耨草翳翳風搔日暴炙姿狀難嫵媚百年寄託身顛倒皆順利顔紅黑何害髮黑白亦是誰能妄去取屑屑論姿致深村擬三徑嵗月治去計帶經以隨牛鏡鑷成相棄秋色秋色今又動凄然悟衰殘筠牀讀書軒一卧八九歎少壯非所惜塵勞苦間關端為智慮傾得此悄悄顔筋骨衆疾劫肺肝百憂攢還當節律遷刺促驚痟酸夜眠却明燭曉脾拒堅餐從文未終篇腰脊益痺頑太息造物宰勞余豈其偏寧分無窮悲直窘有限年想彼向榮木蕭森望雲端雖無癭蠧虧久竟歸朽乾萬化有盡極一身何足安方當委順之不必専憒煩起坐仰星斗環行繞簷欄西風穿我懷肅若臨矛干世故屬無謂悠悠諒何言唯應就枕時曠蕩如山樊嵗寒亭北風搔長林萬葉各窮屈愛此清秀幹高寒色如一雖無化石驗自是後凋質送傅亨父相公坐東府簡拔無留才賢良得帥權志與馮趙偕以策屈羣力勃如飛蚊來河湟多新田隴渭少驚埃壯矣功利舉趣時各賢哉誰言夫子喙不在此日開手把經綸書想望黃金臺相期衢道亨紙墨皆雲雷臘雪拍馬睫朔風穿僕懷雖云行路難足免壯士哀去去合利見少微近三台得志亦遄歸我有賀酒杯
