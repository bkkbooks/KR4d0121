body:
  text: 灌園集卷十九宋吕南公撰墓表傅處士墓表故處士傅君家於東巖山之陰實南城沙溪之上村傳術聚書教子弟為邑里講學倡始才名學子相望得科第惟傅氏人衆處士少而承訓既冠有俊譽而父病失一目明因自惟念無兄弟奉養叵闕即棄進學業而專治耕稼以致其㫖甘如是者二十年父無後憂足不出户庭族人有謀并其同産土地者慮不見酢故羼處士父名而訟於官縣攝符下處士察父有難色乃馳詣縣請以身代病父縣憐而許之已而謀并地者辭窮猶誣汚不肯置於是處士泣曰大夫言彼訟者志得人地耳誠令病父免吏議則願推吾産畀之雖行乞養親所不憾也訟者大慙無以遂其姦衆皆歎息其為人子槩如此至自有子則亦盡義教之其言曰學優而仕非成人已乎文辭而已非所謂學也茍祿而已非所謂仕也必也德充乎已業利乎人然後可語優焉其為人父槩如此喜奕棋工為近體詩居鄉以和易為主而不誘於非義其心蓋不徒合衆而止也治平二年夢游山觀至石室間有羽衣人延之坐俄探桉上青囊得白字碧簡示之其文曰四十五日而病五日而卒寤而異焉明日召其子於學山至則飭以家事且促凶備當是時處士稱孤久矣母夫人在堂聞其語而悲之而碧簡之文果驗十一月丁卯竟卒壽四十二將終涕泗謝母以不能終養為憂且曰夫人所倚者孫耳語已端坐而瞑明年卜葬於屋東之河源卜吉遂以二月丙午窆之處士娶鄧氏女生二子其長曰權教之仕學者也其次早夭矣後處士之葬五年權及第調漳州浦縣尉秩滿移建州觀察推官待次來歸展墓內外宗姻鄰曲父老皆㑹於松柏下雜然誦處士之德其幼壯者咨於長老以後生弗及聞知為歉曰盍表以文刻石示來者乎衆皆曰然於是以命吕南公曰唯子宜為之文某曰是文也當何愛於論撰雖然以處士善慶而有子如此騰踏翔摶高逺坐致則追榮不晚而後書之豈不可哉亦曰賢在德不在官焉耳夫宗姻鄰曲之志固亦得之此乎處士諱某字世長其曽祖諱某父諱某熙寧八年秋七月取文後三月刻之墓遂有表講師李君墓表灌園公曰自唐衰亡天下文鄙學謬積百許年極陋且羞而士未知變也中間有工儷語即見推為辭伯有知記誦經疏即被請為儒師承習髣佛如此又數十年而後竒特之士相望出焉其變遂臻乎大若建昌之曽子固李泰伯則肇荒一郡者也其餘號鄉先生力通辭語以是非豫奪傳注為事以不墮於路聽耳剽之浮則藍田李君亦其人也君六七嵗時聞占畢之風而悅之不俟父兄敦飭而曉夕黽勉蓋家愈貧而志愈篤既壯則以講勸取資衣食其闔户方且承顔竭力躬行孝悌衣無定主甔無我粟而沒齒安之鄉人嘆咨以為不可亞其於人也和而徇禮信而附義喜揚人善如恐不足少時應舉梁京中道同袍屬疾衆皆捨而前君獨守之不忍去君於經無所不恱而尤用意於詩易嘗著詩講義二十卷易統論三十卷孟子講義十四卷書成不逺千里以獻當代聞人嗚呼蓋恥乎無得而稱者也君諱彖字材叔上世家臨川之青泥其遷藍田見三徙矣熙寧九年十二月乙未君卒壽六十三明年卜宅兆得吉於大源之鄧言坑某月日克葬有三子七孫子曰平仲擇之琛而擇之能嗣業云後之人固有考評宿學以稽君者乎問其家則子孫存焉問其墓則告之以在此處士陳君墓表建安處士陳君諱某生於景德乙巳死於慶厯丙戌哭亡朞年卜葬瞿村之丁阮山食告後三十有三年其子某某以母夫人棺祔之始議刻石表墓以狀來請文某於處士世故也故應而不辭昔天下既休兵數十年間民懲喪亂趣求安居樂業各盡其力得所以盡而奉養愈逸有非禮律所同則亦逺荒之常情而聲教所未暇者也處士當此時薄食陋衣極其苦淡不恤衆咻而以有常自許蓋已異於浮沉之俗矣方又欽慕儒學延致時名進士訓範其息如恐不及至以婚援結之則其存心豈徒安樂之得哉其配葉氏能助其力行故處士壽雖不過中而家檢繼循不違文藝子孫皆以舉人命於鄉類能不墮家聲謹承先業處士之為人可知也已處士曽祖諱某祖諱某皆不仕為建人世久不知其先所自徙也處士有七子某某實舉進士五孫皆率教云墓志饒寺丞墓志故衛尉寺丞饒君諱懷英官以子貴得之其先世家金陵祖漢仕李氏為散騎常侍唐社既屋君挈其室南遷初來撫州買薄田數十畝力治耕種遂有其居君天資彊悍智勇人也略知文字而不務仕學自任嚴整不畏凶獷人莫敢以非意犯者嘗以公役如城南鎮鎮據四野茶鹽諸盜騖涉之衝姦人挾禁貨舞肘而過無所顧君使人邀責之盜怒索鬭君起與戰戰三日并夜不飲食而鬭無倦色盜不勝棄其槖以遁嘗泛鄱江夜泊荒浦旁有游舟若行賈者君潛察之意其賊也出揖與語漸相近叙說不使疑即相往來以致熟亦出酒肉為歡君睨其舟中有官器伏愈憤欲圖之一夕賊來君所復飲以酒賊大醉仆卧席次君使分鑰閉賊船諸户已即叱醉者起痛詰數之因斷其頭又呼奴盡縛衆賊搜其蓄得誥敇十許道或藍椹袍猶在者君殺五六人生束二人明日列於官蓋名盜購而未得者也君盡獻其獲取其購以歸撫人周僧聚輩據險山乘隙出抄掠經嵗官不能捕故事賊大難制則用金字牌以招之然及其出則殺活未可知以是周僧蓄疑州守兩以牌示僧僧輒殺使者而不肯聽君告州往焉賊聞要於山口擬創彀矢向君君袒而訶之曰吾非汝較者漫贈汝以不死耳賊臂稍縮因前攬手造其廬諭以官家威靈本無不擒之賊賊感泣拜謝為置飲宴君食之不疑賊益聽信因相率赴官不勞一人而事定其彊鋭敢為蓋多此類有子三人力飭其長進學為求師博收篇籍懇激不厭及其得官起聲稱榮及親時君仍康强暮年或為詩多慷慷悲嗟之氣有句云人老壯圖休劔靈中夜響又曰膽斗醉猶動氣虹晴未舒又曰太平不見英雄事忠膽長隨日月閒其大槩皆爾平居里閭嵗時杯酒相追攀與故人父老語身世事時召其子弟戒切之如己嗣或時酒中耿歎噓叱拍髀取胡桃當接拳破之神色森凜若有所負者嘗夜卧堂中有偷人入其隅君寤寐覺之起援戈追擊中其腹偷者脫走去明旦視戈稜有寸腸焉蓋戈而絶之者也吕南公曰虎豹之威其精搏噬固天性一至窮山渴陸壙垠千里無人煙不見毛類則無所泄其豪毒然猶跳踉號嘯讋震草石以不忘於奮發蓋雄竒勇偉之士出而無所用則功名智力泯泯不發時之所繫大矣自古豪傑抱負不羣而暌離濩落不耀其施者不少何特寺丞哉寺丞之死在某年其壽七十三墓在臨川南六十里凌雲山之東背岡靣陽松檟盛焉其處也熙寧元年夏五月初為之志李進士墓志熙寧四年正月乙卯黎灘李至改葬其先人前期以狀來告曰維吾父幼而事學事之篤以至於破家年六十猶以不得意死夫生而為善一無所遂已嘗興嘆死又莫相吉穴以歸其棺斯嗣人之罪憂感不忘焉惟君子幸暇志之於是某亦楚然起悲乃不辭而為之志志曰君諱某字聖源其上世為建州人危全諷在撫州時有李蕃者實佐之蓋君家之來南城自蕃始曽大父諱某大父諱某父諱某皆不顯君少游學弱冠補廣文生在舉場四十年當時多推其鋭且勤既而無所遇則又多為之惜初余為兒童時猶及識君蓋康然謹厚長者也雖今閭井猶知談君之端善曰急人之急而諱人之惡者此吾李聖源也哉嗟乎坎壈死矣君娶鄧氏有子二人其長先君卒其次為進士今至是也至亦良令士黨稱其象君初君之死以某年草葬舍南之萬松山今葬招賢里之大窼云墓志銘亡友黃公墓志銘南城東諸鄉其距縣百三十里者為豐義之馬村有宋熙寧四年季春某甲子鄉之儒者黃君實死即葬之其友吕南公銘其墓亦叙其世屬名夀於銘之端其辭曰君諱某字道原逺祖居閩七世祖彥始遷以來為鄉蓄户道原生數嵗晚解成人論說其大父愛之處之以學問苦討嚴搜無夙夕之殊以致其知功危力悍譬弩千鈞政善引滿莫遏其發則纍扎不難貫而果遏焉命之於材其戾亟哉雖然其器資亦可尚矣是夫人之所以宜惜且悲也道原能飲酒為清麗詩其讀書博而益求其為文速而不蕪而三十二以死死三月以葬嗚呼徒悲何足以待之謂一家鄉邑郡并不幸焉而惜之可也道原妻姓陳氏無男子有二女其叔五齡伯九齡銘曰孝悌足於家仁信足於友而年不以久嗚呼宋故撫州臨川縣丞李君墓志銘丞相晏元獻公之妹適李氏曰靖安縣君生六子其次子曰亢字伯起幼而端謹元獻竒之至和二年元獻公薨遺表以李甥為言有詔官之為試將作監主簿南郊放選補饒州安仁縣尉書一考丁父建康軍節度推官憂服除司户於泉州秩滿司法於台州書一考丁靖安憂服除為撫州臨川縣丞書一考以疾告尋醫歸豐城之正信鄉新城里宅至一日而卒是日為熙寧七年二月之丁亥後二百五十日為十一月之丙申葬於廣豐鄉三峰里之天堂其季父修睦責銘於南城吕南公曰而余兄之孫倩也勿以辭於是論次初縣丞君在泉泉將貪墨其所顧待視僚屬之進賄寡多一時在位皆曲媚厚獻以取薦稱而君與州司法獨無所奉泉將怒且恨之提㸃福建路刑獄使羅公拯按部至泉問狀曰是二掾不從衆益可知其為人即并薦之未幾泉將以贓敗連郡縣佐皆得譴而君與司法獨無害及在台讞議詳平台將為之特論其至臨川撫缺獄官撫將以君攝之遽有能名臺使者過撫撫將言之㑹建昌之南豐無令事久不治即以君權知南豐縣居數月被疾請於臺求還本局臺使者曰聽之則南豐復不治矣不聽久之君益病乃聽至臨川遂告尋醫及卒建昌撫之人皆嘆息焉諱承從曽祖也諱彥圭祖也諱修永官節推君父也君娶清江廖氏職方郎中詢之女生三男子曰傳經傳師傳正皆幼生四女子長嫁金溪吳鼎其三未許人銘曰君為子弟三族愛之出為參佐其上賴之五十而死其位則卑有材無命哀何已時傅巖墓志銘夢弼諱巖其逺系無從詳知五世以來始居建昌之梯雲坊曽祖宣逺咸平間與鄉貢繼又與王府貢竟不脫布衣以終夢弼為兒時秀頴軼羣學問不勞而工弱冠踐詞場下筆成語驚衆自是連五貢於鄉一時同輩欽畏推避莫之敢望邑士至鄰諸邦邦人必問傅巖容表何似何爾未富貴時之處待蓋如此熙寧六年最後試於南宫之嵗也試不利得疾出南薰關三月庚戌次蔡州困甚州將龍閣陳公遣醫官為親治且命走吏敦勸宜力飲藥然疾滋不堪及壬子而死同里夏翺趨臨洮已過邵店聞之為返轡主其棺殯訃至南城無村郭賢不肖皆嗟嘆失聲其父渙哭曰善固不可為也哉命壻龔翌詣蔡得其骨以歸明年某月某甲子葬於某所之原友人李莘請於渙曰必銘其墓遂買石取吕南公文刻之而莘自書丹夢弼壽訖三十四初娶同縣陳氏生一子天麟於是年十有三後娶金溪張氏生二子一女皆幼銘曰刻意勵行以依循仁義非以干祿也而祿不至則世道莫為之勸懼嗚呼如子博茂雄竒而止於斯其誰望猗蕭蕭者原有鬱其窆曷昭其鬱維銘之驗鄉丈人黃君墓志銘嗚呼世人嘗知按學文以求君子而不知君子之盛有不由於學問者其於所求可謂與余異矣盛古之時道化成存是故學士之所行人多稱之其所知與所言雖有不盡猶不極謬至於後世已一變而所謂學者有非學矣乃求君子於皮毛色響之間余之不同世人終不敢而已矣自余能讀書愛古人端窽之論每思持以察世及其既察不能十二堪可若乃其名稱職業不在乎學問者考其心迹往往能賢又頗至多夫然後益以不同世人為最宜吾鄉丈人黃君所謂能賢者也其諱某字某其上世不治儒術止相受以治生而丈人事親睦族竭盡情誼與人忠信和順教子孫以百行不虧其處心行事率愷悌慈祥下逮伶厮亦有所不忍聞人有善欣稱如恐不及其於惡徒雖嫉之而不以掛齒牙専赴人之急然諾信於官令里之人勃詬交爭丈人為處平之無不聽服者富屋以所藏驕衆天下之常而丈人財多於澤國之蚊乃克恭敬第一余嘗論於人為難也知者以余為允蓋其履蹈如此豈非賢士君子哉然其未始弄筆說經顧能使弄筆說經人羞愧於妄名而已熙寧五年丈人春秋五十餘七年素康强鮮疾乃七月上休忽病卧數日里之人卒驚憂既望稍危後五日復蘇是日里之人聚朝虛聞之相與歡慶俄頃又報不起於是各涕淚罷歸是嵗季冬余至自汴值此惘惘彌月為衆傷惜既哭弔於其家明年其孤埴塏墐塤使以命來曰卜以明年四月五日遂葬亡父取若文銘於丘某讓不敢承曰文鄙恐不足以揚丈人盛德埴等又使來曰是不宜效俗儒馳僞也促銘之某即撰次如左方謹按丈人前系七祖彥始自閩遷於南城曾祖某祖某父某皆已諱名丈人娶姚氏有賢德成助於家生四男皆令善而塏以文才薦於鄉諸孫多秀茂其後蓋未昜知丈人宅兆松樹坑之坡其穴直丙其窆熙寧七年銘曰其論不高其行不佻知足以知鬼神之卧內而不蹫仁足以濟衆庶之逼乏而不驕嗚呼此風萬世之謡亡友曽君墓志銘吾友曽唐傑為人剛簡厚直無險僞細謹之行以取合於人其視世俗之毁譽是非如衢路之涕唾然而為子不失孝為兄不失悌為父不失嚴為友不失忠雖知患其異己之徒嘗以憎嫌相忌者猶不能有以少之也平居大飲歌呼若不就事至於讀書商講文藝則愈多而愈得籌策世務愈大而愈當人有所長無問識不識罔不力揚之遇有可惡雖在世戚亦必為之切齒蓋其不類世俗之儒逺矣而年盡以方壯而已此余所以嘆悼乎君子之窮也先時其父都官公罷江東常平使者得知楚州而命其幹私來鍾陵既將復命而舟次大雲倉遘疾進次蕪湖遂不起是日為熙寧七年之端午明年歸葬建昌南城之行春門外真空寺之西南以七月甲申封土焉唐傑諱景初妻劉氏有三子曰時保京郎宣郎二女皆幼云銘曰慶厯生熙寧沒壬午甲寅為始卒萬千五百十五日孰令匆匆居此室上空洪蒙難致詰有咨其賢在銘碣
