body:
  text: 灌園集卷二宋吕南公撰五言古詩麻姑山詩并引余年二十二初至麻姑山而未能題詩非不能也以為不及古人則不如無作之愈也後三年從友人括蒼鮑强久道往來山間蓋三歲中三至焉久道時時以題見屬或作或已比其别也所就才二十餘篇於是賦之為二十四初入東麓嶺路調笑背南關虛徐夢榛梗稍窮田上路一驀雲間嶺身髙氣漸逸步疾神方騁傾蓋歎紅塵滿身松檜影息羽駕亭下仙官不日見羽駕今誰識漫向嶺松隂掀掀對名額蓬萊旌節到夜半麟羞劈簫韻沸寒空山人初鼾息至瀑布崖前忽過亂峯曲隔林聞水聲止車問樵夫知是飛瀑鳴下步入幽徑蕭然覔澎訇仰看百尺崖倒㵼霜雪明乍近骨月健久留毛髮驚疑身是雷仙滿耳鼓不停六月地赤渴平川露乾汀此源一何長奔注常淫盈利澤固不淺邦人昧嗟矜徒聞晏豫時相與憐凄清至憩車亭東岡十里險游客未嘗畏競愛仙都名豈知林下意道人亦良苦冠簡日延遲漸近金龍潭軒車且停憩觀金龍潭鳴泉潄石出湍壓東崖落嶮石困衝撞穿中若深鑊轟如怒雷鬭清響振林薄行人每驚窺心骨共矍索傳言天寶帝龍以黃金作并投白玉簡敕使臨淵壑應雲啓靈祉可不憂旱虐豈思嵳峩間雨霧長所託寧須藏象物乃以致滂博茫茫八紘內至理參冥漠祈禳有舊文千載引穿鑿揚雄去不返董相誣難削勿怪洞中雲隂森護纎蠖過忘歸橋朱欄跨略彴孤絶東山口不見客忘歸華標字如斗軒軒六龍轡不醉雲間酒何以贈遊人松聲雜鳴溜至碧蓮池青紅變芙蓉各是天然色時情苦賤眼每歎今非昔人心與物態自古有更易只使碧蓮開游人果何得上葛仙壇南峯枕崇坂徑路荆榛稠遺壇在其巔名為仙翁留石角已剝􅘧林芳自春秋誰無骨中塵來繼冲霄遊尋鍊丹井何年鍊金丹舊井穴田腹飛升誰羽翼腐盡貪人肉幽草蘸寒泉田禽時下浴遊流杯池靈仙心無纍㑹合祗偶然當時玉酒杯放曠隨清漣不知枯池上遂有無窮傳宿仙都觀仙山古秀拔百里見遭匝樓殿出其中鼓鐘日鏜鞳􅀈􅀈雲間鶴下取芝菌噆道人鋤藥歸月色滿畚鍤夜眠依松檻清思逼睡榻起詠步虛聲傾觴煮蔬甲事有屬外念寄之以評商何由使我心浩浩上羲皇讀李雍天師碣文騰騰六尺碣標置羽客墳龜螭尚堅完字畫稍破分道士惜故物編扶使長存前已三百年後當幾何春昔誦八哀詠頗推李雍文披襟喜此逢再讀目愈昏道固難洞達辭猶不雄渾豈殊沸鳴蛙見謂鼓吹繁惜哉開元盛乃乏史筆人復疑少陵翁賞識或失真凡例竟何有占招僅成言當時干謁兒誤聽一走門富貴世所擅文章我知論慷慨韓栁思不返撰述魂謁真君殿稽首香案下索火續新煙徘徊想功行緬盡千載前念昔魏晉間士流罕身全髙人樂遺世學者習虛𤣥往往迷至道琅琅漫清言真君當此時豈以口吻賢獨持濟衆術敢論名後先隂隲竟感格飛升遂聨翩嚴嚴白玉京侍從皆羣仙舊宅入祀典列祠更他巔平生豈有意德在名自傳浩浩一氣游蕭蕭諸象専孰能知真君庸俗但告䖍三清殿西廡見穆質題名石刻香像壞已久虛名在金石深知無窮傳須以託文墨穆卿剛直者公論觸權戚至於禍福間亦有隨俗迹端知守財虜倚此銷罪慝秪今蚩蚩流持論能引掖憑誰致我語解彼蚩蚩惑欲慕穆卿賢當充穆卿德區區建香像是乃卿瑕謫用此而希卿何殊以耳食殿後七星杉巖巖寥陽殿東有蔽牛杉下無蘿薜拘上有雲霧參靈根不納老秀色長如天已據烟霞都更帶星斗銜成名在圖籍匠手安得芟由來非自謀時值本不凡鸞鶴豈無侣棲翔倚䰐鬖詎知髙古林大用有所堪上齊雲峯人言此峯峻謂與浮雲齊浮雲雖滿空勢自有髙低驚名不察實世論所以迷為君上峰頭曠望窮東西杳繚城下澗遙遙線環堤人烟衆邑屋䝉密亂町畦想彼平地眠仰如遇昏雞應論峯頭人已盡天路梯古士說髙廣中州扺倉稊豈嘗駭嶔岑隘若坐一閨安得千尺翼翻身逐飛霓扶搖過丹山飽聽鳴鳯嘶道法堂檢㸃三帝御書日腳退前楹崇堂豁明淨縑緗出百函翰墨覩三聖舒張溢墻壁燦爛纍籖㡠鸞龍交飛翻金石避堅硬毫無半分弱大至袤丈徑真行體兼精篆籀法畢正篇章入題寫作者一何幸偉哉天縱能豈謂學成性名山遍藏蓄終古得輝映墨客徒醉心黃冠荷覃慶嘗思八世主覆燾足仁政詩書所敷揚乃獨蔑此命將非史官略紀敘非盡併不然天日資肯特記名姓或應淳古治不以餘藝競膚淺難考評隨羣但稱盛無為閣見楊傑記仙都花山風吹春來仙花靚如靣芳馨豈不美俗耳未肯賤吾聞西州地薪以牡丹㸑何嫌此中花開落無人看望秦人峯此地去秦中贏糧每三月秦人不厭逺期以一死脫何言幸可數久竟各存活得非潜逃心世愛多洗割逈然深林嶺雲氣長不滅避俗可成仙斯言蓋疏濶余來翠峯地把酒望深樾不見雲霞身山禽但驚聒三門橋望五星峯弄水石橋西退䕃百尺松看山同羽人初問五星峯為我袖手指當前秀䝉籠平排五青尖似拱寥陽宫自外雖峛崺其髙莫能同固知天下名有以形類通不然天精緯詎或聚此中他山岡阜名頓拔亦俊雄民耕牛羊踐稱謂誰與宗維此古洞府羣仙屢從容烟霞庇草木題號更峻崇融結俱土石靈凡異遭䝉想當有初物豈自知所從嗟嗟蓬蓽士何用羡帝公問玳瑁石所出陂陀土中石含彩若龜貝伊誰攻取之傳玩詫竒怪山家厭搜鑿養草事蔽蓋閒名偶流聞尚自困酬對咨嗟人間世豈直文為害大有可用姿難能免侵敗他山石不美粗雜等頑塊奈何亦爭求爛漫入磨㧉情知既有物順以除惡愛不然悠悠生孰在形器外觀虎跑泉名山一境鎮水土本深厚誰令虎來跑應爪泉飛透吾知變化物持氣異羣畜慚愧剛猛身堂堂負文繡仙鄉既遊歷不忍無所就怒掌發靈蹤山祇助噴溜乾坤任陳故稱號長芬富歎息泯泯人平生不如獸入丹霞洞霞光滿西山古洞在其下石老只嵌空泉寒亦飛瀉有居容冠褐無路縱車馬遊人務周遍强往不敢捨森森南榮樹飄葉撲香灺過盡去來人誰為愛閒者出山有感偶隨愛山客亦賦看山詩方為昔日登又作今日歸勞生竟何有清賞不可期故慚康樂侯萬里窮攀躋答道先難交困新知二首難交困新知觸事得晚悔人方趨勢富我獨居老大悠悠强衰顔耿耿墮末界豈無相於迹襟腑殊惡愛羞同復多嫌樂與翻自壞談髙遞互笑飲勇周旋怪嘉榮徒染濡程孔肯傾蓋閉門當止矣非敢事閒退孤坐念平昔悽然垂涕洟他鄉二十遊故里四十歸父老略已盡後來異襟期卑躬揖我進反顧問我誰譬彼古器物形模漫瑰竒堯冠落戰國不貴理亦宜默塞習蹇吃遲徊避橫飛秋風吹我鬚蕭颯近素絲多感屬暮齒難交困新知道先賢良以南公出山愆期示詩見促謹依來韻奉答為農豈非天歸計恨不早業已入犂鋤謀惟在粱稻春霜久不解乾渴滿耕隩布穀彼何心聲聲似相報不知蘭臺聚安用樊間老定許叩鈴齊柴居就長道以雙井茶寄道先從以長句園公嗜欲淺所好杯中物有田在荒村半以種糯秫居然成醖釀不復畏法律客至啓柴扉瓷甌等閒出春蔬間菘韭秋果雜梨栗取次得寬懷何曽計餘日山棲經五載此興殊不失獨有醒覺時追傷往年屈羇游住破屋愁寂靠􅘫鉞仰望步兵㕑優如上公秩無錢輸𣙜吏窮素又畏咄太息蘇源明仁襟信竒倔低徊憐鄭老長使醉兀兀發我感古人何緣希髣佛粵從歸村後夙恨億萬畢耕稼雖自勞醺酣不他乞親朋或知我問訊俱委悉亦有贈助恩無非佳紙筆鄰家世耝耰竊笑事儒術故故送樽壺端為鷂欺鶻披襟忍辭拒對案傾倒訖特是今假乖遭承極紆鬱遙遙海南尉憫我卧蓬蓽寄以纍幅書封題附郵驛殷勤屢存賜頗以照蕭瑟乃惠雙井茶雲腴品居一人間有餽遺宜用彼所必牙櫛奉戎王梟鴟取侮忽藜羮豫餓士荷德到身沒驚嗟石上英於我係搪突回思西山閣其主異俗匹喜醉復喜醒其胸抵溟渤今當議移獻不更嫌草率再拜寫私誠庶幾無廢茀銀鍋焚蟹眼金匕攪雲骨陸叟片無三盧翁碗論七能希擊節賞且勉按劒叱縱被睡魔嗔吾豪不應恤謝鄰翁窮秋我何事嵗計聊支凖割稻三萬斤栽松二千本辛勤完廪庾顛倒糞畦畛為有空腹憂能忘此時謹菘肥競垂隂稻美方聨稛自喜在丘園年衰且優穩天功偶不助人力翻為窘彌月雨連淫交冬霜不霣蔬長煮有線穀濕舂多粉厚望乃無聊蕭如被宫臏今朝二十九看厯驚秋盡去臘都幾何陽烏尚髙隱鄰翁巧談話念我頻嗟憤杖插肯經過單辭稍牽引上論穹昊意窅默難裁忖下說倚伏端回環恆切近熙寧大丞相周孔登台衮手運道德樞生靈藉針診勞神十五載坐許無遺恨歸卧睫未交紛紜見矛盾推稱忽排毁歌詠俄咍哂藹藹攀附人層霄墮汚溷前愚初是智昔禹今成鯀譬彼羮涴衣倉黃可潄抆問君官際㑹何似農藨蓘而以望小乖便同身大疢飄風將暴雨自古稱豪敏邂逅不崇朝誰嫌類榮槿羲和與青女㑹見驅輈軫晝暖夜嚴凝安知不相趁低徊向翁謝老語真明允慚愧失路賢吾貧固當忍寄濟道有田山陂間年歷六七過買園丘墓側畎畝十丈大於焉擬柴荆垂就又垂破豈無速成意煎逼少財貨淹留寄他門一跌防百蹉詩書相娛老兒女既翦鬌何必隨羈游無屋覆髙卧昨來錢可貸似有鬼隂佐鄉閭喜吾歸驚咤競告譒一茅曽未結羣盜忽譀􅀈旌旗蔽枌榆弓箭擁籬舍連甍被焚蕩萬室逃斫銼吾衰當此時林下若為坐蒼茫依井邑買舍寧敢惰迎家郡樓南庭户困堀堁庇風惟古壁容足乏髙座平生灌園心一旦入頓挫譬如千鈞弩激發不中埻力窮墜泥沙豈免埃壒涴浮沉非所善耿介誦楚些鄰叟異吾徒軒咍不垂和殷勤懷我友契闊似棄播早以聲氣同中為章服裏牛刀到芥羽蜀錦拭奴唾雖云不等閒無慮係轗軻能無掛冠計尚却采薇餓低回頗賢勞自比蟻行磨閩州富風物盈軸積文課時時寄吾廬恨不共製作相思匪朝夕飢渴各無奈忽聞有歸期欣快亟自賀呼童治盆瓮醖醷欣秋糯支持醉梯媒傷弔俗類䌴仁人不吾誑早晚應沃輠延頸望東橋何當見紳拖寄子發後事喜乖初勞生擬何禀思山有藏市願起或成寢交聲違本心歎恨只愈甚聽君東堂言去計非苒荏外危速官謗內迫將母稔不能效飛鴻為悔比拾瀋寒鄉有舊隱粳稌嵗充廪及此掛吾冠逍遙適衾袵咨余方問舍期就指冬凛相邀林野娛髙詠略宋沈閩蠻忽煽虐白刃萬胸揕驚奔託城闉默若魚在椮問君歸來信延佇久才審亟聞漕臺公推待過流品縻留不許退讒口亦旋噤古人制行藏緩走不為􅂒况今羣盜熾巖谷豈安枕秋風又開菊庭砌鋪故錦江鱸鱠絲肥蔬果具豐稔相思東堂逺努力文字飲中山感懷西村灌園生好尚只墳史偶為凍餒驅放浪離桑梓初謀旅人食嵗月涒灘紀城西謁郎官辭業入驚喜題門辱皇甫啖炙煩周顗積漸近攀援依稀召訾毁郴陽不果往劉館聊凄倚俯仰秋夏交飄然動行李凌雲古空谷中卧幽真士寄書使來前得共考經㫖依從得所好不分嚴霜委宵話酒乾樽朝遊屐磨齒春風忽浩蕩客興又遷徙邑里有名卿相尋走函紙淮南官未赴旴上船猶艤祿廪見賸餘羈栖請依止蕭條出門去四月大江水荏苒向樅山愔沉傍書几侯鯖豈無味旅疾或多鬼諷誦難呻呼辛勤一朞矣天書問鄉貢侮角士爭起却治舉場文歸參白襴子征鞍遂南首故園衝炎晷把卷詣棘闈駢羅聚千趾文章雖草草論薦亦亹亹還與同籍公西行望旒扆於時冰雪惡進步憂披靡迤邐達浚郊徘徊經臘祀春官未相識退作暴腮鯉惆悵問鄉程東隨汴波駛南京􅀈懆飲泗郡崩奔泚稍赴建康城肋骸倦如死故人能俯接未許論亨否到得爽氣嚴艅艎始東擬悠悠豫章岸速至日無幾進叩凌雲扉圖謀備驅使同心潁川友曽共長安米解榻苦招延幽軒為余啓歸來坐髙館兩見栁垂蘂出有馮歡車居多穆生醴為文萬許卷共學十餘第放論逼𤣥虛摛辭謝狂斐邦君頗投分巨室能更視師友足成名貧窮豈常耻雖懷招隱詠敢廢事君禮况乏一㕓家寧忘抱關仕須眉保方秀時命固當俟蚖肆伏神龍山梁歎雌雉徜徉亦何者游衍姑從爾藍輿走仙都皂蓋繞仙寺掀呀赤松笑穨塌豫亭醉極有挽袖情非無送鈎戲神鋒正軒揭賢詔已䝉被辭學屬吾徒天衢合伊邇敗軍猶鼓勇韜略助輕恃自負七札豪旌麾必摩壘髙心不虞禍羣吠忽滿耳絳灌怒如雷魋倉衆於蟻紛紜莫沮遏回避但嗟唏大暑北路塵匆匆二千里倉皇忍飢渴迫若畏流矢又見朱雀橋重尋保康市追隨國庠試玉石混臧否皆謂連城珍無勞病瑰瑋誰援周宣手反棄中鄉芑顛沛翅便垂思山對蟾朏迢遙馬鞍峽滂湃虎林涘倍道怯糧空逢人類囚罷朝天兩朱闔寂寞徒還篚無數弔唁聲傷懷淚如洗時情看成敗自昔有冰燬將軍匿風稜縣尉乃凌抵雲泉豈不好消息視天理即速肥遁裝勞君屢牽褫賓筵墮盈昃卦氣盡壬癸雖往省松楸仍來仰盆錡人皆賤屑越已獨念摩揣㑹得卜終焉尤難在輕只齎咨灌園業早晚工力庀譬彼䝉籠枝初培就根柢求田闊陂側問舍長林尾此計或有涯成家倍為美侵尋見冬暮我馬議駕彼請婚無髙堂授室藉媒氏風流愧王謝族望慚昭羋尚恃五噫才諸餘庶忘弭人倫喜修正鰥黨成離仳歡快見芳時承前語惉懘啼鵑聒窗户野思兼耘耔計較理鋤耰躊躇背牀第棲遲撫州路獨復操尺箠却整半老容臨泉照清泚比鄰舊時叟相見意不菲兒孫喜詩書揚簸借糠粃潭潭翠岡下其屋亦佌佌虛徐事毛錐脫略輟金耜盤飱得筍蕨滿腹饜青紫或酌山泉醪醇香溢吟觜逍遙度晨夕次第遺軒陛秪欲養疏慵誰能論欽企柴薪漸營度且閲灌園技必可了餘生功名付塵滓安排聚雞栅編織釣魚䉂剗草種篔簹扶欄栽枸杞多年此謀熟願與尺鷃比平昔僥幸非從今定休已書邊夜來酌酩酊亂終始夜半睡魄醒追惟到前此悲哉二千日倐忽象轉跬中間事變繁何啻億及秭歡愈漫顔面愁痛徹骨髓若不悔先迷將何異蟲豸向來與君住成熟至汝爾計成合初終三回倒吾指當時盍簮輩今者隔彼已朱張既分明陳夏浪同軌咨余逼衰晚謀望只尋咫打併矜衒名都盧讓遼豕吾生大魂夢世路萬瘡痏作詩解君頥恨少月露體壬戌嵗歸治西村居奉答次道見寄長句肅肅白虎殿潭潭承明廬人皆通籍游我獨老飯蔬譬彼獸啖土豈其惡甘腴道窮吾何之只得歸荷鋤盛夏督耘耔先春理陂渠低徊居未寧倐忽嵗又除但怯簿有債誰羞門少車載歌裏飯辭謁酒聊自娛念子早奮拔聲華係名駒誰云破青衫罪謗更勃如朝野固異分知安盡夷途牛衣與樵歌各是對妻孥
