body:
  text: 灌園集巻六宋吕南公撰七言律詩憶西村東岡西下古墩頭草木風煙事事幽畦壠彎環延果菜笭箵參互獻魚鰍常開夜户誇無冦競撥香醅賀有秋願定此居猶未得豈堪僥倖望公侯鍾南平祠像天祿空虚土運崩匹夫徒手起攙槍還將有限驍雄力換得無窮跋扈名已是用心貪禍亂尚何顔面見昇平丹青此日凝埃色尚似憂慚問罪兵寄黄夢授機宜少年秋賦險横飛晚去從軍脫布衣只見鄉評推孝行豈知俗效在兵機黄雲古渭邊烽斷春草臨洮戰馬肥了取功名上麟閣莫因晝錦苦思歸得唐彦迴篇再寄手把封題又慘然坐驚新句俊翩翩窮通可是俱關命聚散由來亦繫天此日未逃衰俗口幾時眞及古人肩一樽酩酊難頻共况望青綾被底眠聞唐彦君益作計相過先以此寄用前韻見說東征計決然夢魂迎馬去翩翩遥憐迢遞荒村路幸對温和此日天意厚但青貧友眼裝輕肯赤僕夫肩書編酒盞蒲團坐預擬中宵未放眠緘題道先詩句尚多未和酬者因書短律奉寄已作醉鄉貧户限更逢詩匠惡穿裁王𢎞一酎何曾送崔立千篇不住來枕上精神難託夢牀頭巻軸易成堆賀蘭溪上如歸去省得衰翁合勺才寄鄧師厚二首茅屋分攜但偶然蟾光今已十回圓自存交分長長在不用音書叠叠傳無術入時猶是命有身多病豈非天勌遊已作南歸計只待槐梢沸早蟬庾嶺前頭梅散漫灊山東下水漼溰二年時節俱為客千里家山各未歸俛睫游從眞醜謬方頭言論易乖違人間勝事知多少專把淒涼屬布衣金陵寄示亨父東游西上但差參寒餓催軀失本心多難有言悲運命厭貧無意惜光隂窮通未定功名主疾病能將少壯侵故國漁樵應可入寄聲先為問雲林寄亨父當年勇慕古人風坎壈無由到澤宫力命不容相鬬競光隂從此便和同身如孟氏兼三樂家似昌黎厭五窮莫為明時頗惆悵著書亦是濟時功再寄亨父匹馬辭家臘雪初二年名姓入銓書熊羆帥府招韓愈邑里經筵失仲舒穩把聲榮收雨露冷看交舊厭溝渠藍衣定有誇鄉日為到耕村問溺沮奉寄子發春雷動地竹牙生社雨淋岡蕨臂擎田野盃盤容我飽牛羊鼎俎為誰榮能無智慮隨天轉未有工夫與俗爭苦憶南園江健令解於忙處用閒情解於忙處用閒情絶口多財與美名剝啄至門方就枕畢逋歸樹却催耕燒香事佛人俱佞曳屣歌詩我亦清笋蕨又芳春酒冽相思何計可同傾戲題白鶴觀遼海沈沈信息稀蒼松枯盡草侵扉樓臺有字知年歲城郭無人辨是非像座風輕蛛作網醮壇春老蘚成圍道翁久蓄瑶琴意莫為閒名取次揮南豐道中口占冷雨迷濛懶舉頭望中恐得故鄉愁梅經舊臘香猶在水被東風凍已收鳥喜春和紛格磔馬嫌泥滑轉夷猶人生祗有安居好可奈安居不易求野菜采采新英出逺岡生香不斷冷垂漿地神手老皮先紫山鬼腸飢色更蒼野饌自宜清品味世情誰識淡馨香舊林春草盤飱慣憶共隣翁踞坐嘗秋堂秋堂燈燭夜輝輝照我書邊淚濕衣何術更堪圖愜快平生已是足乖違悠悠客路和愁往杳杳青山借夢歸蟲響風鳴俱有恨驚殘二十七年非過列岫軒輒題小詩檻前清沼一奩披牆外横山百馬肥長使座中知爽氣豈煩天際問脩眉留賓出酒人皆喜不語看雲衆未知饒借俗儒譚爾雅主公偏重謝家詩贈叔憲軒昻不肯事雕鎪放却名韁已十秋舉世有為皆負累百年無悶更何求長驅好意歸吟筆笑領眞風貯酒甌嫌我生涯非濩落紙編寒夜困燈油贈王九李杜是非張相國曹劉忌憚吕將軍異時各有凌人氣此日何妨負我文議論當如山頂石光榮㑹似雨餘雲恨君不悔邯鄲步希世功夫枉十分塵土塵土營營自滿城此間賞望四時清朝看雲樹吟天末夜對溪光醉月明只見漁樵眞氣象豈知㕓市細紛爭座中更挂庸兒榻未識冰壺有舊名道卿上人新作塔亭准擬壽終乞余題詩道人八十轉康寧却傚浮屠起竁亭日月無窮終繫數乾坤有壊亦因形未張雲鶴蕭蕭影先養松楸鬱鬱青究竟會應逢逸少為師重勒雁門銘寄觀上人袈裟初帶帝城塵便詠南陔望白雲賈島未為窮主簿湯休何事小參軍古書似我閒千巻山酒從誰盡十分正是諸生薄韓柳勸師絶口莫言文寄上山陽太守屯田故國無田只一瓢儒冠相誤感萍漂虞翻骨相終迍滯許劭題評漫借饒已養道心忘貴賤故應榮分任漁樵文章解頌賢人業更坐看君立九霄獻翰林太守欲辭鈴閣重徘徊世路無人計實材賓榻少因高士下醴樽多向俗儒開孤蹤此日叨餘論直筆他年倚上台召節不遲天陛逺輟耕朝夕為公來和酬道先高秋見寄之句眼看金菊木芙蓉想見嚴城此景同儒術凋零歸故紙歲華催趁入衰翁千秋治亂三鍾酒萬里關河一畝宫南鷂北鷹方得志更誰迂闊問哀鴻晚出壽春馬足遲遲破曉霜朔風迎袖過川梁簾櫳幾處迷醒魄煙靄滿空含曙光已是途程規進取可能懐抱似鴻荒平沙莽莽兵戈地却為千秋起弔傷書齋春日花困蜂鶯柳困風年年春恨渺無窮已添病格憂詩債未破愁城憶酒功日月正居勞苦上山川長在夢魂中游鞍賞席今多少想見濃隂替亂紅和酬李宣徳二首銷閒堂上日何思或弄鳴琴或賦詩聲正只傳心靜處篇成不待燭殘時隆中有客吟梁甫洛下無人說克兒此日餘音到逋客定如醫藥蓄青芝臨邛大邑少鴻生初敬多辭馬長卿幾許分財來滌器不如收迹去躬耕生前遇主無高位死後遺文有盛名畢竟負他賢令意被人傳說是閑情次韻輝卿感春日日春隂共慘然愁懐不稱艷陽天已從魯酒迷醒枕更向瑶琴怯武絃往事自驚千里夢勝游誰犯五更煙因君解道花如錦始為芳菲憶去年再和欲寫春愁上粉牋只凝幽思恨遥天塵埃漫蠧霞書字日月終虧錦瑟絃夜聽子規欹醉枕曉看新燕立疎煙冷灰殘燭相遭慣觸撥東風不記年再和聞說羣芳初滿園未能尋賞恨參天風豪雨横傷鶯蝶酒冷詩荒負管絃屐齒有時臨蘚徑馬頭何日破晴煙誰何贈我寛懐語每道新年似舊年熙寧六年再至鄧氏北軒感而書壁窗扉暮闔曉還開乞食寒儒去復來土木不妨人冷落詩書能使客低徊言如鸚鵡今徒爾宿似夫不亦得哉但識浮生皆寄託莫從河漢論涓埃寄從義法曹教授軍學先生骨氣清毎嫌盃酒亂襟靈譏排只是攻三雅熟爛除非是六經榴榼日虚塵拂拂兔毫宵運燭熒熒俸錢添得眞何用好贈滎陽買綠醽奉酬范十七見寄二首接人坐語送人行兩飯逡巡晚鼓鳴遇社有何歡次第過春多是病心情消磨白日無云補計算流年但暗驚苦雨寂寥還一醉夢魂依舊背嚴城一紙新詩入北城起予聊復醉魂驚低心苦淡吾徒事轉眼炎凉此世情六月未須論止息三年方看大飛鳴錙銖社肉休過問幸有鰍蔬且爛羮再和浮桁門外樹如城歸路迢迢夢易驚嗟我衰遲從旅食感君存問有詩情牡丹不在儒宫種杜宇偏當靜夜鳴勞費主公憐苦淡駝蹄時勸一盃羮幾欲相尋出郭行念君家雁不能鳴逢杯得醉常常事漸老多慈種種情荏苒又聞寒食近牽纏空作暮春驚祗應已入東風笑愁思長於萬里城次韻酬亨父見寄時亨父在厚平山中醉墨淋漓詩屢酬浮蛆上下酒新篘人生有此自可樂世事無窮何足憂端是覽輝同鸑鷟不應專宿傚夫不嗟予久負思山興空得公詩展復謳和酬天休故人邂逅早鶯時一別經秋燕盡歸已是苦貧看客懶更堪長病出門稀何曾富貴來如夢但覺光隂去似飛欲酌清樽相解釋莫嫌窮巷瓦盃微酬何威中十年經畫鑿坏逃只為乖違不為高盡力未能成飽煖致身那解立勲勞已從酒盞忘千慮羞看貪人校一毛游舊惟君尚相記每將新句訪耕臯和酬伯華襄陽耆舊足高風不識州城有徳公器業我應居衆後姓名今恥達宸聰文章末技知何用衣食殘年嘆屢空朋友贈言當儆戒恨君虚美一篇中道先賢良以其到郡未及相見遽寄四韻謹以酬之山人還是入闉闍自笑窮心失本初鄭相舊憐窮禦冦秦王新伏勇相如衣裘破敝身謀拙齒髪凋殘世味疎人正棄捐吾獨取似君風誼更誰歟酬次道京還見寄詩二首會得吾生只汎浮莫將耕釣異公侯文章高去乃青史富貴極來皆白頭至樂如今惟强飲最賢從古是無求荷源磜上楓林葉又過元豐第六秋平昔賢他馬少游有官何必至封侯天如大雨當揮手命合高眠亦到頭幽澗魚肥堪煮炙豐年酒賤易追求恨君門館無酣伴枉共癡兒對一秋酬西閣書事西山閣上綵衣人過得三冬似九春長恨作詩無客和更緣中酒被妻嗔有官未入功名境多暇仍思寂寞濱文雅一時傳萬世却應能此是榮親朝曦閣詩為李道正賦道人開閣破東廂慣看朝曦亦坐忘但見長時似車蓋不知何處是扶桑雲歸後崦隂無迹水過前渠響自忙雨露縱然能惡作未妨微白到書牀至凌雲山却寄平仲建業歸來路二千一舟輕借死梯緣貴池亭下風如鼓采石江頭浪拍天險與陽侯成憤友幸從魚腹脫腥涎只今親舊知憐否尚有餘生亦偶然九月七日偶書愁裏光隂不覺忙忽聞時節近重陽絶無閒藥擬衰疾纔檢舊衣防早霜未必此生專冷落漫因往事巧思量呼僮閒賞籬邊菊併括憂端付一觴伏覩教塲後庭新移梅樹輒賦小詩呈獻内翰太中中庭移植氣蕭蕭無數芳華壓翠條田地縱然非舊壤冰霜猶可見孤標人間歲月何曾老物外馨香猝未銷故有明年佳實在鉶羮滋味看和調聞仙都李道士下世布褐毛冠七十秋為誰浮汎為誰休但曾計日防三鬼不慣攜琴謁五侯詩卷在前聊養目酒尊從此罷銷憂七星杉下朝曦閣香火應教弟子修長憶初能戴幅巾仙都門外學游人科場未數金門賦襟袖空餘紫陌塵平世選賢終法令暮年如我但寒貧惟師不信文章誤只道遭逢有屈伸九月霪霖榖欲登稻芽連穗水漫塍無方解我心愁寂更欲聞師近寢興紙尾忽傳成異物棺中還恐已飛昇羲和睡熟泥塗惡絮酒尋澆歎未能寄江州沈尊師洞天一別七春風長夢桃花爛漫紅不得雲雷相借助且因文學守貧窮曾尋物外無窮意已覺人間萬事空便作野夫纔是分只嗟凡骨誤仙翁五言絶句橘林居士題載溪館壁雲凍月籠影風生水澀寒故人眞似雪何必到門闌七言絶句寄茶李侍禁東塞將軍日月閒五兵不試坐雲間却因睡思侵書巻送與茶甌解壯顔過虎林渡淮南行盡到江南野渡風高送晚帆五五長亭莫迴首向來窮淚已盈衫戲題白鶴觀八月風高宇宙清銀河秋浪到天聲門前合有仙槎過會待參隨上玉京戲題妙靈觀怪松二十年前看怒龍鱗鬐半已召雷風至今未拂層霄去可是懐文與我同曉雨曉雨彭彭發舊泥田家拆壁備朝炊無數星辰一輪月夜來空似欲晴時重過福興院重過山寺借牀眠屈指前遊已七年文字轉工身轉困被僧相問却悽然乞錢謀食總悠悠兩事平生話亦羞何意茂林脩竹下今年還得一迴遊和道先雨中栽花二月前頭雨意迴移花趁雨破青苔芳根得地春工敏定有新英次第開旋封旋築帶霏微贏得澆瓶不用攜衆草自今常避地主人來繞漸成蹊題藥錄華佗氣絶釣臺側扁鵲墳荒浚水邊末俗好財無妙智此書何日似魚筌茶鐺賓榻蕭蕭午户開松枝火盡半寒灰主人欲就遊仙夢休願煎茶醒睡來風雨風雨蕭蕭夜漏沈北窗燈影見傷心從今莫更言滄海只合思量此恨深有見賣藥諸生體調狂塵埃空助老來忙壺中自少閒天地豈是今無費長房曉日曉日曈曈上紙窗小爐文火近縑緗衝愁滿盞扶頭酒笑殺醫師第一方詠白髪人言華髪是愁功不分悲傷得老翁亦有不愁頭自白可憐功過略相同已任蕭衰潛似雪何須輕脫便隨梳不及窮愁索長逺一生相逐未相疎偶成苒苒新青上草頭小庭春色强悠悠酒缾虚臥琴絃暗眼見風光似九秋新室為姦只是疑王涉至死何曾識杜吳四體早知成散漫前年悔更染閒鬚魏勃雖發齊兵未不臣問時何用便銷魂一生才勇都纎小可怪區區掃相門禰衡世亂無人及禰衡眼看豺虎似蚊蠅喬𤣥荀彧皆儒雅至死何曾曉愛憎覆船山山似舟航壓衆坡靜為平地動為波桅檣不藉瞻烏首爭奈風帆百尺何過武陵翁題其屋壁十年騎馬走紅塵非敢求為富貴人只願似他龔處士不餘不欠一閒身綠竹林邊白髪翁面顔猶似壯時紅朝來賣藥錢多少又閃間愁入醉中廢井清不能常濁有餘轆轤音絶甃苔枯荒凉欲就羣蛙問今有觀天坐客無見廣度院紫荆一株先開滿樹新英待發時東風先動向陽枝同根若是生疑怪為道開遲謝亦遲蘭溪驛驛亭何處近蘭溪行盡蓮華日暮時春雨發香無分見斷腸頻誦杜郎詩惡客薛許昌集有好客篇故作此以擬反對惡客無端捨舊山坐令千慮險相關青燈白日貧兼病聽著農桑更厚顔野客擬歐陽詹野客來過洞府門天風吹斷去時魂得歸應被鄉人笑衣上雲霞有異痕酒客酒客胸襟亦自賢平生不斷醉因緣望見青帘涎已活誰能顧惜杖頭錢夜擬李義山四更四㸃四更四㸃露成霜箇裏愁人暗斷腸鼓角未喧聞鼻鼾北風窗户月荒凉反李義山人欲篇藥囊易中荆卿背匕首難傷趙政胸燕國無辜竟魚肉可能人欲有天從題圓上人宴靜軒宴安深靜屬居僧一炷檀煙萬慮清猶自笑他簷外鐸風來未免鬬鳴聲客到客到空齋說早春嫩紅輕綠漸紛紛寒人不預尋芳品多謝東風許聽聞答内翰太中觀插稻見寄睡過春深一月餘綠秧黄犢負村居東風似恨歸耕晚故遣藜牀日枕書楊朱戰國功名尺寸勞先生持論異吾曹孟軻解辯承三聖後世誰曾拔一毛陳都曹座中出示諸公曲詞以四句酬之看盡新詞聽盡聲未能高和耳徒傾聾身縱作岐山老爭得聞他彩鳳鳴眞輝閣會得眞時眞亦空光輝何足更流通勸師不用嚴標榜瞀者逢燈與暗同安昌縣侯能說齊論與魯論世儒希合便紛紛何曾後學皆傳信只有姦名萬古聞小檻小檻幽花已破香此心無處避韶光年年惡作傷春客穩為東風細斷腸楊八送筍以四句謝之時在湖口殺却盧家十五龍野人盤饌當時豐湖干少得中林味此日鄉心轉不同詩餘調笑令傚韋蘇州作行客行客身世東西南北家林迢遞不歸歲時悲盛淚垂垂淚垂淚兩鬢與霜相似前調華草華草秀發乘春更好深心密葉紛紛妖韶隨處動人人動人動公子王孫情重
