body:
  text: 灌園集卷十宋吕南公撰書上曽內翰書內翰閣下往在熙寧之初閣下以令長進京官遭值聖君賢相留神至治而閣下遂為參贊新美之腹心當是時某再以舉子絀於有司去十五年間實見閣下歷省寺登禁近用直被讒出典雄藩逡巡擁節鉞董百萬貔虎士為天子鎮撫南蠻扼制西羌功名資致秀茂顯赫與古賢將相上下窮山越海能言之類莫不詠誦風烈想望聲彩而某幸以褐衣事筆硯丹鉛從諸生後薄曉辭章又有鄉國枌榆可為寒晚依歸之號乃獨至今偭然未識閣下顔面蓋常耿歎以為士而志於道德惟無外慕焉耳若夫禮義之必行則窮逹非所以間之聞諸前言三代之盛法度之行人才茍可以事上未有不聞於家邦其所為道隆德駿之君子位不止卿相其國而進乎天子之所則列國之臣皆得因治王㑹以走職而承訓其雖各仕一國莫不有朝聘交相請覿之事蓋不如是則義不足於己禮不足於人也孰有生長同乎四封之內學云同師行云同表而自壯抵老未相與者後世之道德不明是或一蔽故居而未及仕與仕而之他邦有鄰不覿者維此之故窮則知有逹者而逹則於窮者或不之知乃勢之常而情之不必怪者也昔閣下之自桂而北也旗旌過故里道路為之榮耀巷兒閭婦畢出傾仰而某不獲伏謁導騎之前則以閣下未嘗還鄉國其於不敏宜不知今且莫有為窮困之先者將以輕易得罪於行塵故不敢也及閣下以哭亡來歸而某又不得速往則以既未嘗得見而遽以賤弔貴非禮之情又不敢也雖然某終願一識閣下顔面以慰嵗久想詠之區區以稍異於鄰不覿之徒以不盡廢夫賤敬貴少敬長不肖敬賢之禮義而使閣下亦幸肯降意而導焉以知鄉國之寒晚有可與言乎否也是故來伏屏外竊以世俗之請見必先之以髙妙無底之談辭瀚漫沸騰若應魯門之問然夫未見顔色而言孔子命之為瞽而曹爽所以甚輕王弼也某則不敏惟閣下幸肯降意而終賜之見則某將有自此之繼承焉上曽吏部書世所謂賢公卿大夫天下之人莫不願見之意或不齊同則不佞之區區謹未敢以衆人自許嘗觀秦漢以來功名之士往往成於激昂或亦求而不得得而無立比之逆取順守有妄有直其猶可議何則彼其內有欲行之志又有可為之才而外無鄉閭書登之序以助其進則其矯首引吭豈不宜哉至如後世辟察有令科舉有司而士猶爭以躁競熏馳是則為肉借皮茍求云爾曽何足以居激昂之後哉無可議矣乃若某之所意則以為富貴之亨否聽之天功名之有無視之時充吾所養而無所待於物不亦可乎然則所願見者道德文章命世之士而已其於公卿大夫為不為非所問也昔者食於逆旅蓋十五年嘗再至京師而未嘗得見所謂巨公貴人非無所見者也方天下之人皆得疑於借皮而已則非借誰能覆按哉不如勿往以使氣熖之閽人無我惡也夫讀書而尚友古之人於悄悄之牖間孰肯同于塵俗致見惡之紛紛乎惟閣下兄弟言成文而世莫能加動成德而人莫能擇價滿乎四海可謂命世之豪傑而先墓髙枌宛在此都攀援映附可以及識而尚以隔遠未及也又况其他往嵗舍人屈於洪州實獲一見其後自福還朝又見焉而翰林與閣下至今未識也夫南豐為邑著於地志千載而未有一人以文武勳名書之史氏至宋興且七八十年而後天下稱曽子固又至熙寧而翰林與閣下俱鳴於時而事業條緒鬯偉光衍特未艾也使異時載筆之士踴躍慰藉如得䕫夷稷契而序之一門三人並駕方軌何其盛也聖天子在上所以圖維緝治方將跨軼三五而閣下以太史知選部上之注待其將盡得天下英材以完萬世太平之基則閣下之所成就可坐而知及今未也乃使某得望風采於苫廬松柏之次豈非天也謹以窮賤姓名干諸將命者某求仕於科舉而不得則無所道矣去老於邱園治田桑以飽暖殘齒耕稼暇日尚能作為詩書以歌咏太平君子之聲烈百世之下或有傳焉則曰閣下之舊鄉農圃野夫乃有功於文字也則今日之蒙賜見或不辱焉昔韓退之負髙世之文已出身於科第而三上書宰府不得見其自序始來京師拜馬燧於馬前知李實匪人而溢言推美之局局然作釋言書唯恐失三貴之意也竊嘗為歎息伏惟閣下賢德幸不責某以此則既賜之見又降意而導之觀其在衆人中為可議乎否也則某老在下風雖無元和侍從一官而死見退之可無愧色上徐龍圖書龍圖明公閣下夫勢利俗成而道義之交鮮復見也豈唯隱約者不安為士之分而用諂失已亦其貴顯者之器識未必真賢則驕瀆不能忘也惟賢者乃有以大過人而後能不以外榮殊其內得是其於天地造化也師友之矣略去儻來之富厚曽何暇於貴賤而辨之山林之瓢褐廊廟之章節俱為寄順之影迹而未始以入其胸在我與人易地一也夫然故貧有以忘而卑有以化視德之存焉耳若乃所知所至未有以倣佛乎此則亦衆民而已其竅之所靈習之所成肌淪骨浹動息覺夢無非光華之慕侈厚之羡也則惡窮賤如汚穢好榮盛如雲漢患未得則捨性命犯禮律以僥求幸而得之則滿盈怠傲謂顯榮之極致具諸己也為下佞僞為上難事其於中扃逈然戾矣夫惟天下之勢不能一土無民則不能一日無事而公卿大夫之位豈容或虛位不容虛而賢人則不世出也而欲以大過人之事責於昧昧之衆民其將有可乎無可哉古之人固有倚于執政之門者矣其於人也蓋自知與我甚敬而不怠有所不願則趨而避之彼誠知所以處擇然也漢魏以來貴顯之名載於史氏蓋已不少考其行業之所就自非有抱負不羣未易至爾然尋其初終之所踐則不涉諂屈者少矣即其終以緬其初雖比之不墮泯泯輩流而悼恨慚耻之蹤瘢瑖而燭映矣不知悼恨慚耻而唯逹之快是亦衆民而已嗚呼誠有內得之真賢而不幸在野適無必異衆民之公卿大夫則亦慷慨老死於布韋之下安能俯仰取辱於勢利之塵哉某農圃寒緒禀受孤耿讀書為文辭不肯止於茍售則探髙究遠以尋聖賢之閫奧而笑譏謗怒造次遭蒙蓋嘗隨俗應科舉而不以為嫌也乃特以書姓名於富貴之門謁為羞豈曰能賢亦以不負古人云耳京師之朱門小而多者猶當列郡之旌㦸其大而有數者可知矣不以吾身之兩掌周旋於彼而紆回刺促願見明公某此來則非卒然者也竊以承平多士三尺童子皆挾進身之學而懷台衮之逹長養收成往往遂心顧唯所以履藉異於漢魏以來貴顯者之步武則幾希也其猶有負矣明公襟蘊博大命世之豪而三十未仕優游下國文雅輝光泰然無不足之色一日抗言九關不賴先容而直取萬乘之知遂與黃髮宰相均承體貌使四海含氣傾想風采倚以為臯䕫稷卨是真無負矣向非有大過人者奚以致此若某之蹇拙何足以言道義之存然而所操特不諂之區區非日月而至者及今殘齒未盡一識特起之賢可無驕瀆之辱也亦可以言平生不失矣雖然尚有所患蓋當天子未用明公之時某既能少知賢人襟蘊矣而願見之請乃伸於四海傾想之後使勢利題評致疑於隨俗紛紛也此鄙心所為自憐伏惟明公肯賜亮察知其未嘗自輕於朱門則明公今日之爵位非能使某去彼而就此者也如是而羣疑息矣某著作未成今所存者乃閒常應用之作適可觀其言之工否而明公以為可也則獻之屏牆良有厚幸以為不可則前所云云悉出所慮之外矣與楊次公書某頃年同諸生録鄉先生王補之文其中送行序一篇道閣下於三禮之學用力敏强悉能考正崇義舊圖以成一家書最後又聞閣下作極書以攟糾太𤣥之所不盡於是興歎聲以為茍於學事短闕安能遑暇於斯沾沾舉人檢韻商對偶以臨效進取之文常若不及彼於先儒之業是非乎何有夫二帝三王之治默滅而復行於世凡有心識莫不知之然則陳迹餘文存與不存知與不知於當今世用何所關礙况於漢人隂陽星氣律厯推步之學而足討論揚雄在時笑者頰輔已疼到今千載士雖間有讀者而𤣥之道實無寸刻得行是以太𤣥三禮之書其度數是非不為進取人貪愛亦有由自但博聞多識先王之所以貴夫窮理則六合之內外茍可以為說者詎容不知韓退之稱欲盡讀人間所有之書蓋非偶然之意農翁之善蓄稻也層藏纍納有淹二十年不發售者紅枯自腐童子知其不任炊煮然而莫敢以不富謂翁則夫閣下之用心縱不能助功勤於今然亦足以對舉人稱富夫富非家常人有之事也則補之寧能不以言補之且不得勿言則某之區區方闕然而多識博聞能無賞歎日者㑹承閣下來掌敝邑之簿書私懷喜幸以為平昔之所聽聞正遂親見二書所至冀將得以借讀而就講之而不自知疏惰之因仍謁未及陳而閣下已赴臺符之選願往而莫之前於邑何盡自車馬之去邑且半年矣雖不嘗參奉神鋒而傳覽閣下之辨論文辭亦既良多念二書已足傳世而士流所說復不止此皆稱閣下精逹老佛之書有底之論以備咨諏嗟乎閣下之富其遂不可極耶何其力之豐也昔者孔子門弟子下及孟荀揚王諸公皆無力於鈎考繼傳數制之異同與夫掩襲星官厯伯之所失顧其有以易此則亦未易言耳今閣下悉能諸公之所不能而又收功於老佛則夫未言者某知乎哉知賞歎不忘而已自撫去洪次舍不逺方以拘滯不獲亟造談筵二書之講求何時適願况於老佛之論而敢蘄於側聆北望下風欽悚欽悚又書某惟閣下之所有足以從之講學以助多識慱聞昔者奉書言之具矣念之勤謀之久卒不得焉命也自過鍾陵始獲奉拜風表而從容承論不克久次北浮湖波并到樅陽私心嘆慊戚戚不自忘已近乃蒙逹理者相寬譬焉其言曰學非名數不立乎應曰是宜知耳即楊祕書罷今官遂髙超逺往不可望見乎曰未可量也吾子之鄉人事學者特吾子乎曰五百人也知楊祕書為可貴者誰乎曰罔不然也然則從之者寂無人乎曰否苞槖就洪而師事者四十人矣曰若是吾子可以勿憂以叟聞之器不大者響不洪求之誠者應必露未有拍麝而香不揚涉澗而足不濡者也信以祕書之才俊溫良在祕監中不失知聞可語士矣而子之鄉去洪三百里士五百人并知祕書而從之游者有四十人夫四十人者之為是行豈悅其聲容跪揖而從之耶必將有以求益矣彼知以益為請則楊必有以應之以克副求楊之道者自今滿子之鄉子可以傍觀竊聽得之如其反是也吾為子乎可弔矣今何戚戚為也伏惟閣下有樂育人材之志又當推仰之資開明道逹投迷以悟則區區南城將多學者如某之愚或亦有望以不為逹理人所弔豈任幸甚謹布襟私幸察幸察不宣某頓首請見李宣義書今日㝢內財賦充羡中外帑積貫粒朽腐彌漫相因宿史老府之所褒歎以為承平以來未嘗有之可謂富也威械壯旅雲布營壁且作且增訓練之精誅賞之明黠羌悍敵之所疑畏以為和好之世何事爾也可謂强矣然而丁黃之籍月益户日益名比方盛古曽不啻纍十百倍而晏安之俗未大成憔悴之志未盡平則是民安之未至也夫為天下如黃帝亦足矣而書傳其事不過國富兵强民安而已以今廊廟之吁俞精鋭十五年間該通委備坐致富强如此而民獨未得其安則惟賢才守令稀罕故耳無土不家民無位不置官西北徼乎彛漢東南窮乎海嶠郡邑相望如晴霄之星見而咨訪其人求無屈恨則百不一二焉以為髙材美質不容世出則藹藹多士之時其三光五行將非今日之天地中間乎以為搜㨂委任有所未至則褒厲之玉音薦揚之論牘屢出交上豈其皆虛飾僞報乎使善評理義之士考鏡于此則亦有衆人常多君子常少云云焉耳蓋嘗聞之古者道德郅明之代其法度既立則有以使人人自盡也其人之才有所不逮猶得勉强以成其務以不為曠瘝使民有所依倚也後世此道滅裂而士之所以自養與自期莫非茍焉則入官之計主于豐亨利逹而已自非賢德異才卓犖挺特不淹于流俗之習慨然以忠誠為己任則休聲和氣何以有見于聚落之蒼茫乎于斯時也有身有家得一日濵近于休聲和氣之地既可以慶幸又况乎居遊作息三載于其部乎某困窮無所可用者獨能推尋賢人君子之用心自閣下之屈于敝邑于今蓋垂兩月而私竊快忭乃至居行夢寐之不能忘夫區區一布衣亦何所不容哉以為四境之內姦詐遂息善良遂無患則百里之安非細事也固為廊廟之福矣是以不自知其咨嗟慰悅之深也夫求閣下之所以賢觀閣下之所以得民亦豈如天鬼之不可測度必有一言可以盡之則忠誠自許焉耳推行明智以聽斷于事物之際而操心耿耿未始以一邑為不足屈我而蒂芥于胸次此之謂誠古之人所以深山天下無適而不自得常不失為聖賢也夫道與之貌天與之形人與之名其中不可掩者至誠而已使閣下而得志愈尊于此位則民之慶幸愈廣大而衆多豈唯一國固將兼及四海矣蓋賢才之所在稱慕于千載之上而不為久重趼于萬里之外而不為逺以南公之不佞而卧于田廬乃得與為閣下安靜之民豈可不一識賢人君子之顔面而聞其緒言乎非不知布衣分邦君之庭為末俗之禮也以為讀書想象風采之不足不若涉末俗之禮以遂識賢之志為輕重有所措也夫是以朅來謹伏署廡唯所以命上知縣書士嘗歎悲以為見賤于世夫世亦安能必致賤于士哉顧憂所以為者或非士而已矣道有內外而勢有崇卑此其所以為世今惟學而無所得于內又何望貴我者于外而必欲有得則望固不足以言之而勢之所居又自有常何足歎孟軻子思窮為布衣所過之國爭餽而競禮直將以為君師而二子當時于餽或却于禮或藐此唯其負所貴于內故耳及其勢在宜屈則雖州閭之走吏操檄而譟于門其必悚遽攝𬒮而從之豈不以我之所得不足以廢彼勢之所崇歟今夫以士自名而其實或未有以倣佛昔人之毫末然而烏冠素袖相望持謁皆足以抗禮貌于勢位之前夫專謂之不我貴何哉特未之思此而徒縮縮乎慚且病者皆不足以語為士之道而其歎悲亦自苦耳安能動世某不佞少而願學長猶未之有成是以未嘗輕望于外亦未嘗不以孔孟為之依歸昔者先人有户于此邦而生是寄焉則據之以為家方緣貧苦之故未免隨應舉覓官之後則雖食無田而棲無山猶不可以捨而之他也又况乎墳墓族親實存此地哉伏承執事以賢來宰而聰明詳敏之器韻方將發揚仁風德政于茲思同邑氓均賴涵養之賜不敢自匿而不參諸生以進拜堂下稱慶幸于為賢大夫之氓於心實有戚戚也若夫歎悲之與見貴皆所不以為意惟左右亮之而進退焉與傅公濟書公濟足下羇旅無恙一别八年無由㑹晤思慕懸殊音塵遂絶間者人自西歸能言動靜聞頗近利伏惟慶快早嵗參陪遊集得觀辭誠何嘗不以名教自居相期懇到沒齒以之不謂一客邉方遽喪本心割徙情愛輕忘墳墓二親白首孩幼滿室隻字不寄逢人不問嗟乎公濟乃及爾乎庸衆之人不講文墨不師聖賢然其骨肉天性各懷種類撫循依聚今古無變寧有齊魯門徒三試禮部志取爵祿臨涖小人而肯滅裂家纍了不顧省古人有言青出于藍而青于藍氷生于水而寒于水公濟日交外蕃輒亟過之能為世俗之所不為青寒逺矣公濟豈以故園貧素不足存活乎則父祖宗支嗣慶綿衍非不足也自公濟辭鄉以抵今日朋遊零落死亡過半人老多慈陌路猶悲寧公濟固無懇憫耶若劉氏婦翁夫妻繼逝尚無幅紙以申弔問則于他人不論可知嗟乎公濟亦四十矣豈其未能不惑乎其亦放而知求乎身無李陵之罪又無蘇秦主父之怨而甘心異域如處清都古人可作公濟孰與女當結褵男可就學公濟棄之誰宜收之祖夫人九十尊公亦七十有六矣父母之心養老送終天下一致公濟非無五內而不以此念是獨何也客有誦公濟矢死不還鄉之語者曰身可沒魂不可歸嗟乎公濟生于空桑者歟猶宜有抱哺之情也忍為此語聞者酸鼻僕不佞默觀公濟程躅自惟不當更以故舊奉望然尊公相過眷眷在談聊申憃言以備切偲聽之怒之唯命而已公濟勉之吾言不再
