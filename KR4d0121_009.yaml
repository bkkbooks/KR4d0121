body:
  text: 灌園集卷九宋吕南公撰記麻姑山仙都觀初建東嶽府君殿記熙寧三年某繇建業歸眀年夏五月訪仙都視觀東隅有屋正新問其有且新之自道士曰觀故有岱宗府君像而几筵無次遂掃鐘樓下以居前道正黃君太和為吾言吾山百靈正位而此神尚坐鐘樓下非禮容咸秩之意我慮之以為恨則謀専起殿以遷之覆其槖中資聚工取材既竭猶不給又持其説以率鄉邑之豪使各出力助是維屋之所以有新余聽而善之又眀年正月太和以書來陳岱宗府君之有殿也經始前年之夏而畢役去年之秋凡材章覆填之直費蓋五百千而丹青綵漆不與計殿之制以楹數之得十有六環殿而室者其楹又百六十有竒應為我記之以辭某曰然是固宜言嶽神者祀典之所謂尊視三公而衆神之莫得班者也位在名山乃不以正謬將誰任善矣太和之能慮也蓋天下之事所為乖序也常因乎小或加大而宜尊者反卑知其故者或力不得以正或雖力而不強是故理亂得以相形使夫任事而必此之知知而務正以力力又克強常如太和之於此殿則叔世何必有而太平何須頌聲哉吾於是而感焉太和有道術沖厚君子也賢於其流衆莫不敬之故能訖恨濟謀起今有於昔無遂正宜尊之位余雖愛文誼猶不可書來之三日丁酉記云大仁院重建佛殿記殿為屋名不見於古經以爾雅細碎猶不著而南華説劍乃著之蓋六國諸侯初變題號以異者為髙至於秦窮而其稱遂著其究主以昜乎內外朝之名劉漢始承惟視事之位則以題之乃世皆爛熟則宴私之地亦以題焉禮文之變其必弊如此象教立於中土帝公助其莊嚴故梵王以殿居而學老之徒攀玉京稱秩其奉與梵王同孔子死二千嵗乃蒙王爵而有廟于天下廟有殿此三人者生無百里之勢以臨衆民而死以能聖之德享齊大君周公復作必不發論凡為殿壓以鴟吻環以鉤盾其庭容其陛崇其位正以深其事重矣勢非君主德非孔老釋迦而輒居焉智雖不及周公論之可也夫天下之人知殿之名尊而不思所以居其尊是故輕於奉擁而不當公義自今而察茍有靈真之號於佛老下風而因其所奉之力足則皆居以殿而不疑此與夫宴私名殿何異至於房祠邑祀民一以其正座為之殿嗚呼作始有倫而令乎婦女古之人豈虛言哉是維世習之極弊而鄒魯搢紳以陽弗聞為宏者也而今則論焉豈勇於反之哉謹禮之變難俗之非緣事以寄乎情故論焉而不以罄凡今三聖人所享唯梵王為莫盛何者孔子之廟郡國或以為學則謂之盛然其中皆一殿而已佛老之居謂之盛者其殿則二三之而精密壯麗又不可資其如是孰能肩若夫鍾梵所建星分鱗布於井落山林其勢雖不在於盛而各不失於足蓋徒有院佛有殿斯足矣事有然理有原此又余之論而不以罄者也江西之縣四十六而南城居縣之一南城之佛寺二百一十五而大仁居寺之一其地去縣七十里而遙其於井落山林蓋又居星鱗之一而長老言其起於唐太和中然則焚修舊矣光化三年行常禪師於此遷寂其真身塔在今院西偏鄉民禱雨之地懷赴如響故其為佛事也滋足熙寧元年院僧有暹請於衆言吾舍畢治惟佛殿宜新而未新於是里豪余致收者率力戶資之或敦匠或獻材諸役具至是嵗十月戊申新殿成諸像亦蛻塵力戶來落之相與慶歡凡計其資雜五百千而羡論其資之優者指過有成黃守安徐守忠衆謂有暹必記於石以告而勤暹雅於余遂來懇乞蓋非文無以行於逺也使世道而每不變則此院之得名若暹之謀余過黃徐氏之力何必無繼且以余之不佞而文之不茍也何直嵗月云乎論雖不以罄世必有知余者矣有暹姓陳氏其為人靜以莊其舉非輕於奉擁其乞宜於莫之拒殿成後七年冬十一月記華藏寺佛殿記代郭主簿作由道而為言淡乎其無味則中士以下有不足以循之體道而立教則故常玩昜之俗有時而不振輔教以制法則依違茍且之弊遂變而形見至於因天下之理迹而耀之以禍福之利害然後多欲之生民莫不悚動而從之帝公之貴富臣庶之賤卑惟聽其所煽惑而已萬一愆負容貸而佚樂容致則冥冥之報顯顯之責非所過而問焉也其悚動之心一至則割棄髮膚炮灼頂臂無所敢愛而况於身外之才力乎此釋氏之莊嚴所以益新而每大也崇仁為邑領治八鄉而郭中塔廟華嚴居其甲其佛殿之雄麗費財五十萬乃能成而嫠其氏具出之彼唯悚動之心一至焉耳某年月日始事某年月日落成凡其所以為之雄麗者莫不竭盡其方術嗚呼亦已勤矣夫為婦人女子不得出於盛古之際而同流俗於教法爛漫之後求所以善吾身於存沒初終既無所取循矣方又觳以惸惸之嫠而其資利蓄藏傾於一殿而無所靳也其心豈不可矜矣哉余為之書蓋所以矜之元豐元年六月日記北池記北榮盡間對而周之其制如庭其霤下注鍾而為之池春動以來泓浸襄階憐其無物涵遊訪於㕓買四五魚鰌養之其中異時奴獻田之螺又選十數養焉日向久魚産童子十餘口蕭蕭相從浮頭漪上或驚之暫沒去少頃復出噞喁以為愜比其長矣雖屢攪之猶不現余於是感乎人之幼壯也既七八月天不雨而霤絶漪痕稍落羣鼠輒夜下漉之麗泥而魚善奔潛鼠不能有所執唯螺鈍滯又無逃鄉鼠食其肉無孑遺當是時鰌遁最深雖工於漉者猶不克覘其尾余悲螺之為物有殼自周而以不敏於運故見戕於鼠又憐魚雖奔潛而終不如鰌遁之深也憂其水大涸則并不免鼠禍呼僮掬而徙之他池因書感為北池記韡韡齋記錢塘盛襲眀從其兄殿中丞簽判於建昌日與三弟講學於官舍一日署其齋為韡韡臨川吳文仲者仰而讀之悚焉誦司馬牛之言曰人皆有兄弟我獨亡誦已其容有蹙襲眀使來語曰非子無以説吾署齋之意余故為之説蓋名之不可以不應其實久矣草木之生皆有不孤之英葩而詩詠萼跗獨引棠棣者彼固有以昌其美於實也以天倫之璀璨夫豈茍以衆多為貴顧必俱昌於德然後乃為可貴間嘗思之問學所以進德也襲眀年二十汲汲然甚於趨利者其弟襲美力與之相亞探拭研礱不到不置不盡不饜何但外而已蓋已邵其中何但達而已蓋將大其功譬如縱宛駒逸夷路其勢發發人驚其進而莫知其所止也是維盛氏之所以昌而韡韡之所以美若夫世官餘祿朱藍合遝尤非所以恃者自文肅之興諸孫以不試仕者七八十身而襲眀未嘗道也按此亦足以嘗其所慕矣視今天下庭闈之所庇其兄先弟後者家不為少然不短於才則闕於行不自禍其身則召纍宗門此其與詩人所歌終鮮何異若犬羊雞鶩其同氣非不總總亦其無以離於物雖多何預比數且襲明之意豈能為不預比數者謀之請以吾言謝吳君襲明曰然謹用以為記得軒記余已記韡韡齋襲明又以來言吾之於道也求之內而已內者固道之所集於我集斯備矣而猶將之以求蓋不勉而中不思而得者聖人之事聖非吾所宜居則得與求因其安可廢雖然至於忘然後得非所知也而况於求乎哉五常百行所以足乎已者也而性存焉非外取庸何求軒裳韍冕豐功大業所以利乎人者也而命存焉非內必庸何求然則吾之所以無待者其可知也古之人不以一室之眀而忽天下之光也使吾徑出於忘猶不果以求諱吾齋之陰截壁而檻焉同吾三季於其間論義遊文以俟其求故題之曰得軒得者為未得者懸擬之也使其各得而之忘夫然後可慶吾韡韡未慶子姑為我書南公遂書之如前老懶軒記年中半於七十衰非暮疾非痼世不以為老求心循理畏衆人之所畏世不以為懶而我則以之自許焉唯其處順而委蛇故也聞古之至人與世浮遊於物不忤謂我馬則馬謂我牛則牛環乎其莫之擇也故能免患而自得若夫睢旴矯揭甘譽而苦毁則亦焉往而不韄其所寄哉昔余飢寒力不足以活身則倣諸生為進士以幸於未殍及既為之則識字過多序言過奇思義過微超遙不戒遂違羣衆而登列莊韓栁之域蓋已嘗懷蛇足之疑矣方是時也論者固以為善於古文章而不善於今辭賦非所以適一時之用余聞之不已嘗疑而致悔也又加數年更事厯變憂傷熟爛齒壯而氣鬱矣慮煩而善忘矣天下乃始以記誦補拆相髙倚文信安昌之牆效顰受唾以相軋也余雖欲從之而智力踈矣於是倣徉斂臂蘄為無用而已夢想田廬以規圖飽暖耽玩文史以致其癖嗜而人亦次第不以飛騰相期也蕭蕭乎潛移而默運猶懼有未許我者也揣摩人情願以老懶自蓋有過而問焉則崖略以示之果轉語以譁莫之信也或私於吾僮曰而公視昏而嚼廢乎曰未也尚日書細字啖牛皮以食酒然則乖慵放肆寞無所省乎曰否工駔販出九年披翻紙册吟寫咿嗚未之止也然則奈何老懶之云乎益轉語以譁余聞之而頷曰會當有眀之者矣俄有人焉為衆釋之曰彼其今之不善於記誦補拆也猶昔之不善於辭賦也有不善之實而名隨之雖欲不居其安可得夫百果諸蔬毛血之類均以養人然過久不取則堅頑秃觳而不美實始見棄且廟堂宵旰羅網羣才亦主於養人云爾不適於一人之用則委而不取猶果蔬毛血之以老棄也謂之老宜矣雖然其有以也或出於莫之為也可以為而莫之為謂之懶宜矣余聞之而大快如世之獲官榮利澤者也曰善乎許我於無用矣蘸筆以題偃仰之軒謂之老懶所以順而自蓋也嗟乎德不及至人而時之委棄甚於馬牛余之優幸大矣異夫時之不召而自往未信而求試者聽雞裹飯待曉棘籬之外變色而爭進腋索臀搜以即脾爼之後輟食忘飲流汗被踵顧晷影以促促然驚憂愁五內以覬覦也老懶者其知免矣夫必不以余為軋已且譁而論之矣記於軒壁以述優幸虛齋記萬億及秭之廪積不自知其容而儲甔石者見之色動千門萬戶之宫室不自知其庇而老蓽圭者聞之心醉君子行賢而去自賢之行故無逺邇無小大雖甚蠢庸猶知敬愛而推服天下所少者才也才有以應萬事之變而所知有不至焉則天下所少不獨才又常在乎智也智足以知才足以行而德未至乎忘則雖才智既異於衆人其究猶慚於逆旅是故古人之論誠賢必以俊而能厚為無以尚之蓋長民者俊有餘而不足於厚矜張脫略之俗繇此而漸成其敝豈一躬之薄而已臨卭李侯之為南城撫事旬日而清俊眀敏之聲流於四境幽村僻落夫婦之愚連合之憸心遊語恍然若令在側莫敢欺莫敢違彌年之爭直於須臾一介之善坐享安集其為政治砥此則才智之具可知矣人蓋知敬愛李侯而不知李侯之自忘其美也居無幾何獄訟蕭踈朱墨間暇便坐之北始葺室以宴休而題其榜曰虛齋有請其意者李侯曰吾惟虛涼而領劇邑懼所未至故俯仰於此以致吾思若莊之生白咸之受人皆非吾敢也於是邑之人聳視偃聽莫不推服李侯之厚真盛德之若不足者也夫自先王之澤亡儒者以彩飾相師其所論治己與治人熟其言焉耳亦何嘗有人見哉李侯文史縱橫倫輩莫敢望其屈於一邑為南城之幸會天其或者畀此邑之見見聞聞使一由於勿薄已乎讀書以俟之異之時士若民克知矜張脫略之為可耻夫然見李侯之於此邑心化之矣元豐四年五月一日記妙靈觀興造記宋興五十年天下富康上方虛懷瑞應展儀脽泰而黃老教術在所嚴崇祠館之建彩飾相望有復有增如昭出冥如株斯榮彰眀秀衍海內傾注徒患無志不患無地徒患非地不患無財官聽民悅悚踊集就細大具作有見則立於是時也勞坊為觀籍在而屋亡齋壇剝裂榛莽焉耳道士凌宗旦實經營之觀泉陟岡圖位像設蓋卜築三徙而後得今所據其昌漸矣備而未大也肇自祥符甲寅至於嘉祐己亥而宗旦下世又二十年元豐之戊午而其嗣孫黃世南始新而大之為寢室為法堂眀年為三清北極二殿又為東廂又眀年為西廂又眀年為三門外門又眀年為鐘樓而屋之壯麗無一不備可謂大矣屋以楹計為二百五十錢以萬計為九十三其役勤矣而唯三清殿費出於蕭績餘皆世南以相墓宅取資於人而致之初宗旦之師魏元吉者江南樞密岑之諸姪岑死元吉棄官奉道能詞章居南豐之真元觀章聖時被召入玉清昭應宫焚修久之以母老求歸而時相許之蓋嘗有志於勞坊而力不足及歸老矣宗旦為成之宗旦者虔州興國人有遊藝善為人其得世南而教之盡其方曰是孫可倚以大吾教者也果如其責云嗚呼有時如祥符有志如魏凌乃積嵗如許而未及於成比及世南則閲五嵗而始成焉夫亦數之存乎安得智者而與之言哉勞坊昔額也治平中改賜妙靈觀舊無田以食故茀於祥符以前及改賜額而郡守吳絳將以寄房法廢之世南訟於轉運使得復存及新屋也資有餘則又買荒田為之地而居養之計足矣始過余述其勤曰願記於石有告於後也使之知繼余以謂繼非口舌之能致也俟其人可矣詩書所陳興王之祖宗憂勞懇刻一言動不敢適已凡以有繼為榮爾而果每榮乎其枯固已屢矣何况一觀然則今日之記妙靈當如後世何無記可也若夫枯久而落落而亡不勝其殘毁絶沒然後有知榮之為美而作於中興則今日之記妙靈庶幾有想聞而感激者歟記之亦可也繼乎繼乎名籍之云乎繼必若世南則吾為之言無愧矣五年壬戌秋九月記茅將軍廟記將軍之名不書於史氏而威靈福澤有以動人豈其知將軍者不悟於可神之始而直悚於已神之後歟初熙寧庚戌年余過江寧借圖經讀之見溧陽縣東有茅將軍廟云將軍俗或呼司徒其解引稽神録所載浙西僧德林説常至舒州遇男夫獨剃草於荒郊者德林問欲何為男夫言家在桐城前自縣趨州至此疾足不能進倒卧草間日暮四顧不及人煙唯聞豺虎嘷嘂於時分謂必死俄有部從如大將過焉顧見吾卧為下馬停徊又指麾留二卒曰善護此民清旦送之其家無恙語訖上馬忽不見男夫病稍輕便強起問二卒汝主何人二卒曰是茅將軍者也將軍常夜出獵虎哀汝或傷故使守汝問未既而東方日上二卒亦忽不見自是能步徑歸吾縣今疾無恙矣吾德將軍故從所見之地為廟以報之德林住舒十年比還浙西處處作茅將軍廟稽神録出於南唐之末然則民知將軍之為神正起於此耳建昌有廟在郡西城之外衢之曲舊無石記不知建立何時而民之欽畏歸賴皆曰茅司徒我朝之福帥廟屋老矣而未治近廟居者太丘陳愈為神謀之神亦見夢於愈愈告衆曰將軍庇吾人者蓋其所以為神自其聰眀正直愛人而已今廟向壞無以新而報之其過在誰乎吾儒者固將仕而以愛人為務事宜與神不異我不悅夫庇吾人者之無奉也為率邑之巨家共出資而大新其廟起殿起廡起門及解牲之厨客神之位粉飾塗覆畢善廟成于熙寧五年孟冬某甲子凡廟之屋以間而計之蓋十有九眀年愈為余誦興造之勤余憶江寧所讀而示焉愈曰為我書并吾新廟之時嵗我能勒之石以謝衆於是從之六年秋九月癸亥記黃籙祈雨記天下之方術有見者能為唯謹者能傳克誠者能用自道而觀世則消息盈虛若非力之所容致自世而觀道則凡相靡相張相資相亡相終相始必有以寓乎常而適其變者此博逹之家所以坐覽羣學而捐情於棄絶也先王之盛時其奉天地順陰陽於何弗至而於祈禳禱請有官有文委曲備具是惟為國之訓後世教治政令有不眀有不行積久而遺初遊波而昧源為士者且不知領略豈論於蠢蠢之民哉方術之多滿世其何怪且彼為之其有以矣愛人利物以本其志尊天敬神以行其言智不必能通天地而人皆凖倣而揄揚之矣夫以閉南縱北縈絲摶土而救嵗旱考之經嘗著乎而用每得志則其傳之莫禦也固宜比及下流徙市禁屠歌呼奔走以至焚暴無所不至而固令不沮豈亦為其有以歟為譬則耕傳譬則時用譬則力道譬則榖榖無不可養人者耕之方不必同而事同有耕有不耕而時同耕且時矣而心不専志不致則亦鹵莽焉而已矣今世之論或鄙方術如棄絶之晚即或用之而不能誠是皆未足以言至理蓋古之所謂克誠豈草草之云固有以尊其德性矣不然匹夫媪孺叩顙而囁嚅亦可以蒙君子之感格矣熙寧天子在宥十載以海內登稔故昜紀號為元豐而郡縣漙率山川之神所主異數風土之沴參差或見猶之十尺華壇非不溫密而一毛不得理不無之三年時南城夏不雨彌三月縣令為之盡室不茹葷夙宵出拜土龍舞巫如市而夜漢愈明徹當是時人以為雨果不可禱四年五年皆然六年時臨卭李侯為令政事畢舉是夏閏六月復旱閲兩旬為七月朔旦李侯率其佐禱於仙都至則問道士亦有方術乎對曰教有黃籙道場是可以致而無信奉者故未嘗用李侯懇然趨為之香煙始升晴昊忽微曀有頃四山雲合雷作雨大至國野以達四境皆言霑足於是人知李侯之誠有以克而方術之足用雨非不可禱也李侯為余言識戒執作戒偽未克乎戒不足以言學茍為克之焉往而不善皆知道無所不在而方術之擇皆知方術之可存而黃籙之忽其未之思乎為我記之以告能用者以慰能傳者亦將有博逹者雍容而評裁乎其知之乎余辭不獲遂以記普安院佛殿記廢興有時乎吾不敢知而理存焉行為在人乎吾不敢知而義見焉知其可而進之能盡其力與心以不墮於悖夫然故事得而道順順斯行行斯立矣戞戞之誠自我茫茫之數自彼未之至而不忘於圖前惟其分之循耳及其至也若非所以馴而致之者有矣謂豐年不可必而怠於耕非聞義者也謂不匱出於勤而預多其廩庾非信理者也未嘗怠未嘗預多而作緒其宜獨安知所謂天同而神相者果虛言哉余少之時從閭里輩行往來鯉潭間入龍安院問髙寨之名於父老能言者蓋鮮或曰犁鋤之壠畞時時得繡鏃蝕兵則知其嘗為戰地矣其勢隱坌顯亢如卧虎如伏龜四陲所壓皆以俯瞰如登樓而察市信夫其為必爭之利也喬木蒼煙蘿蔓蔽虧鐘罄不鳴或不知僧居之在其上於是時老屋數十楹僧三四人童子八九人晨夕曠適衣食僅給而事佛未嘗有殿人不堪其嗟而僧末如之何也又數年余得唐書吳録讀之按知僖昭之代所在盜據而黎汾危全諷之徒相持於此鄉髙寨之名蓋起諸此時不見其為院之因其亦兵荒之後無可考歟治平時詔昜寺名而龍安實為普安熙寧之季院之尊宿相繼遷寂今仔扶師獨主梵唄年少刻苦以戒律為己任民之佛事待師而足於是院有昌新之勢矣元豐六年七月己巳院南居人薑君惟積初為之建殿凡土木丹青石甓所集費錢四十萬其規制之雄工巧之妙皆絶常手殿之成香像亦從而具矣是嵗十月辛酉又為之起僧堂起外門其財用不在四十萬中普安為院壯麗垂全矣一溪之陽大路之衝平沙廣野榛莽不隔巨剎凌空簷翼玲瓏金輝碧彩燦衍於林端木杪不俟標榜而行子知其為如來之勝宅矣江君純厚人也余嘗從之問力田生財其語條達而不紊有見於體勤榖分者也其配黃氏能同其志於為佛事歡喜讃歎如恐不得為之其於普安尤懋焉夫武成之主不作而儒者言動足以導民長善者幾希若今之俗棄擲仕學而襲蹈園廬其欲逺離凶德舍事佛其奚所歸乎江君是已傳曰何有何亡黽勉求之深則方舟淺則泳遊固其所也人有一錢之屨數節之杖曵而卓之必擇地而置焉孰與多事之際物輕於錢不啻鴻毛之比大阜而夫婦傾心捐四五十萬於佛僧不之彼而之此亦偶然歟其有在矣普安乎昔之血刃披猖孰知後日之香火焚修之道場乎昔之寞滅亡無孰知今日之輪奐渠渠謂之天歟則吾不敢知謂薑君之為善仔扶師之持教各能盡其心力以相遭於此時使普安為院勃焉興且盛是豈特人謀之至殆亦理之會歟理即數數即天天即義義即理吾不敢知者以立乎人吾終及之者以進乎天以勉夫戞戞而或疑於茫茫者故書殿成之眀年嵗乙丑十二月甲申灌園吕某記真如禪院十方住持新記聚人徒駕師説其為奉養勸相固有法度立乎其間舉之存乎人謹之繫乎官孔王之庠校佛老之寺觀所以茀廢興盛未有不繇此者蓋善衆以道眀道以教振教以法法者事之成始成終小之不持大之安放維佛事滿天下而戒律之席為多禪定名門居其百二而已禪定之師缺則官謀之戒律之席則如不聞吾求其説矣非以戒律精苦不俟飭勉而禪定汛衆宜有所齊乎是為政者未之思爾夫精苦行之至難也人人能之則無所用乎師資矣然則相與昜而勿治是縱蠢蜳者假衣飾以醉飽膏腴匿形鐘梵以遂其私焉耳始制失之矣方來則不圖所以裁而革之其為不思孰若無政之愈民之鼓舞於佛視其所至刻食減衣自一而百至于千萬億足以供四海之僧而况於占莫限之美田誦書拜像自蠢不慧至於僅有形氣莫不仰東漸之聲而况於值見性之達人維澤有水浚則為淵導則為川吹則為瀾而水未云自表也有天下者奉佛惟恐不足而百官有司不謹於為其徒擇師長考名實過亦甚矣余行人間覽觀大山長谷奇勝之地必在佛老所家其以禪命院有舊而師一非其人官適不之察則鐘梵餘間坐為盜冦屠博之林豈論夫草草勿問之聚乎哉真如院故曰地藏西距南城縣六十里在應寶山之陰長嶺之址天成三年閩僧惠通於此結庵能以精苦動人故歸嚮者日加居老矣得文敢者繼之蓋自通初舍至於乾德甲子積三十七年而敢始建堂殿佛事以盛有田七百畞畞二穫鍾一而贏其山林場圃池籞之利又從而具其為奉養裕矣惟戒律無德嗣故裕乃所以資其為愆夫中下昜流而勸相莫尸則亦何惡之不長何心之或回爛漫無稽果至於屋破田荒舉債以度晨夕其敝可謂極矣元豐六年臨卭李公在令位聽採所及為之太息曰是亦吾民也呼其主者詰而誚之凡院之所有嘗見侵者使之還嘗致罔者使之止無稽之遊黨使之絶又告於上命以十方住持擇其師得今長老守訥而付之禪席曰其爾克舉師唯唯後三年遣其門人介乘來請文以記其事初師寄廬阜與大知識惠顒遊相好元豐五年建昌太守命顒以太平興國而師與俱行故李公之擇真如近得之餘未識師也其請文則顒為之先夫虛心正意眀不二以待羣迷倡宗風而全獨有師其有以葆之是之謂舉使是院之興終亦茀而不廢繫乎能得其人則必有令如李公察擇清平在法有嚴在教有眀夫然故十方之名實無負是之謂謹若今執筆志敘則又余職也其何避之於是應其請而記焉是時元豐八年八月戊辰灌園吕某記龍母墓記在南豐縣八十里熙寧間農夫遊賦妻劉浴於溪遇黃犬迫之有娠産兩鮎魚以大缸貯之須臾雷電晦冥魚失所在後三日劉死葬於溪東磯阜之上數日雨溪大漲衆見兩魚循繞墓所疑以為龍也
