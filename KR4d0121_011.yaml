body:
  text: 灌園集卷十一宋吕南公撰書上運判書代鮑久道作昨者再奉臺符督以進所著文上中書備差擇充學官事自初承命至於今日思之勤矣而終不願應者未能無說於此蓋聞士之所以善於行身也以其能不近羞辱而已矣知夫羞辱之不可近而求所以逭之則譽不足得而咎無自來往者某惟勢未容於不仕而義又可以出也則持諸生之業以干有司之見收干之日久至於四上禮部而三黜乃得一出身為選人間嘗內悲以為雖趣時天下之所同然自道而觀之則彼未之信而我嘗請試彼未之與而我欲以取是皆得辱之道然則某之所近不已數辱歟數辱非所宜堪此又憚恨平昔之無能少逭者也今夫廟堂之慮將以致風化於同文而推擇賢才司其教養此其意豈不甚善顧被舉之人猶有不宜輕動者舉未必信而信未必用也夫合聚數百口之辭章而待一二人之去取此其與應試諸生豈能異哉就如見取或不足貴及其不取則是三黜之辱復增為四豈所堪耶幸㳂下局得居明公察臨之下祿以養親官以庇身行法以俟命可矣踐非所宜以近舊辱正恐一日自悲之不暇所不願也焉能知其餘圖所以行身不失於善而已伏惟仁明當賜矜諒與汪祕校論文書往者辱示勤勤之意使以鄙文進禮几席承命既久冗瑣未能即呈乃今不免獻矣猶願以言嘗於左右蓋所謂文者所以序乎言者也民之生非病啞吃皆有言而賢者獨能成存於序此文之所以稱古之人以為道在己而言及人言而非其序則不足以致道治人是故不敢廢文堯舜以來其文可得而見然其辭致抑揚上下與時而變不襲一體蓋言以道為主而文以言為主當其所值時事不同則其心氣所到亦各成其言以見於所序要皆不違乎道而已商之書其文未嘗似虞夏而周之書其文亦不似商書此其大概若條件而觀之則謨不類典五子之歌不類禹貢盤庚不類說命微子又不類伊訓至於泰誓洪範大誥周官吕刑之文皆不相類也蓋古人之於文知由道以充其氣充氣然後資之言以了其心則其序文之體自然盡善而不在凖倣自周之晚六經始集七十子之徒雖不以誦經為功然其尊仰孔子盛於前世及孟子荀卿相望而出益復尊孔子而小衆家故秦火既冷而漢代諸生為辭不敢自信其心而曰我歌頌帝王盛德與夫論述世故皆出入六經峻有師法不可庛纇此西漢文所以見髙於世而東京以下學士不易其說也雖然亦其說如此劉向之文未嘗似仲舒而相如之文未嘗似馬遷揚雄之文亦不效孟子也張衡左思等輩於道如從管間窺豹故其所作文賦緊持揚馬襟袖而不敢縱其握自是文章世衰一世幾於童子之臨模矣繇揚雄至元和千百年而後韓栁作韓栁之文未嘗相似也而前此中間寂寞無足稱豈其固無人其患起於不知由道以充氣而置我心以視效他人故雖勞猶不能傑然自立去元和至吾宋又數百年而有歐王之盛宗其學者文辭往往竒特然至今者又已少貶蓋文之為道由東京以下始與經家分兩岐其弊起於氣不足以序言之人恥無所述因乃瑣屑解詁過自封殖且髙其言以欺耀後生曰文者虛辭非吾所取吾當釋經以明道而已疲軟人喜論銷兵是故相師而成黨嗟乎從之者亦不思矣夫揚馬以前文章何嘗失道之㫖哉今之學士抑又鼓倡爭言韓栁未及知道不足以與明不如康成王肅諸人稍近議論噫又過矣夫所為知道者果將何為必將善於行事而有益於世也不識康成王肅之行事有以大過人乎如以為行事因時難相比責則所以去取重輕者無乃謂學經貫穿衆說難於立意成篇乎是又非吾所信且天下孰有能飲千鍾而不能三爵者彼解詁章句三爵之才而已陸澄非不能說經而當時有書厨之譏此足以見為文難於解詁夫使韓栁為澄之解而有不能乎彼韓栁者蓋知古人之學不如此是以略其不足為者精於其可為者耳說者又云吾不論說經為文之難易但經術明則道可行吾故趣於此此亦不然夫康成王肅之時大亂數百年而後止此時學者豈不知宗本王鄭經術耶道何以不行也孔孟以前學者未嘗解經而言治者每稱三代且先王所謂明道者豈解詁章句之謂乎後人欲追治古經而按此以進焉吾不知其與捕風者何異矣天下治亂有常勢也儒者之才不務見於事功以助為國者之福而希世沽名茍為家說以亂古書自稱髙妙此何所補陸淳豈不明春秋希聲豈不明易祝欽明豈不明三禮然此徒於當時治亂為有補乎否也而後生方倚此論功不自信其心以思自古文學道德之變而更紛紛輕視文人且文章豈足為儒者之功即能之固不必恃然解詁人輕之亦錯矣是飲千鍾者不自以為能酒而三爵者反笑千鍾之醉也某不佞少年時浪事慷慨欲以文學自立二十有餘猶不得其緒以為能事止於時文而已蓋至於二十四五然後克有所見於列莊見道之書於六經見道之訓於百家見道之所以文而文之所以得於十八代史見道之所以變沈酣而演繹之竊以誠心自許私嘗以為文學之事雖使聖人復生不得廢吾所是而遭時不偶有前之云云天下滔滔未易同志唯當勒成一家俟之百世焉耳祕校才髙而識敏亟從時俊之列超拔入官而問學淹該如不自足方用謙屈乃以及於鄙文且某何敢愛哉但竊有所疑者當今文與經家分黨之際未知祕校所取何等之文耳若堯舜以來揚馬以前與夫韓栁之作此某所謂文者若乃場屋詭僞劫剽穿鑿猥冗之文則某之所恥者往時嘗為之矣然未嘗以之比數於文也譬猶美女時花細麗艷妖朝盛而夕衰焉目雖偶遊不足以為榮觀必若黃河泰山峻厚髙簡渾灝奔注與天地齊同而日月不能老之者此某之所以究心未識所取亦在此否旅貧而力奪心氣有所不專下筆超超或未了意祕校取之在此雖一言可以致亮如其取之於彼則又何言謹録書陳正事以下若干篇以復盛德惟試覽其如何苦熱煩汗書不狀心上時相書代鮑久道作相公閣下某竊惟之天下有慰悅不在乎分之必得而志之益通自足以為難逢蓋儒學之徒吟思文字之間識見經綸之方而軒然欲以有為於當世者古今有志之士宜其不少然而必得有為與為而克成者抑幾何人顧令有為而必成亦自天下之福耳於有為乎何有要惟帝相君公獲任所在當必如是乃為得意而已彼夫不在其位者何哉然士無用不用皆知以太平為心則雖草茅之身豈能無意於當世自昔廟堂康靖而八表晏如勢有無窮之寧而計無一日之患可謂盛矣而於此之時人懷一不急之言野興一自得之歌有沮而止之則悒悒不快夫志之各通者果天下之慰悅歟而分何足以言之某頃以布衣諸生同波仕進之業其於世道亦何足以當損益之毫毛而竊有志焉異時名忝一官更從趨走之事塵勞偃蹇固應無所復望而於今日若有所喜者豈非大人君子有為於上而下之無用亦猶斯志歟天開陛下登倚相公于四海喁喁之際而興除大計一將刷蕩有源之弊而扶殖甚大之功若今制兵憫農用義正恩以材考官察刑書革貢舉皆先代名臣所不盡明或雖明而不敢為者而相公既果為之為之且又垂成也但令當今剩有可大用之人不過斂臂稱是耳若某之不肖力不能效戈殳以助揚不戰之威名智不能精計算以翊弼制置之權宜故平時所工唯在於先王之遺經與諸子之傳言而今也英竒辨正之士又紛紛而衆起則某者果不足以當毫毛之損益哉然尚有言焉蓋聞天下之治必成以嵗月之久而君子之行事非持之以泰山不移則志不立以唐太宗之明而輔之以房魏諸公然終貞觀之世猶有可恨處假如當時沮惑於封倫等輩之言則安可知故今日之必致太平不在乎有為之難而在乎持以不移而俟以淹久也凡人之識慮多不得齊同所以相為是非往往未定方漢武留心丐奴時朱買臣衛霍之徒九十其羣翕然贊之而汲黯公孫獨知以為不韙及其擬議封禪則倪寬諸人傾意稱善而卜式專以為非不識為當時人計者許誰者是且定誰者非耶毋亦各順其識見所同而已矣晋武伐吳吳主具輿襯而廷臣猶有乞斬張華者憲宗取蔡李訴已入元濟卧內而東方諸侯尚飛章請得罷兵故夫論議之異同何足據依要當察夫事體如何而已矣今之天下治勢垂及如此而論者或以為言願相公之勿動以就有為之福也且夫天地之間五情所以不異者唯人焉耳則小人臆慮何嘗出乎君子之所知然為某者必區區於斯言蓋亦願通志者歟譬之不急之言自得之歌聞與不聞曽何足道然而必欲者幸上之人勿奪其慰悅而已伏惟賜亮又書某聞君子所學當博矣而其要不出乎仁義仁義之本存乎人之心而充積之盛得以立天下之道大之為王者小之為匹夫無加損焉學之於仁義豈不重哉自古聖君賢臣其所以相訏謨暇豫置天下於熙平而儒生亦以隱約之身扶持此道使不滅絶者其事業可謂神明矣然語其立政皆不過廣吾愛以立天下之愛盡吾宜以砥天下之宜如斯而已耳故夫仁義者學士之心所當汲汲也自始學至於終身自知之至於能行百日放之而一日由焉則得為善士百日由之而一日放棄則又入於小人某之不肖有聞於是久矣竊嘗自思以為道無所不可致唯其得勢者致之於天下為甚易勢之所得行無小大之間惟其才全德備者為無難方今之時有命世者出乎則足以勿論爾矣必如勢不在於命世則我何能知知求吾志於仁義而已矣自試於場屋以至為法曹旦旦以是誦之而遭會亨嘉親見相公登庸其經綸措置莫非治古之能事而前王之難過者也則以書先容於閣下且自道其慰悅曰願得持久以俟化成勿為異議之所沮夫某豈專病諛者而然耶以為今天下之望顒顒于熙平而言者或無益於行行者又無幸於成則道何自而立化何自而成我知慰悅與願持久焉所以志於仁義而已矣不虞事興慮外臺閣諸公乃以固陋之名上聞謂宜備員教學之一官而詔㫖下臨使陳所業决可否於有司是舉也某所能堪耶德不足於有聞才不足於有為何修何倣而取名於師資名出乎此矣實將焉責哉是固某之不能堪也蓋惟學而不仕則無以逹乎義也則某之所以在小官而不自以為不宜至於仕而不學則亦豈某之心唯其所言所行未之能信而遽將仕以教人則於義滋無以逹之義無以逹則不敢茍進焉某之志也伏惟相公道德全盡當大有為之世得不世出之君周公以來所未之見若今辨材任官各當器能大者制權而小者役職治化之序凛凛於垂成矣若某之愚尚何所效尚何所論然而鄙心所汲汲知所悅願而知所不敢也則猶不為放棄仁義之小人以辱盛時使今天下之士其德優於某者被用而不得辭則世已多士其荒庸固陋比視某者又不敢妄進則廟堂風化之意某或不為無助伏惟相公矜而勿罪謹布區區以盡愚忠上執政書為人作相公閣下某嘗聞之為士之道有二患而罪惡不預其間唯其力不能學而才又不適於用則皆足以自患其身二患之不免焉皆不足以踐人之形而充士之名然則小人而已矣小人矣則罪惡何足以少之故論之世以觀之士則平學不力之患易而平用不適之患難何以言之蓋今之士其學有非所以學則或不足謂之學此已甚矣而上之人又正因其術而定宜收可棄之名於偶然忽爾之間雖屢棄亟收何足以標題彼此之是非哉平昔之空疏一朝之合格則得以陵厲資迹於顯設之塗雖知其學之猶非亦不足患矣若夫效官揭職則必有其狀文不亂法而武不犯禁大者知要而小者及務無崇無卑無久無近無繁無簡一當有以慰塞乎人之期望是乃可耳十年領要任而利澤無影響三月親一局而理道得以稱此不亦才用之所露歟宜稱而莫之稱名可任而實不足任焉使若人殊無心氣襟靈則姑置勿論必如未至於此則慊恨愧耻詎有已時某之所謂學不力之患易平而用不適之患難平者時固然也自某之少承父師之訓勵日為求進之事藝以幸於一時既例薦於鄉久遂得第於廷亦有年矣顧惟平素之所治已不必問然由入仕之日奉法律祇教令窺尋明天子賢宰相所以緝熙經濟之意餘力習耕戰書相方略謀利病以輔養不敏之才而備當途頃刻之指顧雖知淺特不敢不勉亦至於今者而猶不見取於在上之人尚不自抑於無用之場而區區更復有言於台屏之外焉豈亦有說蓋聞人之功業所就雖各因其才智之小大然唯其有事則愈足以見其所收譬猶豐宫巨室之已成小大負畚帚備灑掃耄翁坐閫下司誰何便為安家於此之時雖有工師百身無補於參涉及其嵗彌而舍久有宜修必葺之勢然後匠石辨材弟子運斤陶叟視覆甓夫詳甃丹手漆人交臂合聲各致其能乃見所功故當天下之無事也內外羣司因循軌檢無不可者雖至有大所負於功或未易圖至於治具不得不事更張之際則寸片銖勺之能其於入用皆所庶幾伏惟相公道德之望朝野一心倚之隆平周公以來所不得擬方將器使才類俾無不伸代腐以堅滌汚以清以爍前光以尚後聲以還二帝三王之盛如某之鄙才縱未能大固亦有志縱不堪為之工伯覬將備諸其徒願嘗效焉無狀而後已功業之盛豈敢言之至於或免不適用之羞而少平為士之患則荷相公之賜無有涯量伏惟髙明矜而亮之上參政書為人作諫議閣下夫知人與見知於人古今莫不以為天下之至難而某則以為二者雖然而未若知人而有其勢與夫見知而會其時之為難也何則夫所謂知人者亦小人之事顧必有君子然後可以責此云爾以君子之事君子而曾以之為難乎彼小人者於己尚不自諭奚暇致察於人若夫我未足以取知而固以望人此真不易但士之於世其才能各有所適則亦不必全盡乃始必聞是則凡見知於人者有以可知而知則謂之以義有以未必知而知則謂之以命有義有命兼以俟焉果不足以稱難於天下哉昔者顔淵見賞於孔子而生不免於貧賤他日身死則從之乞一車以為椁猶不可許淮隂侯紹介蕭何一旦坐諸將之上而人主莫之違夫四人之聖賢文武雖不同而其所以知之與見知則不異然且一終窮一速逹者孔子之勢不足而蕭何之勢足顔不會時而淮隂會其時故也夫勢之與時其所繫蓋如此謂之極難豈不信然自某之得仕於今十有八年書吏八考而猶未出於州縣前年以常調詣銓階緣觖慕望拜左右則容顯受提挈之賜於舄履之前內惟無狀豈足以上汚髙明君子之門身非韓侯顔子之器而承值賞拔冀或似之豈所謂以命者歟兢悚猶未定會麾幢出嚮太原蓋嘗自悲以為區區之命豈果無幸於吾公歟歎辭未幾而閣下既受召節及今之來則閣下實坐東府某是以欣愈夙幸思復倚於門牆也竊以當今廟堂之論一新天下之政政之綱維既盡舉張農刑士吏科任其職職足其人事且成矣其尚奚言抑嘗聞之太平之用士才無細大之擇唯各周其器之為宜任無始繼之異唯可其事之與委若今之大務猶在二邉蘄安而未之全籌謀指顧利用感奮某誠不武願以犬馬餘年嘗展荒窮之力於有為之秋庶亦自勤以不辱髙明之知伏惟閣下德業之盛方將形於久大仁明所燭何隱不徹何微不彰若某之愚豈俟陳說乃以卜宜知與否之如何謂今閣下之勢正某所以取會之時憚於極難以重無幸之悲是以不嫌於獻欵即䝉矜亮何望如之
