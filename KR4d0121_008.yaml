body:
  text: 灌園集巻八宋吕南公撰序甘圃詩序民不可一日無食食不可一日無蔬然則天下之圃為人之業何可勝計惟其業之者未必儒則君子之為圃所以異乎衆哉甘圃詩者先生巨公相與稱歎傅君翼之志養之詩也傅氏世儒家邑里之所畏忌翼之少以舉子取清俊名雖未即逹而不敢怠曰吾力此庶幾有禄以奉吾親既而乆矣意猶不遂乃慨焉而嗟悶焉而思擇其力之所能堪足以紓睫端之急者以謂唯圃為可乃黽俛勤之正其畦相其宜謹其時播之殖之培之利之稍與思勰之書合于是内之庖饔外之貿昜皆得其給而滋不怠焉荷耜操耰且行且吟日于其間有過而問焉者曰子儒者也為爾卑陬能哉今世書生何必俱以禮義取資詭激其聲容以游乎粱紈屠販之中致利甚潤捨是不為而使埃壒繞須眉吾盖苦之翼之笑不暇對他日此聲屢至乃對曰士各有願圃雖卑吾所願也得吾願斯足矣以吾之願昜彼彼固愁吾能泰定也歟哉有以是告于李先生泰伯者變色而發其詳乃歎曰賢者之志也為詩以稱之繼其聲者凡若干人泰伯死甘圃詩缺無作熈寧六年翼之以累舉得出於是翰林學士曽公子宣與其弟館閣校勘子開皆勞之且及泰伯之歎時又各贈一章翼之拜受南歸明年謂余曰宜為我序我珍藏之以為吾家徳慶余不獲辭嗟乎士誠欲賢何逺之有昔者子路孔門高弟而以養𦵏為傷微孔子之言則菽水幾不自安傳曰知其無可奈何而安之若命唯有徳者能之當翼之為圃時所謂無可奈何者也唯其能安故至于甘甘者好之上而樂之下也非有徳者詎能名此藏之世世篋衍麗句高辭軸而籖之與史争乆得於畦町耡耰而已夫賢何逺之有若余文之鄙何足以重翼之乎楊公留題道卿上人棲真塔亭詩序道卿上人生于福州年十二随其舅至建昌即捨家事太平元新和尚年十七落髪為比丘氣韻蕭蕭若有願而未修和尚發之曰汝欲得道離法已乎汝惡乎求之曰然請無求于書而持于心乃東行入松谿精舍視物如人視人如身不飾此以映彼不八中而十外波靡馳騁之務一不渉于其胸居三十有二年松谿之主死其徒謀所以嗣事者曰非道卿上人其誰堪于是逼之上人避不肯聽其徒强之上人俯而思曰怨物之來拒事之交豈足以為道于是聽焉其為主領如其莫為而衆頼以安乆而如初至于八十筋骨不勞神爽益清則歎寄而念無焉其徒請之上人曰而何怪我且孰有夢而不覺者哉乃相地于堂之西偏先為之屋而俟竁焉曰以此順化他日其徒相語以吾上人之經措若是可以勿命之乎徳琳禪師之𦵏實占堂東故今議名于上人之兆所以别于禪師皆曰稱以棲真可哉自是稱之上人曰棲乎哉且孰知其不又興真乎哉且孰知其終免于偽乎哉雖然免之不免又之不又舉非我懐我亦順隂陽而已矣如指聽臂而已矣是時光禄卿清江楊公聞而遺之以詩而一時才士多從而遺之松谿之人詫曰公賢貴人而賜文于此上人寧草草者是宜勒之金石以示無窮衆皆曰可即以上人之命來曰辭有以助楊公而致吾不沒者是在夫子惟遂有畀也某辭而不獲乃序而畀之是時熈寧七年四月初吉相山新圖序道散徳不明然後學分九流辨方揆日相岡觀泉卜食之言立故墓宅之師専門其書之多與儒同而祖習之人或悟或迷亦與學於儒者同此歴古以來圖牒論撰之所以相望而出也古圖山形八其後演而廣之為三百六十今又廣之為千二百且毎圖俱為之説者呉山人智伯之所撰也書既成分三篇篇分上下巻凡六命曰相山新圖始求余序以冠其端余聞之也道出而為理理出而為數數出而為形色故有形有色皆可按而察知其祥咎始終之變天地山川同得于數者也是以無所逃于推歩疇人之文雖然文不患不具而患乎意之不能通意不患不通而患乎識之不能忘茍至於忘矣則自一照千因母知子何書之足多何學之足名茍異乎此亦迷焉而已矣新圖之廣多矣而智伯以為崖略耳盖形之所變名有所不勝盡而言之所至意有所不勝盡夫惟學者之才識有明暗之叅差則魚兎筌蹄其敢守越而待秦哉嗚呼迷以書悟以書余豈獨為新圖而太息也智伯建昌之南城人李泰伯嘗稱其能明所學者也求余序時熈寧九年之仲冬十八路地勢圖序罷侯置守以為天下積千四五百年昜十有餘姓中間華夏且混且裂為三為二為十六為九其變故多矣郡縣之城治大概略相循沿而其乗便随時析併遷因廢復僑創不勝名號之紛錯也學者操禹貢春秋譜讀之紙編屢敗然于後世之所變有不及悉也職方之史邸計之吏據圖按牒各熟其一時然于前世之本初有不能詳也盖知古而不知今其為儒也腐知今而不知古其為儒也淺君子之于天下也何淺何腐與其腐也寧淺逃淺必資于腐逃腐必資于淺是為兩得之術余求世儒所出禹貢圖觀之家各不同則知其不能裁以後世之所變然也願一作是書欲見職方圖經而不可得熈寧末年得所謂十八路圖略者考之叅以天禧九域書則四封際接往往差舛盖畫手之屢失也以書正圖而約以繪焉用防乎腐若夫有淺之患則吾不患乆矣夫欲聚米者按之思過半矣陳殿院集序余為童兒時見文章有建安陳師道所製而患未甚曉少長則知愛之而恨不得其全書未幾已聞士論惜其早世于御史矣後師道之終二十年子師韓為南城丞余始從之求書得三十餘通皆雜萃存藁者為之次比删正舛錯除舉場應擬外著四百五十六篇勒成十五巻以還曰嗚呼君子哉其質羙而秀其志大而正其氣直而充故思慮之所繞辭語之所逹無非聖賢經治根本而逺離羣小畛逕未嘗彷彿涉似也夫惟内之所得與外之所益流通傅㑹不溺不蔽者其知之矣彼區區于雕繪以戾其心者何足以知之師道之為布衣有所存發間見于文至後入官悉能履蹈不㤀平生之言借其夀愈高位愈大則其建立可勝天下之福哉師道深于春秋盖與泰山孫復齊能而師道仕望轉高故不倚經以名春秋索隐論五巻御史奏疏二巻皆别傳不列此集目師道之𦵏其友福唐陳述古既序銘之余故不書其行業而獨推見其志氣之所到于此夫學而不足以知師道則亦安能讀是十五巻而許余于序哉元豐六年冬至日衮斧前窻書贈武陵翁詩序武陵楚仙鄉龔姓望焉翁耆艾之總名也余論斯人野逸平和而喜事欲其别于流俗之序字故緣望以稱之昔余㓜時聞翁以治折傷有名云嘉祐中縣尉羅彦輔迎轉運使于撫界橋折馬驚墮彦輔肱髀骨破肉裂塌然不能運動翁為治之旬日而愈其效類爾圜南城境乃至隣數百里折傷者必責愈於翁無不得其欲者翁家道傍無田桑封殖獨種庭竹千竿資醫養十口泰定不乏行旅過門踵相交翁遇之皆有理致無不得其歡心者其接儒生最謹鄉之人莫及也余聞如此及余羈游去故園則過之與語信焉視其屋壁既有題詩贈之者矣自是出歸毎過之而壁詩嵗加多且滿熈寧八年余與友兄黄顯翁還自郡翁酌酒其前楹以醉相邀逡巡自道老夫無事於文墨而才子誤遺以好辭吾不知其益乎否也吾里人未嘗賞此皆以為不若蔬根稻糝之宜拾也吾不擬同之孰能為我説以觧謝之乎黄兄舉醆以屬余余盖許之而未暇于今七年矣黄兄不幸墓木已拱把而翁朱顔白髪康强如舊其求余說也滋勤嗚呼豈其誠知文之工拙不繫窮逹矣乎夫古之所謂鄉之善士亦何流品之限題之以内外之分焉耳以今考之倉廪愈實而禮節愈廢衣食愈足而榮辱愈昧豈不識字者然哉若翁之所成不拒不要不厭所處之境而希雲霄有所不至而不失其至未始為高而有在於高謂之善事謂之喜事之豪其可矣乎必有知余言者矣王夢錫集序維天生材維世長之長失其道則雖有俊茂偉明之質有不能自保其成者矣吾於周道既亡而見之夫所知所行壹迪先王之學而不誘于俗習者豪傑特起之士也而欲仕之心則天下之所同向非自信之篤自知之明則亦安能置已于悠悠寂寞之鄉而處外鑠之光榮如塵滓之去來哉秦漢以還所為抗論説於周孔下風以克有傳於世者皆非有待于長養輔助而致之者也得之于心文之于言考之于前聞盡吾智力之能至而已君師朋友於吾乎何有是故晁董公孫賈誼劉向之徒雖或不純乎聖人而後世諸儒腐爛區區終莫能望其程躅也誠使此諸人出于周孔之世其所成固可知又使之出于魏晉隋唐五季之間則又不論可知矣夫謂之木矣何莫任乎曲直根深本固而後幹偉枝强彼匠石之有無誰之職歟知乎此者萬萬也信乎此者萬或千之一也是古之人所以可貴而不多多也嗟乎其不多多盖有不幸存乎其間矣吾友王嚮字夢錫生數嵗而喜書少長則治進士業茁然衆駭其進而莫敢議其所止也既冠猶未得志于舉場夢錫益自刻勵覺其所治未足以居先王之學則欲盡其智力以圖之顧家日貧親日老轉轉不救則曰及吾無營養之患而後吾智力足以致也庶幾不負古人㑹熈寧天子將以經術作新士類而丞相長安公父子實始受命成之夢錫家逺方獨取所謂雜説字説者讀而思之推見其指乃觧詩孟子合四十萬言書既成而雱新説亦出夢錫又取而讀之頓脚大笑曰果與吾書槩合于是人皆以夢錫為必能由此得禄以養其親而後卒其素所欲致者也而再試益不得志則又朅焉去之太學其行也諗余焉余曰聞道而知之行之我也貧富窮逹彼也太學之異于吾山則余所不知夢錫徑去不顧至未幾主講者果悦而稱之浸浸乎聞矣俄而病死初曽子固為洪州余往候之從容訪余以後來俊秀余以夢錫為言其後子固歸省松楸而夢錫獻文子固語人曰建昌學士世不乏吾以望若人悲夫乃遽不幸夢錫歸𦵏之明年其兄定拾餘藁數百紙以父命授余曰願得次比而表題之余為之剟去擬試之作而存著其可者詩書序辨論總百七篇釐為五巻所謂四十萬言者悉不著也盖夢錫之智力所欲為與所能為非五巻之謂而不幸不得致盡以成焉其尤可悲也已夫繇後世之法以進則夢錫雖及仕吾安能知其窮逹徒使其懐如許羙才困于有餘之四十萬言而無得也存不足之五巻余獨能使夢錫見知于世乎哉知之者知之盖將有焉叙以告其兄使藏之而待元豐七年中秋日送鄧徳夫序子弟之樂有賢父兄盖為愚無能者言之彼賢而有才則自立烏乎待其誘掖而養成顔冉孟揚不聞其父兄最賢而襟藴所就卓卓如此顧雖不露勲業然使之遭時發逹則其凌厲超軼誰能抑之惟夫不靈之人徳性無以自張故其涉世動須依頼莫教則不之學莫導則不之行譬如南婦習乗無助之梯鐙挽韁則未知所據既能據而蘄進莫善為之先後則無以騁而迅焉嗟乎以此議世之子弟賢有才者真見慁耳吾郷鄧徳夫二十而能文三十而登第有兄甚賢而從仕尤早與徳夫居聚者盖無幾而徳夫為布衣學行著於郷既仕政理聞於上此豈亦養成誘掖於父兄歟忽忽之徒或未嘗為徳夫思此也徳夫觧令金谿用薦格當改京秩而先時詔舉學官公卿以徳夫名聞既索文章在可中勢濵顯矣而當是之時徳夫之兄初為翰林舍人於朝光價籍甚人之不思者或以為徳夫雖賢乃因其兄以顯余聞而歎焉曰嗚呼他人之兄貴且賢則已千萬其幸若徳夫者誠不幸爾以徳夫之所就使兄而未貴則其發逹亦孰抑其超軼耶即徳夫而不若人雖有貴兄欲䕃其炎炎何足道耶嗚呼徳夫誠見慁爾徳夫將如京師余戯為道此徳夫笑曰人之於我也使果知我尚非吾意彼如莫之知也吾庸意之吾知修已而己矣於是某下拜曰是所以為徳夫哉時又為之叙云送沈忠夫序吕某曰甚矣政之有以敗俗而俗之有以敗才古之時稱齊魯文學天性而就今觀之則野陋椎獃類如醉者之睡驚此王介甫既嘗論之姑置勿述然吾於齊魯之外之士亦有歎焉盖先王之治以義行道而以禮行義此非天降地湧也明之心推之天下而已矣然則學而稱禀先王豈應知禮義之猶難歟夫刑法律令皆按約禮義而為之章程者於學士之通知益為昜事而自上之人以辭賦課天下應令諸生遂視法書如㓜童之見大楯長刀雖欲親之更患莫能嗟乎孰致爾哉人之才固各有所窮然而未有不周於所用也周於為辭賦而不周於知法律豈果人才之窮正亦荒凉於俗習耳他謂之何周秦以來二千有餘嵗以抵今法益不容一日捨捨之且無以為天下而入官之士不此曉識禍之在世寧有熄期雖高明敏逹之士事無不通然大過人之人常少中下之人常多不宜以所少望所多則出政之君臣詎當不以是為憂日者朝廷之制選人三嵗六試不在可者冷其資任以辱之夫斧座之意豈亦専以不明禮律待一世之士人盖以荒凉於俗習之才云爾而或者伏讀詔書必驚心而破膽謂得失之難慮嗟夫為士若此豈特不當吾君憂政之勤是又自甘於所敗者也雖冷以終身亦何足䘏且夫吾之心固有以深明禮義則推吾才以致用於當時法之情文豈必難知借如實未之學猶可按章程以求進其所至今奈何先守難知以待莫習乎甘於俗敗者非也沈兄忠夫司户於吾軍余得與之游其為人沉静端方庶幾所謂明於禮義者其當代去而試法於有司也吾知其必不為冷任所辱於其行序吾所歎以送之送王中舍序王大夫飲酒百醆不亂及為南城絶不肯飲曰務繁而屢取醉此治之所以不辦也其為政以察民隠為主曰不周知風俗情偽此治之所以不善也其追科必謹曰民喜儒緩而上官期㑹不容違違且抵罪謹之乃所以使其勿抵也其鞫獄念從輕曰教令無素而條章已嚴不將之以仁恕則無往而不傷其生也其嫉惡必嚴曰惡人在下則亂民在上則禍民也其佑善不厭曰知其可人而乍援乍置此身之所以不誠也大夫之代去也邑之士送以文或謂吕某曰汝亦知大夫者乎曰大夫也余何故而不知之為衆誦之曰是則余之所知者也送張户曹序進士足以懐常才亦足以顯異才此言何謂也得非所治與所用戾歟經術也文辭也不兼優詩賦策論也不兼工况於知古今識理體者乎雖然今日觧褐衣明日親吏事則雖有兼優且工之名皆無所用而不足倚為其未始治今日之用故也是故笑者之腹常為儒生而痛惟其明敏之人理與心㑹事與情悟觸而辯之撫而盡之不俟沉吟而萬縷盡析雖平昔與人同而一旦與人異異以才識不在他也有見於是者今余得於張兄景倩景倩少時盖常應舉京師屢試禮部優於趨時之文而已何曽與衆異習及其登第而從政則日勝時旬勝日月勝旬年勝月作椽而府史不敢期攝邑而衆甿憂其去夫豈素熟此哉資明敏而非素其學故能致用而顯其異才也余方論其才而并望則景倩者能之送張君明序儒之味莫善於强力莫惡於忍詬智者於不獲已則資忍以濟其强其善在乎有所就不能强力而唯詬之忍雖各有願然無以取善於世矣余食於羇旅四年而後識清河張君明其人所謂儒之强力者也其讀書如劉伶之向酒尊倒愈數而愈恱其為文如鄂公之運槊麾訶所壓無有堅鋭其言曰儒也其真而博大者猶不足到况斐偽而細者乎吾欲得官則視時之所尚而酢之收之以暇豫可矣不憂人能而我不能也居無幾何㑹有司以口耳之伎進退天下士而盡棄心曉之學當此之時余方斂臂願罷而君明倡踊曰誦彼之説以㸃綴鋪舒而已此童子之事我何畏之且吾聞口耳之伎以衒哄為工今其以是見邀我將趨其業聚以快吾手與聲計當直出其上吾趨决矣余於是而益推君明之强而自甘以不及也嗟余不佞於嵇康之疎嬾未嘗學之而自與之齊同異時開巻占對六經諸子命世之文猶然攬取其宗㫖而遺其辭句今乃邀以一時之冗瑣其安能有就乎余不及君明逺矣或人聞而詬曰果哉其以惰蓄窮者余曰然詬也乎吾受詬多矣故時漫出文章累累為不知者所詬今又用惰取詬焉唯不及君明焉往而逃詬吾之於世味終惡而已矣雖然亦味也敢書以送君送何主簿序忠厚之徳三五之君所以先乎民而稱盛者也當是之時人體而行不薄不欺彼我皆然不用是相高譬如豐年繼稔雖増京庾不自知富及世下漓則上之人挾詭偽以莅衆唯恐不濟况其才不足以居上者哉自然者汩於使然雖有天真不䘮者已如凶嵗之一米矣有之者甚寡無之者甚衆有無之相形衆寡之相傾故博大真人著書而大笑回首至徳之風繼之以太息自是執史筆者始計一米而詳焉大率百許年間見記者不過十數米而已其凶亦極矣夫使漢魏之君臣不作則丙吉第五倫顧雍之徒亦滯穗耳有何必記記何必詳唯其不得不記且詳此見者聞者所以欣欣稱幸余求忠厚於世乆矣而適見之昭武何慶孫余亦幸哉史之有國野也唯大逹者寄之國不然皆野載之慶孫方以進士起家名譽甚隆其逹之小大未可知故余雖幸猶遜以俟之使慶孫之位終不配其徳則吾書能詳之力不愛也送劉進士序今日進士詭薄賤卑最為可耻不俟有道者而後知之嘗聞道者固能知之矣夫惟不自誠故詭不自厚故薄不自貴故賤不自高故卑雖云頽習因時然自失已甚古之君子何嘗以不仕為義顧不至於亡耻以茍求焉耳論者乃以為公卿顯人多以是始基故暫經胯下不害其馴致功名是又不然舉世胯下而功名幾何人中病而刺之凡亦茍於利逹而已餓之人乞食則標以不獲已此豈足以言義命然一伸手向人而不見酢又至於再三皆漠然也悵吁而去之旁觀者曰是近於知耻夫乞食至辱矣就中猶有知耻之人今餓不餓例乞數數不見酢而不去殆欲以盗竊活其身果有耻乎無也余從熈寧以來深於凍餒之憂亦隠忍於白襴以隨羣輩步武盖四往而三黜當其不在黜中也既自知為不足榮矣至於今者斂臂願罷而自比悵吁之徒矣衆方與我以無能之名而我則以為受之可無嫌何者今之所謂無能者無亡耻茍求之能耳加余何嫌余之趣慕如此而劉君適以贈言取於余豈非誤哉謝之覬其悔也而不肯止故為之一説盖乞食非難能之事也其情昜知而可憐若盗則無可言者而其情非聖人不能知之今聽雞而入唯恐不先見星而出唯恐不後羣然商剽掠之可否邀記誦之分均上之人非必以真賢實才相處而人各妄意其爵禄此皆今進士之心迹而曽異於跖徒之所為否乎劉君且力為之此其實矣而不獲已乃其名也實昜為而名難免余安知劉君果有遇於酢與無有哉姑亦願其能知可耻云爾古之人以其身為重於天下而今也為一切之温飽而跛跛於白襴之間豈不可憐劉君行矣萬一遭有道者過而問焉則對以腹空腹鳴足矣
