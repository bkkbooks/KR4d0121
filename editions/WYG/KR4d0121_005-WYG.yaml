body:
  text: 灌園集巻五宋吕南公撰七言律詩呈知府内翰即次原韻某頓首伏蒙知府内翰以某微時舊稿或似可觀特賜篇章過形褒借園廬有幸緗袠增榮夫大聲所入蓋非俚耳之能而無言不酬是亦先民之訓謹循嚴韻特致斐吟僭凟有愆戰越以俟某再拜山人何事忽伸眉新得陳王七歩詩題是船齋髙詠後開當寒谷帶經時仁風坐使羣心動健筆潛將暖律移硯席久荒青案乏報酬非稱更慚遲憂來無處寄深思也擬春秋也作詩空役肺腸添故紙有何勲烈補明時身唯蓬蓽行將老志似嵩丘永不移誰使翰林東道主肯敷餘論憫衰遲重遊松溪偶題八句示升卿七年前已到松溪不慮重經有此時寒苦慣為窮進士清髙長羨病禪師雲山契分輸今日香火因縁歎夙期庭栢森森秋實在向來塵想誤多疑夢寐偶入重城坐客堂年年風味只荒凉春花秋月各無味晚鼓曉鐘俱斷腸别恨不堪詩控引髙情猶頼酒分張著書耕釣平生事夢寐西村五畆桑送傅濟道之漳浦尉河梁東度送征鞭屈指閩荒路二千難向解擕無一語再思重見尚三年髙堂上夀今誰及白屋青衫合自憐努力官箴莫輕墮清時無善不登延送劉賢甫之餘干尉太學諸生初入官綠衣新尉古餘干科塲得志已容易下邑徒勞不足難萑澤察姦行繚繞缿㕔參論坐盤桓羽儀更養文章去他日雲天見孔鸞出蔡州奉天橋下水湯湯橋上征人破曉光秋色稍能禁暑氣客愁終欲害離腸遭逢未入千年㑹窮苦猶為此日忙笑殺壺公祠畔路又隨塵土過仙鄉奉酬純父浚都病起見寄建康學士註魚蟲枹罕兵官策守攻此日精勤徒有得異時榮盛各成空吾能委曲謀田上君乃呻吟厭旅中故國他鄉俱未快勞生何事不齊同奉别道先邂逅過從兩載强詩書存問滿藜牀光榮得路誰非友道義心知獨不忘聖代君才多勉勉中年吾髪已蒼蒼牙絃自此聊停緩萬里窮山隔帝鄉桐城與曾唐傑話别事物無窮世路長人生聚散亦堪傷寒暄旦暮年年急塵土風波處處忙我馬欲衝梁苑雪君帆先犯楚天霜交情若是存悠久定有音書入帝鄉宿青綏舗兩檻中間風脚横解衣鋪簟近南榮曦光欲墮已睡熟斗柄轉斜纔夢驚方恨此時無月色未知何處有蚊聲塵埃惡熱明朝路㑹為今宵動旅情過洪州未定榮華與退休三年四度過洪州紅塵白日知何得西去東歸不自由一帶好山誰舊隠百端閒事我新憂可能石馬亭邊路見客區區到白頭道先游仙都至李尊師故居見余早歲題贈拙句存於屋壁輒寄四韻重相歎賞謹有賡酬仙李枝條萬國分隴西舊望道家孫曾經二十載還往忽過七千餘曉昏人落九泉無可奈詩存古壁更休論困窮辭氣君偏愛太息南征返北轅十月二十日過陳二表民追講昔年同學事迹慨然贈之以詩西齋共學昔辛勤一别侵尋十四春此日科塲還似夢舊時書屋已成塵文章不鬭錢財福貧病長依寂寞濱相值酒邊當取醉大家忘却困窮身百年百年長短有愁兼世味如今豈足沾客路無聊貧苒苒春風相值病厭厭辭章漫與前賢並氣調終遭俗士嫌安得一㕓閒散去耕桑吟醉似陶潛曉陪内翰歩至北園曉風吹雨北園開追逐䨇旌踏翠苔芍藥一欄霞上錦嫩荷千片玉流盃多年架閣游春興此日闗防感物才花不能言草成恨故應知我偶然來次韻顯翁幽居即事文髙只合論錢神屈膝須防望貴塵軒冕未來應有命丘園隨分亦安身山樵水釣心常逸夜坐朝耕樂更均嗟我久懐農圃計何時操耒即相親送唐傑重過金陵金陵春水解歸舟重到金陵恰仲秋世路已銜奔走恨風光更引别離愁支持事變何由辦歎息安閒不易求秪有北山長好在為余頻上冶城頭寄贈張縣丞二年來往南豐路飽聴鄉民說縣丞剛果已如秋漢鶚潔清仍似玉壺氷室無姦吏縱横入門有書生旦暮登何事亷車帷幕厚不將髙位待賢能熙寜五年歸至舊山傷已感時作詩奉呈升卿黄丈幾年奔走背農桑半世歸來只感傷蛇足畫成曾失酒古書㸔遍却亡羊一㕓席屨何從受三徑園廬已就荒猶頼比鄰賢父老許同飛鸒賊餘糧杉樹湖前流水逺石城街左亂山蒼灘深潭淺無由問竹秀松枯不可常物理自應隨變動道心聊欲寄存亡唯君坐占忘言境珍重詩編與酒觴再和呈二首五畆之園未種桑自憐疎懶致財傷稻粱只是同鷄鶩皮鞟徒勞勝犬羊敢羨蘓秦終富貴正憂郗鑒遇饑荒遭承若值開元日何卹東南萬里糧茂林修竹舊時鄉爭得安閒兩鬢蒼長憶樵漁有山澗豈論勲業到旂常兒童好在今初見故舊尋來半已亡此意不堪頻念慮便傾襟抱付深觴再用前韻奉贈升卿三十一丈百年此地有維桑後慶唯公免物傷早歲懿文如鸑鷟一生純徳似羔羊人推奥學追三篋自許寛巾貯八荒冷笑村田諸父老滿胸茅塞只貲糧好徳年髙富且康就中多福荷穹蒼吟哦有得能千首議論無窮只五常此日鄉閭獲矜式異時風化免銷亡嗟余欲買西隣住歲為先生祝夀觴金陵遞中示到亨父老丈去年秋初見寄詩書捧詠無窮之意不勝私感因成四韻奉呈郵籖初發去年書嘆息貧窮未破除乞食君方如檻虎賊糧我亦似卑居有求自恨傷生酷多難誰能慮事疎同病相憂古來語此情今日好欷歔九月一日口號奉呈顯翁文叔九秋未盡六秋窮露冷風髙爽氣雄無事日成多事過故鄉身與異鄉同心隨酒盞歸愁外眼對時花到夢中鴻鴈已南吾漸北自憐安穏愧龎公次韻酬朱推官上􅀦輝光不許觀故園岑寂且閒眠無心自可齊窮達有口皆能論聖賢百本柔桑繞茅屋一陂清水灌沙田餘生飽暖聊依此豈有髙風逺市㕓寄酒伴唐彦君益門外水渠鳴漉漉屋頭桐葉落翩翩向來苦旱難尋井及此愁霖易怨天數盞舊藏真糯液一盤初爛壯牛肩故人忙迫城隍逺獨息書牀又醉眠得鄉信鄉信迢迢出舊山琴心先落斷絃間數行文字傳新事幾叚悲歡破客顔聞喜竹林經雪好想憐溪水逐年閒征衫有淚歸無計一夜窮魂趂夢還過聶彦倫故宅彦倫門外舊城墻雉堞崩銷草木荒人物已成塵土去風􅈣猶與嵗時長綠衫科第何曾貴白髪詩書不可常平昔往還吾亦預經過此日倍凄凉范十七司理見問嵗除鰍蔬夜飲之約新春愆爽以八句答之田泥渙爛鰍懐子圃壟肥腴菜長心僧鑊縱然忘忌諱書刀何忍屢殘淫村漁不遜財難動澍雨無端草易深拘束學官懶復懶坐愁佳約未能尋范君寄住北成佛屋出都霜風吹背出皇都大笑回頭謝酒壚楚國但聞悲棄璞魯門那復辨真儒百年風槩文終在一世光榮意已無乞得耕桑了疎野太平何害有潛夫稚女衣無羅綺且貧清口有詩書亦性靈論客鬚多如反冦笑爺㡌破似窮伶園中果熟心先動案上盃傳眼更青釵擬荆枝帬擬布暮年吾活正凋零寄李居士三月山城歎旅窮冷㸔豪士振澆風送花盤上春情重賣酒壚前醉魄雄鐘鼔聒眠崇佛廟綺羅爭路拜神宫此懐若向林泉說又落仙翁大笑中奉答顧言見寄新句二首早年辛苦待飛翻翅折無因達九闗更使襟靈憎市井足知縁分在雲山誰憐古學長無用自幸餘生且就閒多謝鹿鳴筵上友解傳詩句慰衰顔羨君肝膽壯難攀不厭長安出入闗探穴定期收虎子採薇寜暇顧西山盱衡自慶千年運冷笑人求一日閒乃肯題詩寄空谷的於游舊有温顔和酬道先賢良見寄新句中林獨往寡襟期祇與耕桑治町畦遲晚識君真幸㑹生平於世似分攜未能捧履師黄石且欲同歌效紫溪郡閣郊園遥百里未妨懐寄屢封題池口阻風奉寄唐傑貴池亭下浪如山觸撥愁根阻檝間眼為故人成北望夢知鄉路數東還此生太半淪憂患萬事何時脫險艱不敢臨流更窺影便疑秋鬢已斑斑子發移令上髙兩州三載屈㕘卿百里初來福困甿無處不思逃濁暗此邦何幸得賢眀後生智足科防宻凶嵗財傷性命輕能為愛人忘富貴豈徒循吏有佳聲有懐溪齋奉寄微之溪光清媚四山稠十五年前記薄遊茆屋讀書風滿座野橋尋酒月當頭身名不分輕如夢甲厯誰令過若流此地主人相問否一㕓今帶百端憂題陶集未讀陶詩已愛閒自從能讀轉思山烟霞合定徘徊分塵土剛侵勉强顔伊昔有人安白屋秪今何事慕青綸披簑戴笠終當去更在規謀俛仰間豫章城西山東下古池隍增飾依稀問晚唐平世但嚴民筦鑰亂時曾是賊金湯春歸舊堞多芳草鳥聚荒陴正夕陽也欲登臨賦風物自憐才筆厭憂傷曉過城隍街馬上看木芙蓉秋來風味苦闌珊偶為繁紅畧據鞍何處更期征鴈過祗今聊作故人看三冬已至休爭氣九月將殘未覺寒自有榮華趁時節免將憔悴惜幽蘭八月十四夜小雨小雨遮空意未迴輕風迎夜勢初來青樓月好人何在錦帳燈寒扇自開四七功名真土芥一千期運亦烟埃㑹須放縱雲雷手不到人間有剰才髙賦亭二首耳外蜩螗響切纔眼前岡􅅢秀環迴曦光墮地收風盡雲脚遮山送雨來長恐易成多事恨可憐難見絶塵才何由上得崐崘頂試使煩襟磊落開事變紛紛不可防秪應人世惡憂傷髙情易與時風背逺慮空為智士忙感古有懐成戚戚就書圖活得遑遑貧窮到處乖悰况不但他鄉異故鄉將歸南城留别髙賦亭二首一上髙亭一慘然飃流無狀見風煙林泉本是儂家分衣食剛為此世牽流水嶺雲能自得樵歌谷響逺相連來時秪恐禽魚笑掩斂南華第一篇寄食官齋過一朞登臨容易此階梯四時光景非無樂千里憂傷却自迷曠望可能舒感慨幽吟長是寫酸嘶從今風物多清暇免被書生掩淚題清明日再題髙賦亭二年來作旅行人節物相逢但感情彭蠡湖邊看競渡摐陽山畔過清明游神杳黙皆愁意傾耳尋常得恨聲若有桑麻三畆地肯將髙跡學蓬萍送子發赴江州司理湓江湛湛照闉闍廬岳蟠蟠䕃郭郛此地一官雖鬱屈異人當日亦踟蹰元規樓下隨紅斾居易祠前看白鬚才調似君真不薄有詩無吝寄雲夫寄范司理郡南郡北叫呼間硯席相望聚首難笑我性靈偏忍餓憐君風韻似無官儻來富貴能多與不朽文章倍好看莫怪參尋頗疎緩鞋穿衣薄怯霜寒送張司理三年頻說獄空虚歎息賢才治有餘曉踏府塵鈴窅眇夜吟庭月樹扶疎尚微官職人皆有已大精神衆不如努力無忘建功業秃毫他日為君書感懐奉呈純父去年三月出京闗汴水東奔不可寛今嵗此時還逆旅牡丹開盡未曾看春風祗管添鬚髮世事爭來觸肺肝傳語百憂休恣横已因泉石著南冠次韻彦臣感懐不得經綸輔太平枉於天地荷生成少如賈誼頻垂涕老似樊須請學耕醉舞或將猴共勢飢吟時與蚓同聲若教眼底不識字應已脫除窮困名過湖口野客西來意緒勞為停征棹到亭臯湖山氣象皆清曠名利襟懐自鬱陶曉市魚多腥萬鼻晚波風健趁千艘髙情未有分張處愁誦山移一兩遭偶書所懐鳳凰亭上倚層軒桃李分香到几筵曾與故人同一飲試思前事已三年歌懽舊興知何在衰䬃新愁祗自憐縱使春風容病跡亦貪牕下枕書眠奉和内翰太中建昌三見梅花三見梅花似故人楚鄉春是洛陽春蘸盃酒意枝枝重入筆詩情處處新南野幽林尋去逺西園髙樹繞來頻無心草木窮山裏還解遭逢侍從臣登滕王閣韋君徳政滿洪州去後無人更講求帝子驕奢起髙閣到今連嵗為增修座中簫鼔來無定檻外帆檣過不休惆悵幽懐誰與問水長山逺總闗愁書邊勞佚由來命不同悠悠身事幾時窮學能愛日終無補愁解迎春却有功千慮漫游言語外寸心常在苦辛中故應樽酒憐顦顇㑹借書邊醉頰紅風雨春來未苦狂風雨初見雲雷氣象豪合雜忽如喬岳倒迷冥不辨九天髙林巒偃亞傳雄韻溝澗蒼茫起怒濤花卉一空何足問且欣餘潤入耕臯哭鄧氏女兄東田嶂下古荒村又向荆榛占一墳寒苦到今初是了榮枯從此更休分棺旁乳女隨遺褓膝下亡男恨白雲共係人間酸鼻事欲言聊復淚紛紛凄凉三十六青春歎息從人只累身内外諸門方破碎初終兩姓却沉淪平生尚未諳奢泰已病猶能强補紉便向夜臺逢考妣應傳同氣各邅迍答道先寄酒柴荆江州雙酎到籬東快殺陶家寂寞翁田野放懐容易老篇章寫意敢言工漸生耳外燻烘熱轉覺盃間㶑灧空何必籃輿依五柳久來身世醉鄉中已未上元宿崇相山寺七十年華已半除新春猶復感窮途腸便酒味雖如舊眼對花枝只似無計畫但求閒次第文章知是枉功夫滿城燈火笙歌沸獨訪東山宿佛圖陪道先兄游麻源輒賦二小詩借得籃輿便出城山光門外望西行昨宵偶雨路塵少今日好風林靄輕有竹人家庭院秀避騶樵客面顔生溪田橋北駝鞍嶺猶記當年志未平十五年前膽氣麤擬將文字換金珠科塲委頓成何事耕稼辛勤落晚途累嵗不曾言石磴居山空道有茅廬今朝碧澗潺湲響若不因公得聽無永定東軒望淨土芭蕉髙叢獵獵畫簷西曾聽寒聲慘淡吹午枕有懐疎雨後夜燈無語惡風時二年成别應多恨此日凭髙動所思人世不堪謀慮逺眼前容易得傷悲過游源驛游源驛裏壁間詩去嵗經過一覽時客子面皮真鐵鑄閒人公論是靈旂有誰謔浪慵開口只我哀憐為歛眉多謝縣侯新蕩滌從今莫恨放行遲池塘池塘春草夏仍多更照層林發翠波到處風光長好在座中愁客奈情何眼隨髙鳥尋鄉思手把閒書養睡魔誰使早蟬能觸撥新聲來與斷腸和次韻濟道見寄君作王官傚衆儒尚逢廊廟有為初塵中白日雖牽逼筆下清風肯破除欲去定成賢者隠未歸嘗與俗流疎人生到處隨榮願何必江湖勝漆沮追送城東但立談當時惜别恨騑驂一封消息難頻到千里傾思只坐諳知有才謀當奮發豈於州縣却悲慚為文尚喜多餘暇寄我新詩似渭南過莊子祠堂堂以嵇康配坐客過䝉城日欲曛更尋祠館拜遺真文章昔已悲衰世香火今誰望俗人諸子異端爭土苴千秋餘亂見縁因秪應叔夜輕狂輩未是先生入室賓奉寄蕪湖征局都曹不見銅陵唱和翁相望三度歎秋風商量難得樽罍共存問空煩簡札通驢上閬仙邀苦思草中田子建㣲功明年官滿當攜手未定韓郎耳便聾梳頭見白髪未老先斑豈自由可憐蒲柳易驚秋不縁遷染應非俗若有梯媒必是愁老蝨縱嫌相間别素絲何害共風流塵勞興味吾諳盡肯似豪人諱白頭黄九游河州黄河東背賀蘭山迴望塵沙萬里寛土地久傳戎種姓人民還笑漢衣冠軍中意氣誰先得史上功名我慣看何日歸來談將畧轉吾愁面入忻懽六月二十七日醉書普安院壁酉尋行甫戌已見夜候顯翁朝乃來隔樹鳴蟬休聒耳滿樽浮蟻且銜盃多憂莫道無由解一醉從初不用催傳語羣書未乖間只今相憶尚須迴題河源諸兄壁不見諸兄十載稀重來問事只傷悲一家未有中興地兩地皆成永感時道在莫虧清白業力微空賦鶺鴒詩吾門舊慶天如報㑹向層霄得桂枝將離東洲書社留題屋壁偶向林間寄病軀七看圓缺印蟾蜍何言霧隠南山豹只得人憐涸轍魚衮衮光隂添一夢勞勞精幹落羣書揚雄若有閒名在此地曾經寂寞居將歸南城書内樂堂壁野客辭郷道轉孤秪於愁上進工夫乞衣借食虧豪氣弄筆翻書滯壯圖三徑未成真隠約五窮爭現主人迂南歸漫過庚桑國不得留參鞅掌徒己酉歳歸省松楸過武陵翁所居留書屋壁千里歸來儘苦辛見君依舊自由身始知絶學無文者勝却翻書弄筆人案上方經閒白日門前車馬漫紅塵半軒風竹一樽酒冷笑世途爭富貧
