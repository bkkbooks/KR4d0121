body:
  text: 灌園集巻十三宋吕南公撰書請見張太守書布衣之僥倖亂禮也為日蓋久治古之時道德致明而上下之分正貴者必尊賤者必卑無所容於輕犯士之未命者有庠校以觀其才有物論以品其行可獻而官然後賓於鄉老其禮甚嚴其義甚修人雖欲以跬步踰其涯分顧不可得至於後世此道稍隱則唇家舌户挾其放僻欺傲之智以游乎羣爭洶動之間招權而害勢納安而出危使夫在位之君臣一以賓師弼相處我而在位之君臣猝亦無計以杜其所犯蓋卑者之有亢於尊自是啟矣人之心蓋有未足于得而妄於求者是以益衰之俗相與趨於其謬而一入於僥倖之鄉無忌憚焉由今之習有毫毛絲粟之得者則矯矯然急人之取己至自洗拭必曰古之人固有被褐而交公卿矣且命雖足俟我何能自滯於斯而本無知者又囂囂然遊於公卿之門亦曰遇合時耳禮何足遵又其甚也則假竊文辭沽譽乞援以羣行於造請高之有天子之相庳之有道使州侯其門無不可登其庭無不可分其禮無不可抗也側卓其冠斜曵其衣執刺而懷書九十其流以幸上之人莫余察擇而上之人果亦不暇察擇亦曰士而已矣周公尚且禮貌今何用靳靳為哉而布衣由是益不遜平參直詣一不得願則大者醸怨謗小者藏忿恨至於得願則固未嘗揣己之為何如人也嗚呼此其儒者與曽謂儒者而果僥倖以亂上下之禮乎論昔之賢盖莫賢於孟子而孟子則曰禮不為臣不敢見諸侯孟子之於諸侯雖或見矣然而未有不由於義而出於禮今惟賢如孟子乃可以當此耳而果然耶其未必然也先王之治蓋未甞不以賢貴行成然後賓之夫豈輕士而不之重哉舉今一郡之地廣狹所不可較而以進士名者動至數百人數百人之中其不敢希禮貌於其上者少矣謂數百之人皆賢皆可賓吾終不信而已矣事惟有此是以知其謬者常至於惻楚而形歎雖然歎而已矣欲遂矯而奪之夫豈容易哉不容易也則有不欲與不敢焉而已矣往年陳烈居南閩憤世途之澆薄則一切躬行三代之禮思以庶幾革正然烈口一開步一遷而笑罵之聲暴於風雨夫欲革正悠悠既亂之禮於卑賤已亢之後豈不殆哉古人有言千人所指無病而死今布衣塞滿天下業以僥倖相師而為人上者又罕暇於察且擇焉則屢嘆之家非不欲與不敢而何所處某亦布衣之士於古今之變既幸知而嘆矣而今者亦未能脫迹於郎中典謁之前豈所謂不敢者歟士惟無衣食之憂然後得以安行其可願顧猶不欲戾衆以撩其怒今也飢寒相迫資文學以乞借於人而敢戾衆以自危乎哉故雖某之不敢亦郎中之所宜哀矜者也郎中以文學取富貴其聲華勢力足以表率衰俗其教令刑政足以彈治所臨而猶降屈州侯之重以禮貌諸生其亦不欲靳靳於禮文已犯之日與是固某之所以望哀矜於左右也某少疏愚不善學既長更束於貧窮而尚從道德文章之後聊得所見亦冀乎有成郎中不與之進某固無所謗恨與之進某猶熟自知量伏惟髙明下亮區區處之以非僥倖之徒亦已幸矣請見蔡太守書郎中閤下古者謂泯泯無所聞知者為民而於民之中命其問學才智足以事上者為士則士之為人名品異乎衆矣方其取之也有俊造進之序及其任之也有中下之等階而升之察而責之德益進而道益充則自士而為大夫自大夫而為卿為公貴於是乎盡極而實始於士且孰有輕而賤之者此周已前所以有治也世稍下衰而教非所教養非所養人各自謀而理有不循義有不由然後天下為士之名多違其實賢者羞與不肖伍而不肖亦誣賢者為不足用羞者未必顯而誣者未必晦也於是混行雜居口舌沸騰而上之人始疑士而惡之矣此秦以來所以有亂也夫人才有所長短而事待賢而後濟有識者所共知然士有見貴與見賤世有稱治與稱亂則亦豈特君師之過哉學為士者固有罪矣不足以為士而不肯為民已未有一二而治人以十百持此以干時且焉徃而不露其底裏底裏露矣而猶竊借聲彩覬幸際㑹囂然􅃷耀與物相傷嗚呼罪宜誰屬也士之名既不足信則又變而謂之秀才蓋指其有以過人者云爾而秀才之名益不足盡信波流坂降日滋久遠至於近世則甞捉筆吟哦摹寫文句者其自列於公府皆曰進士而題號於民間皆曰秀才髙冠華服秦楚一概孰能辨之亦曰儒者人耳金有不離沙鐵有不留礦夫何必審究姑聽之而已矣萬千百人各兼周漢之賢名而至不能免秦之所疑惡此其果有可辨哉有司按言而不暇詳行則去取偶然而已邦君大夫之勢可以詳按言行反曰非我職也彼窮達有命而進退因有司固非我職也是故君師之任與學士之名俱喪其實雖有不䘮者已如曉天之星宿矣日者郎中以仁厚端平鎮撫此邦歳既再滿而某不貲之身幸在照臨之下可得參逐諸生尾末以望拜堂階預聞議論以警補所闕然終未敢者豈専為異者哉單平特獨無以杜混雜之誣則為士之實有時而未信於上況當不必審究之日紛紛造請於守將之門何所云補即勿往焉誰以為問此某貧賤之姓名所以重煩典謁也雖然以郎中賢德之所存過聽之所受明察之所及固不俟終日而參觀畢亮矣方又久以再歳之鎮撫則郡邑之人才長短何以隱遁但今不事進退耳按言詳行未必脫然無意也夫自治古而言之則不為臣不見諸侯非罪也自後世承俗而言之則衆皆先而一人獨後有不免於訾矣因從俗而識邦君之面何憚而不為此某貧賤之姓名今日所以輒煩典謁也若夫宜為民宜為士名實之所應雖不敢望猶願郎中詔執事以疑否而定賜見焉謹伏旌㦸之前俟命請見葉太守書今之公卿大夫莫不接士而士有不願於其間何也得非所接不在至誠而所䝉接者有不足以居為士之實乎聞之李唐以來布韋所以造請達官其事極卑其恭極至失已踵門不敢期必見得見則不敢數數往一言之酬啟齒之借更投文以稱謝其屈如此然士不憚且未嘗以為羞則賤有實而貴用誠故也遐方寒人徒步藍縷以入京師久不過十年必因文字致成名遂享富貴惟其所有如何焉耳羇旅之卑恭終身之行志何憚而不為方今内之二府百執事外之牧守使副下至一命之吏率門有賓次承俟謹飭白衣朱紫羣行例進茍納謁焉未有不得見者雖數數焉無拒也顧其相與無懇惻之誠則亦紛紛徒勞而已以儒自號而行不若市人謂之才俊而筆語比俚兒獻詩書上名刺非其可則以為苦海萬一僅似或曰安知不以假竊來乎其相位待如此所以有不願於其間者也古之人以十室之邑為必有忠信而今郡國廣大進士動至千百乃無魯邦之一人哉自其在勢者不加察擇徒不吝於禮貌以收接士之譽而士之實否何以明之彼澹臺滅明徐孺子司馬相如王褒之徒亦幽欝自憐而已矣郎中以才學起家致官郎位據古侯伯之任既貴重矣適屈於此而治效餘閒特有接士聲名與之分庭抗禮者凡幾十百人矣髙明之鑒以為可用至誠待之者又幾人耶毋亦汎為位待以行謙厚之德乎伏惟盛心宜不止此某不佞耻為世俗之儒犬馬之齒三十五矣蓋嘗憤歎士無以取信於人而虚偽相與拜跪往來非榮幸也故再三至京師經由郡國不啻十數未甞以名刺輕試於朱門誠恐其未必察擇而徒勞取羞無窮期也今乃願見郎中則豈無說夫以一郡之衆太守之尊而降屈於布韋諸生與之交際而其心耿耿患所得非其人亦羣士之恥矣輒不自匿試獻雜體詩一巻於几席之前雖未足為述作之盛而可略觀其實也或賜之見而有以照其不為假竊則豈獨郎中不愧於魯侯亦敝郡庶幾十室之邑矣謹立旌㦸之外俟命不勝惶悚請見鄭太守書某昔在舉塲十許年間經見五守令乃至茍有位在此皆納謁而造請非病諛也以為自此而得仕則資適如此無所可擇也其後侵尋失所擬望而揣測衆情頗以無用見期而某亦年漸髙心氣日以衰耗自料不材諸誦讀之伎不足復争則易冠裳濯筆硯而去耕於田野非病狂也以為求進不得則當退不足躊躇返顧於造請之紛紛也夫歳果時蔬人所日待而存養之過則滋味堅重不足以動人而狐豹貍犬一失退藏之計則不免人禍深其根善其實安其室則天之歳時地之山林守之以自然誰我訾者此不肖之所為遠引固自處以世之忽忽必不吾比數者矣不謂邦君重位天屈以明公之賢而聴採廣遠亦下及於寒微昨者南城令尹告以明公甞賜齒牙餘論且有不過門之恨是以某伏謁㦸前敬謝德貺而負薪有疾久未承禀内訟於田廬非朝夕而已夫以郡太守之尊一布衣之卑螘垤丘山不足方其懸絶而叨䝉顧錄良出慮表辭章賸語孤耿拙行何足以塵凟長者門牆竊以浩渺九州二天在此兩縣瞻戴均受雨露久已三歳不為不幸今值明公解符有日而某鼎來願一展敬雖不敢必猶俯伏以俟將命者進退焉上知郡郎中書某郡之諸生也貧賤而無能是以善窮窮久矣而性識所見尤忌憚於紛紛間甞有言以為天下有至樂獨在乎無所於事使知履地之民皆知有喜於静而無妄於動則宰相可以常才居而百執有司遂得晏閒之趣蓋古今之人間世所以多煩而少佚者正以不重於動故耳事未之無理而物常各有分安我之分而循乎理以對之使凡事先不在我焉則上自上而下自下何求之有哉道誠出此而有至於不得不動則亦可以逃名於妄耳矣日者郎中屈旌車於敝郡既成簡肅仁明之政而又優禮於士人儒冠之徒莫不進拜堂皇望見舄履而不肖猶不欲焉豈特為異者哉以為分之所居適出於寒下殆不足以妄犯威尊則亦可以致妄於所安焉耳且夫守邦之賢侯有美於治術既足以勝稱委注之任而布韋舉子何事而必相勉率以行曲拳擎跽於其前耳夫曲拳擎跽豈亦果為賢太守之悅與四坊二縣十六鄉之人莫不安游定息各無紛擾之慮譬如黃童乳孺時值清夜雖有祅歌華燭之居亦且舒愉然黙寐於姆褓之懷顧在布韋迺思反是即起以紛紛耶蓋某之窮迹所以晩干典謁者凡欲以致鄙昧之見安寒下之分以庶幾無所於事之樂如斯而已矣嗟夫事之變有出於不圖而理不得以勿循循而順之則自然私欲有所不容意必者頃繇北歸初寄食於縣郛而謬為大夫所哀收而撫之謂必有成以至於掖借孜孜而郡佐諸門嘗納謁焉嘿而慮之已怪已之異昔而忠謀之友迺因是而見語以為今業不能専於伏藏孰若遂拜邦侯亦冀蘄於教賜也天下之去取有所同有所不同其故在乎賢不賢者見知之間而已矣大夫州佐在邦侯之側其相與樂交意亦甚渥而俱賢之聞蔚煜久矣大夫州佐常肯不棄庸詎知夫郎中之執事者亦不同取耶且果肯下教也耶是某之所以不自疑於妄動而有今日之來也謹書陋意以呈并自解其不敢為異焉伏惟矜察塵凟尊嚴無任悚慄之至請見韓簽判書寺丞閤下今天下之所知者勢而已矣其次乃以德論然莫如向勢者之多也上自王公下至乎一命之吏權在則門如熾炭權去則門可張羅此不學而能不占而自現者也儒生學士平居放語非德勝已未有肯以一辭為人屈者比其行之則常謬戾視當時之事茍有毫髮可冀則不暇顧其人之如何夫今獨以衆人問焉何也青袍紫服旁午衢道朝與之接武夕與之聨鑣德雖若淵騫未急於致敬也明日移而據臨庇之位則揚裾探謁廢寢食而往雖有不為此者少矣某於天下終不能以衆人自許正由貧苦之故迹未有以愜其心雖然猶有所在也寺丞以文雅進身官已離選曹位已佐軍麾今日之勢雖未克稱盛德然衆之欽戴既已悚肅公堂趨承客幄不慮無擎跽之徒而某亦鳬鶩進焉寺丞茍不賜之矜察則某何人哉區區之私惟此之念謹先以告典謁輕犯清塵慚怍慚怍
