body:
  text: 灌園集巻十四宋吕南公撰書請見蔡簽判書夫學士諸生所以安其素踐而無意於人之知不知不屑於上下之交斯固足以得賢名於衆若夫莫倡莫從與事同波内不傷真而外不異俗則亦不失於能賢論二者之所趨可謂戾矣唯其所存皆不違於道夫是以安而不屑者足以立已而不害自愛本不異俗者足以行禮而不為自輕日者聞之常夷甫在汝隂閉户而静居郡邑之工僚非亟款其門則不忍出見而王深甫則異於是凡得位於汝隂之人無不紛紛而造請上自守侯下至𣙜征之吏適來則為之出郭以迎適去則為之出郭以送舉以此為常兩人者天下之所謂道徳君子也而行身不必同如此且夫儒冠之徒茍為心迹所經不在於罪科則亦焉往而非其所宜然覩今世之人工造請者常蒙才具傑出之稱而喜静居者或謂其無能而引分悲夫士人之出處固不免於悠悠之口歟蓋嘗觀之天下之公論仍未可冺㓕也自其存之不充是故有趣而人莫我信若乃弸乎盎然無所俟於外則其所以舉而措之誰敢妄議雖然道徳之君子不可以人人望其聲華則日可貴而紛紛無能則日可賤皆事之宜然其尚何悲若某之不佞上未之配列於必貴而下不當自棄於已賤初縁凍餒之急不得即求其志於山田曠蕩之中則亦投足於舉塲以近卑摧是雖未能異於俗而所以自愛者猶在故常願立於常王之兩間且安且同而無所茍焉事容己而已之所以庶㡬不屑事不容己則不强己所以致其行禮之心寄食以來蓋六載矣貧賤之姓名雖不足以關士大夫之聽采而郡縣仁憫往往賜之哀矜毎惟造請之非工重以勞善譏之口則迹在公門終非所宜顧在位多賢則汲引之公而草茅承值或有時耳伏惟閤下才徳兼茂取稱於時寒晩諸生所宜歸附而今者位望實佐軍麾聰明發達枌社比鄰將被福澤則一介之微雖未能賢猶不當以紛紛之後自嫌而不思進拜以謝窮鄉之幸若夫哀矜汲引如亦在願而何敢望哉謹布襟私小辱閽人以俟進退之命塵凟清崇不任愧悚請見曽簽判書寺丞閤下書生以造請有位為事其承習舊矣其言無不曰敬慕賢人君子是故朅來不敢後然其心未必契口蓋人不能皆賢不能皆不肖混同其衣飾九十其朋曹盡儒之造請者也魏之人官於趙猶不必遽諳其士人才品况又逺而官於秦於蜀於楚於越其不必遽諳固可知矣其聲迹地里初未嘗諳而各以敬慕為言其來也則亦浮泛接之而已拜則答問則應去則送數數焉則謝此有位所以待書生而常雜以猜疑者也夫有位誠賢而敬慕亦皆誠賢則何至論此唯其有不肖而偽者在焉則其趨奉之心亦僥倖利澤而已矣而造請之徒自是日賤見賤矣乃後有知恥者不願行焉而不知恥者陽陽莫自反也指其願行者以詈之其人才則曰是其作傲其人不才則曰是其無能詈之不止而有位者愈形疎畧矣夫以布衣而造請上官既非盛古之法方又遭承疎略其何足願然為之者未嘗不多則僥倖之風振蕩故也某亦此邦之書生蓋嘗承習於造請而亦不免於詈矣唯其頗知禮義之分是以安焉而不蘄避動焉而不忘悔頃以寺丞屈佐麾符蔚有賢聞則攀援隨衆固宜不後乃及今日始往則亦不敢率然以取猜疑者也生長貴富而自將勤儉藴負文學而坐占情偽此寺丞所以過人而衆所以不敢忘於敬慕何特不敏而敢忘之誠恐左右未賜察慮而待之以僥倖之流則得至坐隅非所光益而區區悔恨無自洗釋也謹先有辭俟命屏外伏惟不吝指顧為人請納拜書某聞天下之所以有道者以其事不違於義也君子之所以異於小人者以其由義而不俟乎教率也蓋禮生於義而義出乎道則先王所為以義望君子而以禮約小人夫所謂天下之達尊者豈必為體道窮理之士言之賢有以過於人位有以臨於下年有以先於己是雖尋常人莫不知為可敬孰謂身為學者而莫之知然則先王之所以言此為待教者發耳自世道衰天下之人或不明先王之意往往放一身而弗率棄一日而不用有國家者恥焉是故持之以刑小人而違禮則得禍於刑謂之君子而有不由乎義其自省也當如之何伏惟郎中清明端厚賢徳已盛名在郎位列爵已崇年踰知命計齒已優維是三者自宜先敬於時而今日之職又居郡守之尊為之下者當如何而合義莫不致恭矣而某以縗麻之艱伏於室廬而獲參於士人間雖望拜舄履然執事者猶守以謙未即聽遂某心懼焉竊以當今仁人在上廊廟公卿皆命世魁傑方將修明道化以復治古而郎中承流在事當亦終顧匹夫乃過常之謙而必屈禮數以外一治部之鄙人萬一閉拒不納使某區區不得在義而遂列於待教率之小人諒非郎中之意伏惟俯順卑欲賜之允納且使先王之道一明於天下亦維賢執事之職豈特某哉謹叙誠辭蒲伏賓次冀所以命之與王夢錫書某䪺首城居搔冗故乆不為鄉友之問然時時諮訪往來頗知體候清安用是自慰吾徒幸能以道誼相存當不於紙札之數疎遂分勤怠以不肖之奉倚在此固足下所宜加亮也近於季源處見夢錫新文一卷讀之莊然敬愛不敢少損如對萬乘聖君然至矣文之髙也嘗與季源言今同輩中求其識悟理趣如夢錫者為不少至於思致清拔每遣詞設色即便過人未見有如夢錫也僕不敏而㳺文之日乆凡堯舜以來作者之辭皆得占次其要知其所以立而所以得也譬如湖商海賈雖未必盡専天下之富而天下之珍竒怪偉無不熟其品致而中其光價者若夢錫之所出誠不易得也貴重貴重觀古今文人所以論著氣質不齊要唯才之髙者則道益宜足彼才之卑者道雖不足無所訾議蓋才卑則氣弱氣弱則辭蹇為文而出於蹇弱則理雖不失人罕喜讀人不讀矣則誰復料其持論哉夢錫才髙僕是以區區矜裁願慎將於道而一期於足適觀義解神怪記所叙詳悉掩巻而思之不敢遽以為無但就中而議則未免於諔詭昔人有記王輔嗣注易事者云結茅為人目以鄭𤣥特因鄭注之繆則撻之他日鄭見形恚責輔嗣懼而毁茅人此言亦怪矣世間事變累累有出於怪者人常對之恬不為異至於文士敘述則動見檢責韓退之作一羅池碑到今好事者以為誚陸希聲志一夢於易尾學士指以為笑且羅池之事豈足驚耶希聲之夢亦無足疑者令希聲而不志夢則何害其易傳之佳耶然世論終未肯如此以新記所叙過於羅池希聲數倍此安能使人帖然無聲自僕見夢錫此文聞外便有籍籍之語間時以所慮對之則彼必見復云信如若論則當今善解孟子者莫如王介甫學者多稱之若奈何不與介甫而獨與夢錫耶天下之理未易以脣舌究正為夢錫計則姑毁此記未為害事蓋以涉世而言則夢錫勢位不幸未顯故不欲從未顯中得好怪之名於衆口使歐陽介甫而有此記人或不議矣然守教者更云歐陽介甫必不以此流揚也人言可畏願夢錫自思之今僕決勸夢錫毁之則已得罪於窮理之士不勸夢錫毁之則又得罪於守教之家勸與不勸僕俱得罪若夢錫則更在乎思與不思之間耳又觀言道頌亦竊以為不必作何者道本不俟多言然後顯也自孟子之後有荀有揚有王有韓四五子皆空言而已論天下之治平則漢文帝唐太宗兩朝已耳時皆無孟荀揚王韓之賢而道化亦盛且四五子者固不幸無位於爾時乃涉寂寞但均不幸無位矣則孟子之言道不過於孔而揚子之言道亦不過於孟重疊焉而已矣孟子之言守仁義荀揚王韓亦何曽不守仁義哉故聖賢而不幸無位則重疊空言千百人與一二人無異也孔子之時儒教備矣雖經秦火猶不害於傳蓋教道之出乎人心非簡牘多寡所能軒輊吾嘗以為四五子者有之適無害耳如使絶然不生與有揚無孟有孟無荀皆自不害且孔子之言具在寧俟餘人乃可明乎今夢錫所頌乃如此僕固不敢從同也衆人方駴頌序所說以為太怪此亦僕所不敢同者以經教所言多有推天援神事且求當時之迹亦安有與上帝授受者天乃錫王勇智帝謂文王文王陟降在帝左右此豈與之接足乎退之稱李杜詩亦有天公呼六丁之語蓋文之竒變或用此僕不敢從衆以此怪夢錫也饒處士墓銘云時節宴集必以文甥坐衆賓之上此言適足以彰處士之失徳世道自有尊卑疎戚之序安可因文以亂之若處士有婿如退之則當為之執鞭結韈乎恐夢錫俊於文而不暇思此也茨亭記理意最佳而率用佛經中語此亦似過當僕嘗愛元微之鐫經記云佛教之言僧當為我説我不當為僧言也此段尤精不知夢錫取之否世之文蓋有用佛語者要之不足比數則無用誰何夢錫寧自棄於此乎僕於夢錫相知最晩然一再觀文遽有論請蓋主於敬愛之深而不敢以面朋相處且使夢錫才氣尋常則某何帠哉今世之人未必皆知夢錫之文正亦悚聽於知者奉稱而已至於叙述一有未安處便隂咍而嘿議此固不能傷夢錫之賢但亦不欲及此與季源商略夢錫文義亦與僕言不異夢錫即不信僕應信季源矣思之思之秋初爽氣苦嚴早夜定輒清冷東平齋館虚曠文學有餘樂更希將重書不宣懐與張户曹論處置保甲書某再拜三五日來野人争傳景倩奉符文體訪保甲利病於諸鄉區區聞之不覺讙快竊以官所行有未免於民之怪者至於再攻而尚在也今乃遭承景倩臨之庶㡬息且已乎請為景倩言其故凡今保甲之病有二一曰離之合之未適其願二曰使之責之未出於憂此皆不可不察也大約今之居民客户多而主户少所謂主户者又有差等之辨稅額所占至百十千數千者主户也而百錢十錢之所占者亦為主户此其力豈同哉力不同也而例聨之責以知覺應援則百錢十錢者憂矣又使之承受縣之期㑹諸文凡異時耆壯之職分皆移於鄰伍之家矣此其所憂寧有免日夫所憂者非力厚之家也正在百錢十錢之家耳百錢十錢之家名為主户而其實則不及客户何者所占之地非能給其衣食而所養常倚於營求又有兩稅之徭此其所以不如客户今乃有一旬之間再詣縣者有兩旬之間三詣縣者然則營求之力奪矣其家不得其人營求則既坐蒙飢渇而其人則方以期㑹不整得撻刑於官而歸然則詣縣不及營求而得撻刑以歸卧又不能此百錢十錢之户所憂也而客户之憂又其最重何者客户之智非能營求也能輸氣力為主户耕鑿而已則其一日不任事其腹必空而况使之與主户共分一旬再旬之憂乎此正所謂使之責之未出於憂者也今之民居無常定也有團落之間雜數十百家者有五里三里寂無一家者有東西相望而阻以山川者有懸絶之聚止於三兩家者此皆户名著在官書而其逺近疎宻則官所不能知也知之者其里之長正而已今不以責長正而使胥徒坐廡下按籍而列之蓋胥徒能以主客户參雜耳安能識其所比而聨之是以一版之民有相隣而屬異者有極逺而屬同者皆按籍遙㸃之效也夫所以為之保甲者為欲其有事則相知覺應援也今乃割近以附逺引異而配同其能有及乎西鄰有急而東隣坐聽也問之則曰我版屬異矣而使其遙遙者來來何益哉南北亦然此所謂離之合之未適其願者也維此二病其原非自一司也縣稟州州稟臺臺稟大農大農稟政府然則其民之或病汪洋於荒村僻里之間豈今體訪所能治之但䘏急而計則使責之病雖出於輪差之文而可以稍至於簡離合之病雖出于客主相參之文而可以稍至於便此則體訪者之能治也夫保之之法長正専領其聨比而官直明其督責則民以所願合而便矣雖主户少客户多然束於不相參不得已之勢許其私意之相與則縱有差逺亦愈於按籍遙㸃矣此所謂稍至於便者也村耆之役猶未除去而新條所列亦謂伍中自有事起則責其關白耳豈必以越某伍越某伍而期㑹他事哉誠能不責其越伍撫事則所謂稍至於簡者也幸今無事民無凶荒兵革之患而保甲法行數月間民且怪而憂之仁人君子幸當其任可不憫歟憫之斯救之矣救之之術非使之稍入簡便而何為乎或人以為長正専事則患在俶擾此又非照情之論也凡人所以不愛其身者皆衣食不聊生之人也彼保之長正衆户之豪貲産可戀宗姻可憐其愛身之尤者也平日小民犯分於觴酒臠肉睚眦之際而臀膚屢破然不顧者自以雖死無所睠惜故也若蓄利之民則鮮有視刑誅如無有者矣方其有所不免則厚賂以求人其心豈不吝財哉愛其身而已矣今為長正助役之不免耆長亦為之而坐因稅額之强輒得無窮奉官之勤其見歉矣上有明憲一陷其科則小徒大黥彼何苦而不避也此固情之易照者已往者某自洪來過郡下而季源法曹頗以輿言未利為說當是時季源被符將以體訪故也而某亦欲吾民之勿怪而思有以忠告之蓋自東出邑門行百三十里厯四鄉境土而後至吾山而住山中又以六七旬而所得于輿言者未有不病此也季源雖以家禍去官而景倩實來豈天使吾民之怪遂息於此乎以景倩之仁明宜已盡察此等而某猶爾云云者順野人之所望也伏惟加之覽而亮焉又書前辱黎灘迴示以所議保甲事為未盡知新法之意景倩以此語處我非不可以受也但詳景倩所以發語之由則猶可以勿受何者景倩亦未盡知吾意故也夫聨鄰伍為保甲以檢責姦偷譏訶逋逃此熈寧以前縣大夫間亦行之而民間曉此甚熟矣何有今日曠然大變吾君吾相之盛心推徧海内而書生猶不知乎蓋奉行新法者有所未當時措之宜則弊所以形弊形則民之所以怪且憂景倩以使責未出憂離合未適願謂皆法之所無此何言耶使法而有此則何以謂之法也法無之而行法則不免有之景倩豈獨不聞且見歟前奉論之時縣所下期㑹諸文月數十於保正所而耆長所受或十餘而已蓋保正雖豪而其職則總統衆長其受符於縣則退而關付於衆長衆長又輪轉而付之其屬户此官所許者也而且越鄉跨里責其辦事事未必辦則官不得無懲艾之威此民臀所以流丹相照也某豈妄議哉嘉祐末年今河北都運吳公為南城亦行保甲矣聯二十家𨽻一長而不問主客户取於比近勢足以相及而已當是時領事者唯在耆壯而不聞有擾民之患蓋唯不委耆壯而屢以官臨乃所以致民之擾也彼以為平昔聨保甲官未嘗臨而今則臨之此其不止於檢責姦偷譏訶逋逃必將有以勤我者其所以擾也而况不能無離合不適願之怪乎今保甲所在有相去十里者甚者至十五里有隔山阻水有異保殊坊者而並居一聚之民則都大析碎宜合此而反附彼者矣某豈妄議哉景倩以為上官諄諄開其申愬有未適願則為改正此非某不知也使官不許又不改正絶無紛擾之憂則官猶不失為煩民猶不失為勤况乃胥吏檢治隂求微索情所不免保無憂耶視今懸逺必愬之户率百改其四五十而後可耳然則上煩下勤其有遽盡之日哉夫民知逺慮者寡矣是以未遭急故則未暇愬其離合之非便若知思者則遽愬其然耳然則今之未愬者非不愬也愬在後日而已景倩豈不念此蓋為政而不執其要未有能善者也今懐未必敢之疑而使民必愬無已豈要也哉某雖在山鄉然非日無野人交論者頃以季源誠託故因行而問知其說既未及吿而季源去竊以愛人利物君子之事而景倩君子之英幸當體訪之責足以使民已其所怪故不嫌屢瀆而私以書焉誠欲裕民恩力出於景倩車馬之下焉耳景倩乃云然吾豈風波之徒哉景倩處我過矣數旬以來縣不下期㑹文於保正所衆户由此泰定皆以幸脫丹臀相慶若改正一事官更垂意則受賜因吾景倩豈曰小補如之何如之何
