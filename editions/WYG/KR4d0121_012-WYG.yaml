body:
  text: 灌園集卷十二宋吕南公撰書上提刑郎中書代人作某聞之君子之道有見於退而終無意於進則雖天下之大不以闗乎已如其心未忘於有用之境則一身之行止尚不得不借資於人亦何言天下哉葢嘗觀書見唐虞之盛時其世道已隆其治具已張上之人孜孜以亮功若采為務而百揆四岳亦既在善而宜同矣而巢許之徒方矯然以立異于是背睨而掩聽疾走而避逃以為是笑而可羞求若人之心葢以箕山潁水為無盡之樂耳顧曽僉舉之涉慮哉士唯識願不必于均壹是以咸熙庶績其必以人欽俞試命黜置之所繫則下之所揚豈不重于上之所咨且以共兠之無狀而不决于棄斥雖以舜禹之賢聖非由衆與則未㧞出于羣工又况乎碌碌之庶職歟舉知之所以重輕甚乃如此世衰道隐士稀勉勉之修而盛佻佻之習皆知奔嚮于進仕之地而不思人之謂已何如也而己果不為人所信求者不以思而應者不以信故舉知之風自此寂寞而無聞矣士而不幸出于寂寞無聞之後其行若止亦知奈何必能遂志于退藏則嫌于未在中道將以區區于適用則必進之助難容借之母已焉亦有端我以俟人而已矣凡今之在于下者其路正軋而其勢甚驚也位與言乖則事與力違唯乖且違此簡書察責之所為惴惴而何暇望知己之人而舉揚之雖然猶有說焉以為各占分所宜以自幸焉斯可矣葢仕而願達茍有名于禄籍莫不念之使今仕而得願之人盡已俊良則無所復議萬一不爾則失所以䝉稱而被薦者尚非各幸于分所宜乎一人真可而譽之者二焉衆猶未允也一人未可而譽之者四則衆既服之夫某亦安識若人之為可未可哉姑以時世之所同占而言之耳某不佞少而謬志于進故為進士之學詰曲于薦試者先後十載葢四覆于禮部乃克有成綴名于選科掌法于山川在衆人中誠不自知某嘗所蹈籍與今所莅領為果如何方思端以俟焉而幸出于不圖前守張公與今守劉公及運使徐公皆有言于甄借自惟孱陋無所堪于進用而獲助于此則始之以駭而繼之以喜而中又自疑審以某之行身為真不足用歟則三公者何為愛之而不至于失措以三公之賢而措不容失則今憲司之重如執事者何特未以為憐乎是某之所為自疑也伏惟執事有才甚巨有徳甚明當廟堂咨吁講求治道之時思有以網羅器使倣像二典之光英而親承注委出振使者之權以照耀于江表其神之所達精之所察十郡之休戚良窳葢無不在術中者矣如某之鄙必有所處即蒙嘘及始末遂以成就則何但使某不見笑于退藏之徒必將揚厲庶職以宜已分使三公者皆免失措之譏焉敢布腹心唯實處之上運使郎中書代人作某以下才浪從諸生課試之後幸備一官守掾局于逺方而屬當明公察臨之下自以無狀恐不能勝稱事任而勞執事者之放斥迺不知大人君子恵顧所周存細而容愚委此不議已為厚賜而間更被以書教以所不能而又責之以其所見聞來訪于左右焉嗟乎此盛徳事也顧雖不足以辱問然區區之心亦由是而興感葢惟士之從于此世也茍未居乎頑鈍不靈之魁則幾乎而不有心于行事少而學焉長且試之夫孰不欲而禀今之法則勢有所制葢上之人將大有為而欲盡宜于下下之人喜于所逢而思有以伸于上然或不能也何者位望之有分而崇庳之地遼則幸夫言論之協符事權之相與亦已鮮哉今以某之荒庸無所取類雖亦有所懐而志慮槃礴曽何得于明公之意外而于此過蒙諮逮焉將奈何而復之毋亦因今所欲陳而取鄙心之所謂尤足備用者致下僚之忠而不虚辱于明公之被及冀高明亮之伏見今南城知縣著作佐郎葉誼端厚俊明有巨人之器姿其當官所試葢未顯乆而事業趣致超然無流俗之風莅職以來事日以簡而政日以優不察而詳不厲而肅鄉姦勢害聞命而沮熄蔽欺悖盜之伍藏怒于訟機欲以犯死而不返者初從庭所得令一言而曲直醒解舞踊謝退而不俟刑平至于申飭所加未嘗不本于仁義而無依違顧憚之思方其有所弛張雖有挾泰山疾雷之勢不能撓奪于毫髪也南城故冗劇盛有難宰之聲而某訪之士民政理盡善近數十年來未見可與若人比者唯是往年蘓秘丞緘及近去吳祕丞審禮皆有能譽于此縣然猶各有短處葢蘓君喜土木興造故或涉于煩苛而吳君之政迺獨不盡于理稅科徭二者民事所先而缺閉如此若葉君之治則無得有是葢今時世所稱為賢吏者多以其能奉法循令而已矣然奉法循令而已者果不足以盡吾葉君哉凡令之近民威可以使其有畏而愛不可以貎得也事可以心了而政不可以言辭善也今坐公堂臨衆務恬聲暇氣終日不形于喜愠而理道整整使環境之俗讙榮戴頼如倚父母非夫政以心化者其何及斯比以吏格當移蜀官既已拜敕則郡之士民相與驚起列牒愬于守公且幸其飛章請得終任以恱饜編甿而或人懐其初無阿䛕順㫖之事即遏沮之到今歎者未已聞此邦之人無富貴老小皆拊髀悵惜譬猶嚴冬大寒方温席快飲而忽有欲褫奪其衣碎其座而覆其醪饌者孰不懔懔乎其憂哉晝陽夜漏修促以天未有可淹而返遽者今民之情牽于所愛也以吾令之行有日迺恐其即去以至于嫌恨景晷之不我遲留嗟乎何修而得此也某誠不慧行于天下未盡極廣而所以見聞實無尚于此者且夫人才不易得而君子之器能必見于事為難與之間今南城之賢出此誰當賞之乎伏惟明公位任方振當大有為之秋公忠所達朝野所為矜服葢將收引賢類揄揚養導以備輔熙朝之光如誼之賢宜䝉省録且無使其居衆人之後則非獨長茂明公之徳抑足以稱詠于太平之時擬之福禧古人有言得地千里不如一賢葢某之所以銜荷明公之賜也厚矣富矣即圖忠報効于左右莫若稱賢之為事故輒以是舉為之先焉雖區區所陳或渉明公之已聽聞者于某之忠猶無害也伏惟加察與傅亨甫書十七老丈祕書閤下伏承車馬至自北方去國三年稱遂成名得財得官跋涉無恙歸覲親庭銀髪萬夀井邑親朋無問愚智莫不讙夸讃歎迎拜捧擁譬如買臣露綬季子腰金之年伏惟君心亦在優慰某區區于老丈下風知審顛末自以為最深側聞今段喜與感并竊以往昔慶厯皇祐之間世路靖康廊廟大臣以洗拔文人為先務布衣起茂材因以至宰輔其下或為列卿至尤不幸猶不失禄養于此之時旴江之湄辭學渠魁聲動天下者有李泰伯而陳漢郎與老丈為之流亞志氣軒赫掩葢褒博物議欽悚率以顯達奉期而天不契人都大落寞泰伯晚䝉收召俄亦死于鬱鬱漢郎不及脫布衣以早世老丈獨存而窮悴無雙艱危萬態險不自濟比過五十而羈㳺萬里干戈戎馬之地辛勤暴露乃䝉一命補吏于海上此豈足以為老丈之福哉黒頭公卿秀髪御史迴首懇然雄文好詩填委篋衍傳滿吟口曽是勞神殊不得力然則今日衆人所以讙夸讃歎者見老丈一旦輝彩而莫知平素之襟藴也孔子録詩有取于淇澳緇衣孟軻春秋亟稱彼善于此不得于其卓卓則次而又次者亦所咸収顧不為充盡而已老丈之賢不得大行其志于當年而遲晚綠衣初隨趨走之後較于漢郎則全勝視泰伯則稍過之若向宰輔列卿論焉葢欿然矣士之抱負出羣而遭遇不優如此雖世道有不相與而亦區區所為感歎也河湟闗陜舊事毎從紙上披見恨不如太史公周流縱覽故都遺迹以快心目老丈留連其處日月多矣想無不熟于指畫冬初去書社且展謁髙堂以諮世變邇日惟冀自重不宣某載拜與傅商容書三十四丈秘書閤下季夏極熱伏惟尊候動止萬福往在城東幸得參拜行館過䝉引接至于忘年出示所著易圖口談手㸃不愛再三某雖愚未能悉悟述作之意然恭敬徳美比之亨遇不啻百感嵗窮走洪都仲春却還舊山到今困于多故酬酢不支因亦不得馳送尺紙請問安否傾企媿負交戰無已祕書風誼峻潔須向古人中求之流俗卑汚知與不知葢不足計某亦未超脫流俗方且與之同波而就中檢校尚能商訂文行不為衆人好惡所蔽此一直耳天下之人不限古今皆以能賢望于儒者而儒者亦髙大其說如必允蹈及察其迹則不類市人者少矣農商鄙人眼不識字耳不貯仁義之辭然安其職分貪不至墨羡不敢竊雖甚勞苦不縁僥倖而布衣書生以士君子自號乃由少壯至于老死胷中擾擾不離嗜利矜名捨性命犯禮律而為之一慕十十慕百百慕千千慕萬萬慕億億慕句股夕桀力不必破蝨而自許回天智不必衛足而自許窮神葢讀周孔書之徒于六經之言未克躬行一句而開口即罵老莊方其罵時頗似不堕人短及察其迹則知足不辱知止不殆此八字者千萬人中無一二人踐焉此所謂稚子弄影不知為影所弄者也一語罵老莊尚係毁謗况終身訕笑者哉夫少而求仕進至垂白而不達亦可以卜其身之窮矣顧乃撑衰扶憊一歩五喘五歩三息趨涉長道以冀或近于利名此當世之人所同欲也于未必得者如此而况于可必得者誰肯捨之祕書三薦登科補吏大縣一跌于寃誣盛年拂衣歸卧林野不復動念親舊敦譬詔㫖開示一如不聞被服飲食粗素薄淡不啻屠酤俚兒而安若八珍重錦魚輕鼈忽兎䜛猘吠相因而進而䝉受理遣不為之變考經論史日作清詩取次勝人而不為時名此皆千萬人中未易㝷者也而秘書以為士固當爾夫流俗何足以知哉夷齊不經仲尼評品止于蹇拙餓夫而已李仲元見知于揚子而人更置疑近者吳孝宗能為出衆文辭而邦人呀呀謂之可怪至信都公以詩褒賞然後笑者口吻乃斂士之藴藉包蓄惟求名實相副而外譽不惟其實徒􅕽于名故世俗紛紜如此祕書風誼豈以有求于世而為之哉某所以歎嗟切切者感古人而已矣亨甫新慰逺歸想旦暮聚首吟笑之樂良不纎細漳浦三郎乆不見消息不知有諮覆上左右否某坐山間亦漫銷日夙聞東巖幽名尚未投足冬初思一往并得上謁户外起居全望珍愛謹奉手記不宣復傅濟道書昨許秀才經過連得吾兄夏中兩書伏聞官下諸况平裕太夫人夀康不勝延跂之思所示古律體雜詩一軸辭致良佳如白雲村篇殊有作者之氣視今日之賦諷勝前逺矣方又屢進不止則古人何必獨能哉聞有解周易及論語孟子文字甚善雖未得借讀然觀答徐生書可見别來道學所造雖然濟道用此趨時以致及物之功業則可果以為儒者功業正在乎此則吾恐未也古之人有大勲名不少顧不必皆能解經而善解經人亦未必利澤當世漢以來學士可按矣葢古之所謂學者非漢以來之所謂學也孔子所繙之經天人而已其言雖有詳略要之可以心通理察非有虚荒誕幻鑿無出孔之致三千七十二子所以服膺不捨而終無事于傳注者誠不以不曉期後人也孰知其後日解日昧如淖滌塊而為之者轉稱第一難能且爭為者相望乎哉夫一經而數傳亦已足矣終之又有䟽釋則滋足矣賢者雖不見此當自曉之愚者雖盡讀焉猶不可曉也然則漢以來經師徒以口耳亂學者之性靈耳如使其言具當則後人何必更言之如使吾道不失于聖賢則何必専以說經為效此始為傳者之過也今之人有心智可以通理義猶昔之人也彼後之人亦猶今耳今吾不盡信昔人所言則後人不盡信吾言葢可知矣不蘄力行誠身而以唇舌紙劄相乘此爭為者之過也吾嘗取譬解經之家正如水鄉漁户方其垂綸合綱而有得也軒軒然見喜色似他人莫我若者不思自古習漁之人屢得此也及其挈而之市也茍售而已不計人之貴否也故有以昔人之陳說為吾之新立者有以衆家之同辨為吾之自得者呌呼而逞詫突梯而希譽欲以厭服人心而反自彰其寡見淺聞其可憐如此往日宋咸注周易自以無比及歐陽永叔取郭京說照之然後論者笑咸為盜翁雖不笑者亦曰縱咸不盜京孰知京非盜昔人者乎是則宋郭之所負未有以變王韓之解而徒以取盜名于世耳士誠欲學經用先儒所說而發我之神明見于行能可矣先儒雖有短何必力毁我雖有長何必􅃷人不聞夫傳註能致益乎哉則益宜不小矣其書既多故也嘉祐中詔求遺書其解經家學名存而書亡者毎經數十家而新唐書藝文志所録解經之書存者毎經亦數十家夫未嘗盡見古人書而遽以我為獨得也其誣孰禦今日解經人極多大槩不出于介甫之書與皇祐以來題府韻類無異也先時王補之解論語衆甚欽仰俄而皆曰是得之介甫云耳然則為補之者孰若静坐熟眠而聽介甫自說乎介甫未嘗不開說也則天下之士茍已心服介甫何必區區各鳴喉吭哉僕誠怪為之者不思也或人謂彼非不知可以勿為然不為則無以合世故已顯者以此示其可貴未顯者以此希其見貴嗚呼若是則滋惑矣夫今天下之待介甫不過如周孔耳周公至顯而作六典孔子至窮而繙六經然當時無人傚而作且繙者雖傳解之文皆不為之而何害其服周孔乎如以為直希利達則不必更稱深知道徳性命也濟道未三十而得官在仕途以材敏見知于上之人地雖單平而勢亦利進今所為書特以抵當路大官趣為教授直講可矣如盛心初不為此則吾儒功業當重思之濟道不信吾言乎請約自今十年逺至十五二十年間視今日解經諸書具傳不熄則吾飲墨甘罪可也蕭統所集繆多而是少如王儉任昉之作秖以汚人耳目濟道讀而擇之老氏師資之論可以為喻矣新詩繼有作不吝寄及幸甚幸甚
