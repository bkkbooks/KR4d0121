body:
  text: 灌園集巻四宋吕南公撰七言古詩和得茶雜韻衰翁脾病怯飲茶不但嗜酒成雄夸夜長晝短讀書苦佇待雞鳴愁日斜秋蔬搜腸酒正惡踏爐火慢煎雙脚偶然接得西安角險欲衝塵送髙閣沉吟却憶陳公子慣在京華看貢篚䝉山顧渚建溪春花乳清泠徧知味今來下國深秋景酒厚花稀心未醒盱水中􅍽亦試烹豈須奔走揚州井延陵行莫愛傾城名名髙禍將作莫嫁多才郎才多情義薄君不見季倫不保緑珠命長卿終負文君託豈如延陵廡下賃舂人無色無才貧且樂烏翩翩行烏翩翩魚漉漉陂湖漫漫浮窮肉貧民疫死屍且壊冡兒忍看熏墻屋桐棺一寸無錢置亦可躶埋難乞地繩攣簀載肩負􅐝暮夜間關來此棄哀號數聲淚淋瀝歸掩柴荆鄰寂寂官家政令如文王日月不為盆下光黄茅行黄茅䬃䬃天垂雺夜宿野亭行旅共看看燈火問他鄉聽說艱虞各悲痛早年轉貨河東北亦熟淄青渉梁宋民生富裕利源寛所至如家忘勒鞚晩來凶札作饑饉首尾七春荒播種已知人物俱流亡秖有室廬齊歇空迴旋却走嚮淮浙併值紛紛歎飢凍積屍狼籍臭相兼無異爛魚藏暑甕去秋關陜穀將稔踐嚼忽驚黄䑕衆正憂飛輓負洮岷敢論倉箱稀食用昨聞王師又南伐熊羆十萬臨諸洞荆潭五嶺皆宿兵日費千金誰運送閩州旁助早成乏何况匹夫圖竊弄三川迢遞未得歸懸想詎能餘賦貢獨稱江國久豐足游歴如今愁更重旱傷水剥疫癘頻何處商㕓猶佚縱囷京少食但蕭屑冦盜乗虛還扇動一宵此地漫安身萬里故園難入夢喓喓雞唱侵枕脚淡淡曉光穿屋縫去矣東西勿復言文臣方獻昇平頌遲晚行少年踴躍希卿宰遲晚徒思老江海吾道淹衰髪漸凋壯圖銷鑠田今買文苑鋒鋩稍収戢醉鄉朋舊多攜解唯有憤世嫉邪心自計終天不能改嗚呼行為閩冦屢動州郡無兵而作君不見熙寧宰相經綸苦不肯養兵累神武多時州郡罷招軍欲責耕民為戰伍詔書一日下九天守令宣布周鄉田十家嗟吁百家和父子握手悲殘年干戈不與鋤耰雜此道幾迴輪厯甲未能井牧似三王何用匆匆謀混合輿情有幸聞旒扆斂鼓収旗防怨謗爾來下國稍自安其奈兵防已頽毁大城有兵不千百小城更少幾許力一夫竊發數縣驚坐恐飢癯皆盜賊承平久矣稱繁富儒生枉被髙談誤同聲敷奏盡哀矜引手施行皆耗蠹居不得寧輯財安能充裕嗚呼争得畧如開元姚宋之民人萬里東南開夜户别離東家賣兒價何卑西家棄婦聲更悲得錢未足三日飽既别豈有歸來時山如髙城路如線迴首難言淚盈面螻蟻溝渠處處同短長不復能相見死别離未如生别苦綢繆恩意無窮處忽作乖違成陌路非縁官誅與私刼忍令棄置隨童妾夷齊不可人人學爭得腹空無悚懾生别苦此苦無盡期百年泉下亦銜悲娶婦養兒畏不早何知此日難相保貧婦歎昨日良人死窮獨糧空子幼身自哭賣衣葬罷急謀嫁富翁立待封居屋夫妻寒賤恩亦深縗麻終制非無心飢腸雷鳴無可奈禮法雖存何足賴教學歎卑卑窮生無令圖偶開濁眼窺字書村田子弟念筆札邀請稟訪同師儒逺防鬭訟習詭訐近就財利評侵漁行身便事世所幸先王教道徒迂疎君不見官家設庠校俊士羅冠裾亦工細麗茍榮禄誰復髙逺稽墳謨本期教學敦風俗今如附子充飢腹勿願夀勿願夀夀不利貧祗利富君不見生平齷齪南鄰翁綺紈合雜歌鼔雄子孫奢華百事便死後祭葬如王公西家老人曉稼穡白髪空多缺衣食兒孱妻病盆甑乾静卧藜床冷無席壯士膽歌非災非祥何所出迴天轉地成慌惚蓬萊金曜急食昴矯矯霜虹横貫日帝尊萬乗勿致威大兵如火無所施擒龍扼虎無所尅手引存亡纔頃刻事無今古用則靈用時天下毛髪驚能將義勇發至誠壯士之膽君勿輕恩讎必報歌蘇相東歸施不妄欒公得位言何壯恩讎必報真丈夫不茍而已焉知餘浮生百嵗飄風速胡為顧慕甘侵辱道之至實先吾身紛紛毁譽何足聞西風西風一夜颼颼動冷觸病身増疾痛卧聽促織不成眠起望明星還内訟十年客路過秋色五畆故園停嵗種學如觀海祗自竒文似屠龍竟誰用情知至足在飽煖何事低心隨薦貢桀溺從初豈有官接輿却是能歌鳯今雖未借邯鄲枕昔曽屢歎南柯夢哿矣歸哉有近期㑹將物我分輕重渇虎九月十月霜漫漫壙埌南野如羣邊東風已作凍未解日月曉望皆璚田岡陵焦枯澗壑竭草木性命俱沈緜彪家於時若為處掩擁敗葉方閒眠陽輝中天穴户暖起坐嘿毣喉方涎虛腸未充多譛士怒掌久斂悲盜泉黄河泰山深且茂恨不休止蘄安全熬然宅此取飢渇焉用武勇聲名傳側聞近便長松塢十頃池塘停滀古不勝積潤在鱗蟲浩有餘波沾畎畆尾搖伊昔諱凶檻腹滿願今同鼴䑕世間遇合無必然平行静視皎日前嗟來懇惻尚不就避逐刺促渠為賢主人若不開文籞歸卧幽林待天雨乞士歌天下大辱無過乞忍能餓死不終日空瓢曲杖行復嗟髙楹厚壁他人家風蓬蓬雨臿臿夜投野廟眠枯葉世上艱難有此時强顔豈是相師法從來詬罵多言乞僮客受之猶噎鬱今日同行富者孫末年禍福誰能必關關春樹鶯關關春樹鶯晨哢不知久似欣融和景樂得飛鳴友可憐天性喜朋類肯念同羣雜譽咎年年日暖風暄時園林無處無芳菲髙翔俛啄足自適焉用戚促勤追隨君不見花間栁下紛紜後擘彈揮丸少年手䝉籠枝上驚急來不及吚嚶已分首世間利害難預期尠少徳義多姦欺雁奴傷損雉媒飽儕輩豈不交傾危古人惡熱曽吹虀莫近王丹墓畔啼讀文塜銘長沙進士何襟靈辭源浩瀚如翻傾十五年間聚文藁得三千紙封為塋自憐意氣頗足惜題作文塜仍鑱銘富哉言章有如此恨不盡見空傳名吾聞人文乃儒效用之佐治王化成五帝三王實推濟孔孟憂世存書經真儒不作世已異文士所說非所行趨時治已兩不振奮筆多是圖生榮唐文舊録二萬巻于今大半歸漂零昌黎河東幸存顯自外寸片誰與稱故知辭藻貴遭遇身後紙札皆勞形當年不用更埋聚傷嗟此似秦儒坑石井大雨雲垂四山潑墨濃風怒發屋茅遮空征人不安紙盖下猛雨迸射郵亭中厩兵色動牽馬出惟恐摧壓傷儀同吾衣敝薄未免濕今夜何處還張烘古人古人已往知無奈猶被後人興蠧壊前亦人焉後亦人患自口强心不逮揚雄比孟必有辨馬卿慕藺良足怪未充志氣徒好名醇醪豈不因糟胾君益惠竹杖衰來病衆難推盪日覺筋骸非壯長百畆鋤耘致苦辛萬端應接皆牽强稀曽起處鐘漏盡多是歸時星月朗滿腹經綸一意閒墾田頭緒重新講偶逢過客語文字突兀破壊如夢想太息諸書不救飢幾曽貨利微能倣故人憐我晚愁瘁委曲相寛三復兩卒嵗嘗分蔽骭衣方春又贈扶身杖修飂一竹信瑰特知自何山精産養數節包絣鶴脛連碎花黝糾彪皮爽提攜宛勝氷玉滑頓卓便同金石響野老生看每問名耕兒熟見仍私奬未諳黄鉞端許制久慣青藜饒俗狀靈夀杖堅負曳勞朱藤飾偽功程枉何如得此清峭幹本與雪霜争氣象舊谷遺根未陸沉末年遇主成真賞已將蠟屐作游伴更共文簦為静黨測渡無憂石澗淹助跳肯畏泥坑廣時修疆畎便指畫自牧雞豚誰放蕩差可攓蓬訊髑髏豈徒闢野披榛莽傾危屢濟功轉積安穏利征吾濫享輒莫飛飛向葛陂要當受侮敲原壤古人五十徇鄉禮我為困窮聊早上畫㦸彤弓且勿思蒼顔荷蓧西村丈代木工言歐陽子作啄木辭嫉世俗室廬無制善乎其為激之言也余以為啓之者不令而引之者不遜然後力之者劇焉是則財豪之罪宜先匠師之罪可恕於是代木工言願君勿斵木工手請斵財户眼與心時平力贍侈不徹有見必欲相摹臨試言賤工目所擊竊竊富室清溪潯偶來公府證訩訟適見棟宇雄深沉歸損多貲換堂室唯恐壯麗微差參逡廵子弟到京國新值器服夸如今買真購法不議價持還逞詫爭歌吟一家矜尚一鄉慕自此籍籍師奢淫當時溪西鄙樸老頗出厲語聊譏侵為言人生倚衣食繁手未必加淳音百年榮落豈易保身後志業須勝任華榱不可孕金穀盛服幾許忘釡鬵不見聲容赫赫家晚來衰謝無遺簮乃公營求嗣孫毁弓劔往往同芒針人情䕶近不庇逺厲語一出爭詬擒况我孱微食技業得不骩靡依餘隂區區小材盖如此天下誰與制尺尋安得髙梯切閶闔上叩帝膝敷誠忱盡取人間富財户免使僣偪難㪺斟工手何辜可毋斵自然風定無驚林奉和内翰太中臘雪出郊長句冬風雖饕少霜霰一雪偶嚴飄臘旦初驚雲物稍悽慘更覺天威能變換翰林太守方出郊去指登髙作榮觀崩騰逼眼忽無盡皎潔映懐成極絢從前温燠自迷舛到此雱涼誰計算下看平路尚稀微逺望諸峯先片段虎頭巖側山腰半羃䍥薄煙占午㸑傳聲賔從暫紆餘命酌聖賢同欵緩飛花滿席不須拂小大入腸寧復亂山隂安道今在否更欲扁舟破瀰漫立春雪凍有懐道先賢良展誦臘除見寄長篇輒反其韻為詩奉寄先春一雪何易消南山驟見青岧嶤餘寒忽作雨氷怪似有隂沴相呼招第堂晨興乍出户畏泠須鬢不敢撩還歸書邊擁鑪坐想像悠逺情慅忉念君幽懐繞嵩少如鏡對物皎莫逃乗髙北望三十六只見衰朽連平皋心隨歸雁身欲去又寫佳句傳鳴嗸縑圖遥遥郡閣迥髙詠盡日行周遭無人屬和巻自滿蚊蚋詎可冠靈鼇自來耕野寄病叟珠玉偶許麻囊韜空山寂歴時一諷爽爽不覺驚骨毛當年只是說蘇李後此豈復論劉曹嗟乎歩武已誤髙蹄涔不録滄海濤東風浩蕩官酎饒不善酩酊虧二豪和道先南城逢相工古人往矣說可傳顯以悟者其為賢周侯樹立囹圄餓蔡澤飽足四十年知之窮通信已妙降此抵乞食與錢貪䛕末俗滿吻涎一中百否紛可憐吾徒自斷休問天書冊讀盡頭蒼然功名分比橐裏弦且飲美酒飼豚肩和次道村田歌蠶蛾已􅐰明年卵蠶婦乍閒嫌夜短圃柘無端長宿根潭蘆不住抽新管時哉樂矣犂鋤伴箬笠圑團麻袴輭日出離家日入歸豈論歩武如輪轉强丁屢歎牽車逺稚子或訶鳴犢緩暴雨晴雨忽蓊然相驚不覺耕皋晚老翁踞坐抵掌談奬借専勤譏懶散草衆當爭第一耘塍髙勿厭重新剗中天節近香醅綻篘面色如人面􅎼里巷齊歌競渡聲人人錢在雞巢滿賣帚翁霜日倒芒梢􅀈筠勞束勒斷送山野村叅陪塵土役價卑徒易售用貴安可得人間糞穢日以多翁負帚秃當奈何老樵何山老翁鬢垂雪擔負樵蘇清曉發城門在望來路長樵重身羸如跛鼈皮枯亦復汗淋瀝步强遥聞氣嗚咽同行壯俊常後追體倦心煩未容歇街東少年殊傲岸和袖髙扉厲聲喚低眉索價退聽言移刻纔䝉酬與半納樵収直不敢緩病婦倚門待朝㸑山中即事寄上知縣宣徳一錢重丘山斗粟輕糞土昔聞豐年樂今識豐年苦東家米粒白如銀西家稻束大於鼓再三入市又負歸慇懃減價無售主刀机縱在屠伯痩盃勺長閒壚婦去了無蹊徑近甘肥只有呻吟厭寒暑相傳城邑尚牢落村野蕭然安足數鄙夫自分為儒生坎􅇄薄佑來蠶耕言章自昔枉用力債簿幾許能除名連旬暴露顔面黒彌月菜茹腸肚青原田常恐不遇嵗及此遇矣當何成昨日鄰翁諮種播相與竹下團團坐共嗟衰暮值艱難未覺豐登勝飢餓望天窅邈叵致詰得令賢明聊爾賀不馳幹𨽻擾租輸更秉公心憫鹽課何鄉巨惡不手斂有處宿姦皆膽破且勿恤失得且毋論福禍但願令尹住三年錢重物輕猶可過麻姑道中山翁種樹不差擇桃李無窮雜松柏風吹陽和入芳根萬白千紅映蒼碧猴藏鳥啄人恣窺桃李實熟無完枝由來未可論堅脆松柏材成斧斤至道先賢良寄示長篇輒此酧和略希一笑閉門却埽未足髙遇酒輒醉豈其豪窮山終歲擁書坐澗谷曷日興雲濤浮沉非工俗子惡只與筆硯為朋曹流年侵尋路婉娩鏡裏已復驚蒼毛作為文章世不用似對婦女論鈐韜欲陳肝膽自薦進恐類衆蟻觀連鼇嘗聞聲氣有求應此日寂寞誰相遭當歌無和亦已矣豈意或有憐悲嗸陳侯嵩丘降靈士傳世事業師夔皋有官未得斷國論昭代尚把浮名逃陔蘭芳香月桂老静卧感古成憂忉題詩逺寄巧及我稍比陳敵輕兵撩龎㳙疎輭孫臏銳勝負不待明占招惟當釋耒往共飲不必皎潔分桀堯夜聞夜聞黥徒歎行苦傳檄馳符渺無數霜晨雨夕常疾驅鬼魅豺虎何山無寢興順時豈不欲簡書可畏鞭刑毒儒譏冗食知謂誰我非浪費官家粟内翰太中以某伏謁郡齋特賜長句謹和拜酬寒人氣象寒於氷聞有嘉運無由乗陽和吹噓品彚生燕谷凍瘁漠未驚年華四十盱畔城慣處涸竭忘流盈六張五角長合并百慮一得嗟何曽鳴悲自昔起不平苦調往往抽毫成窮衰到處難得朋坐使見笑蒼蠅聲心知俗譽不足榮分死枯槁羞逢迎由來極晦亦小明不在壹鬱居蠻荆翰林先生天下名風裁如鑑初無情偶然誤許筳與楹重言既出衆懦興譬彼卧蟄因雷醒恩文撫接曲盡誠更剡薦牘辨玖瓊匹夫有獲萬口稱此世不復投清泠正恐疎濶如樊英送何齋郎赴選書堂四顧皆蒼山禽魚樹石煙雲間紙編屢絶筆屢鬜十載一瞬忘青綸誰令忽憶南薫關盡箠打馬鳴鑣鐶春風桃李紛妖嫺辭家大笑涕不潸由來磊落羞窮跧下位亦足惠寡鰥乗田委吏不敢閒以日自愛維孔顔當今俊傑登朝班㧞擢杞梓披榛菅君能忼慨露豹斑豈比嘿嘿貪食孱果哉往矣歩勿䟂仕以行義賢可攀僕姑百中初滿彎書堂静坐尻狂癲過界山館界山館下平街路行客無窮朝接暮十年二十四迴過每覺人煙不如故初尋此地謁髙士㕓里讙愉忘迫遽固嫌餓子辱閭閻乃有善人尸管庫歌聲酒氣等閒滿魚尾彘肩容易具半無賔客味羣書盈耳只聞論富庶一來奔走繞淮汴髙士亦趨城市去南蹄北轍不可留雖有暫經難久住前冬適自故園出忽見瘡痍變其處豈能糠粃保黄台乃忍溝渠疊童孺官條既改驛亭破儒者不存書屋蠹蕭然巷陌但荒埃聽説流亡不知數昨朝又自劔池返遭值故人車馬駐相看問訊十年間涕淚沾襟如水注當時飽腹今半殍近歲朱顔多已腐一盃雖舉屢噫鳴永夜不眠猶恟懼哀哉天運不易識安得各齊金石固凌晨復過髙士門迴首荆榛帶霜露五言律詩信眼信眼成吟歩虛廊遶幾回見雲侵月去聞雨趁風來羣動悄已息煩襟相次開慇懃謝涼氣少為挫蚊雷急雨急雨抛砂響驚風伐鼓過漏從孤館永愁入病身多輾轉思鄉井依稀夢薜蘿得他莊叟罪憂熖日焚和平雲閣髙閣與雲平超如近玉京未須論峻絶聊用壓崢嶸看雨諸村白乗風百里清途人豈知此拍額望丹楹寄㣲之末俗矜鄉舉先生尚滯淹門人能頌述羣小或憎嫌舊學時方用新書日以添隂霾雖拍拍㑹解見圓蟾和酬道先雪中見寄空館雪霏霏孤懐不可為綈袍正藍縷布褐强參隨想望壚間酒支持席上詩念君將逺適宛轉萬重思歲宴嵗宴仍遷徙蕭然背客堂聽雞吹宿火騎馬踏晨霜世味寧皆惡吾生有底忙奴僮亦相笑歸計只他鄉嵗宴知何事低徊戀醉鄉衰殘三十老岑寂五更長識字初無益醫愁未有方一盃寅夘舉天下又兼忘小港書事三首破屋照山坰山民問筆耕日無賔接戯夜厭鼠横行被服煙埃色呻吟老病身不知齊魯士甘此欲何成溝澗横三面岡巒匝四隅滿門牛宿留刺耳鳥喧呼造請難通謁經過易失途鋤犂有餘暇歌鼓宴官奴夢想驚冠盖糟糠繼祖孫多財新得友善訟舊成㛰䇿士吞并說門風楚撻痕飲酣尤壯浪潛聽亦消魂向火八月淮南地輕寒已中人病夫嫌冷褐敲火乞烏薪體暢寧須酒神和不讓春養生聊自適何必問時辰送及之丞公先朝賢御史風彩九州欽嗣子傳家法孤芳映士林忠良常在我便佞不關心得慶宜䝉福時清豈陸沉金秀才歸書來動鄉思歸興偶幡然故國輕一别綵衣閒八年星霜親鬢上文字客燈前此意終難詰西風滿耳蟬日日日日聽鐃鼔坊衢送死頻豈能悲此事爭願作歸人邑屋兒孫衆山墳草樹新去來應迭代渠獨淚沾巾淵老淵老真髙簡能逃世外襌青山如故友白髪任流年卭竹五六節梵文三四編無人知此味冷坐小窻前鄰老鄰老今亡矣誰猶辨短長隙駒沈迅影石火掩孤光錯寞悲新事淒迷想舊狂朔風原上草歸夢見松霜氣槩平生事耝耰滯故林得無尊道性長有貴儒心躁暴村田酒粗疎欵乃吟暮年乖此約誰使永差參送人遊邊二首六月洮河上驚飈雹似拳遊人方仗䇿元帥已開邊京觀酋豪肉軍儲府藏錢參謀如有取常武在周篇我愛王忠嗣兵威萬里横只知精士馬不忍幸功名四印無矜色三邊有肅聲未知誰願此徒用送君行病起病起興蕭蕭餘魂次第招悽酸攻意氣衰朽入風標納帶驚腰緩移梳恨髮凋何心希此世只合順無聊病起南榮下初寒仰日温坐頑知力困視慢覺神昏避俗無長䇿沉思到故園人生乃如此㣲處共誰言衰病衰病相侵早勞生得意遲兩腓初瘦後左耳半聾時已取世上苦强將天下知只宜收散質偷惰學支離贈白成童即學佛五十始披緇去髪有先後悟空無速遲游雲經過雨淙瀑到清漪此意分明否人間不可思留題羅漢院愚軒紛紛偽飾日愚者乃賢歟好醜知誰論文章亦漫書蟻來方棄智匠去莫尋樗秪有閒風月經過未忍疎奉和内翰太中殘春口占二首久次蕭條郡髙情奈樂何鶯花三月促風雨一春多野寺攜笻到幽溪飲褉過四郊田水暖駐節問新禾緑隂槐栁院白日靜寥寥有句方髙詠無賔可屢邀獨眠聞漏轉縱歩看絲飄結束東州計詩編問酒瓢曉作雨惡天光淡風髙晚氣清四簷喧急溜一枕厭寒聲世慮漫沉想此心還不平搔撈下書榻坐對紙窻明同俊和賦禪悦長老此君軒祇園無俗物軒為此君開但未為龍去何妨引鳳來法中常住境天下後凋材豈復如遷客慇懃到處裁筍蕨筍蕨吾山味風埃旅館心盃盤感時節魂夢解㕘尋爛漫銷青紫横斜破玉金平生疎淡意飽足望家林贈亨父次温伯韻老未上青雲誰論徳行純有名傳郡國無食給冬春慣見官徴債多應鬼笑貧豈能逃俗口坐作解嘲人卧疾卧疾動淹旬搔爬滿爪塵已能忘飯食聊復畏冠巾風雨驚新嵗鶯花待早春便無游覽分樽酒幸相親足疾足疾在中年蕭衰只自憐徐行如敬長頑坐似逃禪欲適求新履相忘任故韉思山徒有興登頓豈能前亨父録示山齋即事五篇索和遂次其韻齋閣得山棲蕭然萬慮遺此心終異俗吾道更同誰好意慿琴寫衰顔取鏡窺窮通殊未定幽獨欲何之有紅盃面酒無白髩間毛合世心雖淡論文氣轉豪迂疎憐野叟蕭㪚敵兒曹免被南華笑憂時兩目蒿榮利機關拙雲泉興味多豈同愚士窘自合聖人和斂斂青氈舊酣酣白石歌故應消息有貧獨奈余何嘯傲村田景巾裾得所從壯圖因酒動睡思向書濃坐見雲歸岫吟聞雨濺篷但無詩凖備何以謝情悰榻為庸兒挂軒因好月開清風知曉暮徃事付塵埃喜燕長褰幕嫌蛙屢洒灰山中樂如此腸莫等閒迴
