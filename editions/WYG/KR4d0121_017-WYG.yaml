body:
  text: 灌園集巻十七宋吕南公撰雜著吕氏家系開寶八年王師加金陵兵官樊若水至城下晩請於帥以燔民廬而吾家毁焉曽祖王父君搶攘挾其二子輕齎南遁至江州遇其故人有禄者教以宜走南豐於是從之明年復遣次子返省金陵且謀復舊居而舍阯劵籍皆灰蕩不可理辯遂定計為南豐人有屋于縣郭之東逐土宜為生居二年曽祖王父君卒其長子是為大父大父君有二子其季先人也先人生於祥符戊申是歳大父君卒先人生纔十月家貧不能自存大母棲以襁褓挈而嫁南城人傅可忠故先人初養于傅氏長因家焉嘉祐九年正月丁巳先君卒有四子云系曰嘗語水乎水之行也作于天㑹于源溢而放蹙而悍淙而為瀑激而為瀬曲屈而為磵平漫而為川遭潴者池被灌者渠熬漱浸漉披枯突潤名勢錯綜已多故矣而不離乎水通于此意者其知姓氏之所繼乎不然牽榮而結顯務以自光亦何異坐江海之上而繁引絮辯語人以此涓甞瀨此涓甞川嘗潴嘗渠渠已嘗潄潄已嘗熬又浸又流流之在吴者為如許湍其在楚者又為如許湍乎引辯如此亦幾妄矣夫吕之為家吾知其得于佐禹治水而已彼周之侯漢之王吴之將唐之相者吾豈知其必祖必宗哉吾不敢好牽結而自誣也詳夫耳目所及事得以徵之者今有一人其嗣實三然一人安生一人夭化一人浪游則是此人嗣系唯安生者可以審定而其夭者則絶游者難考矣萬一著系而儻引夭游則其為謬奈何成敗存亡其迭如轂況迺假養易冒兵燔饑蕩雜發於其間誰者保其如綫而不有紊絶乎蓋帝公之胄参附史録君子猶有以窺秉筆人之荒况彼臣民之㣲著無常者哉嗚呼可悲也已先君之死諸孤露懵然迷所誌免䘮之五年始詰於南豐得其畧焉曽高之迹毋得而述矣茂惟先君其可言之先君少孤不及仕學為人端慤易直居游脆軟之俗克耿介無㸃染有屋西村不能足食然戞戞自守非其力不以塵芥望人接鄉鄰以忠正有㝷常誖戾得先君一言輒為之沮輟好讀農田書曰吾所宜也耕殖造葺必有法初教其第三子學懇刻督勵不容髪聞人有書必為求借從之屈請忘勌常召語之吾家父祖學儒汝能紹之勿墜吾望塞矣嗟乎孰使馘集而帥亡乎初曽祖王父君之次孫既来南豐忽被中旨趨京師到闕得官属三司院而其兄尚留白舍之河源月割俸以資之既又以書歸戒令盡室北来未及行而三司卒故其系不得詳河源有五子曰驤渭沔晏顔者是也西村四子伯歡仲旻季南公其叔留也曽祖王父君諱大亮大父君諱戬三司諱淵河源諱務本先君諱文寶其後系具别譜讀孟子疏學者之於孟子能言則以誦能問則以疑及其老也顧有所苦焉此世所以不能無也蓋先王之道德其至雖存乎吾心而其達必自乎吾求夫莫思則弗求莫求則弗知莫知則弗達莫達則弗盡學者之大戒常在乎此而此書語約而意深易見而難窮固夫未出于戒者于苦乎何逃昔者三代之英内無傳註之害而外不應科試然則講學不以一日置者夫豈惡佚而願勞凡欲以明吾心而致盡焉耳士而出于三代且不得志于講學而况出於秦漢以来哉解説之参差甲信而乙疑人莫必明焉我其能勿以定之則夫講學者果為今世之所賴自趙䑓卿作傳其後既専行然望其遂盡而無苦果然其未然也日者士大夫往往善得其所未至且糾其疎繆然而必以逐趙于學亦未之能完則為今之計寧可以俟彼之顯而緩吾之功問以辨焉所以達也閩先生徐某老于道徳之學于此書致功良深今其税駕在郛余偕諸君相與叩觀其説以庶幾亡深約之苦而心得以明何善如之故嘗為諸君道此諸君倘不以余言為否幸書之名以見復焉讀亢倉子治平四年余見此書於今集賢鄧校理家怪其詣致不倫不及文莊列老逺甚其辭又最鄙陋令人懶讀常疑有好事者詭冒為之然儒之長老不啟余疑毎用不懌後二年在淮南始見唐史新書乃知開元時王士源者造此又四年於汴京見李肇國史補其説與新書同蓋新書㨿肇所記而言之耳因自愜快以所疑之不妄故也益知心之可以師嗟夫在我者之有以照彼安在乎占文按迹然後進哉世固有喜以淺托高人其功用短長雖不能使智者兼惑亦其謬意期成慁於世耳聞羌兒與越人鬭者越人乘象羌兒患其難攀即刻木為狻猊首而繪之又傚其皮而䝉以前驅象猝遭而驚也為之奔敗蓋畏狻猊者象也非越人而象之所為奔敗者驚於偽而非驚於實者也彼羌兒何所能哉今夫以淺托高人何以異此往時王肅出孔子家語近世丘濬解論語而題以韓退之兩人之見皆濟繆以勞而通為羌兒之罪人嗚呼豈以為有益而為之歟凡士源肅濬異世而同揆者予又焉知學士之又無似此者歟栁先生甞論亢倉不宜傳解而不慮為唐人詐造其辯蓋猶未盡余方自憐不惑之早故為之志以佐栁於盡焉讀白虎通白虎通譁惑聾瞽書也非特作之者有是學其説者亦足以致之學者不可不思也聞楚之王有喜起怪以為竒而作異以為新者於是國中之人衣冠宫室君臣族親之數名制度皆羣然而更造之旁徵外引以快談喻他日王問焉曰孰致爾孰致爾於是俊舌者進而列焉曰是新某制是生某名是有某義云云王大悦連室而旌之魯之端士駭而往辯之曰古之制君臣主於定上下尊卑族親主於辨戚疎次序衣冠宫室主於便利乎起居服用昔言足矣今不宜復哄汝紛紛且非益也楚之君臣勃而否之曰非爾所知也不如是不足以矜識見而新談説也魯士不自得而去白虎之作其類是耶而未聞當時有魯士嗚呼吾不意夫譁惑聾瞽者日多多也自西漢時學者説經已積怪蠧至是而甚焉又總括之説儒之弊蓋至於此學者不可不思也讀字源小説余讀曲䑓經至學記篇曰發慮憲求善良足以諛聞未足以動衆於是廢書而歎曰嗟乎先王之深意秦漢學士亦有得之者乎古者以言明道而以文正言又以書致文也致因欲正正因欲明其事固如此然而意得道忘則未始閉滯于言彼字以致書何執之有趨于達事而已達則得得則忘字雖有體義不以害也六經之文備于晚周而孟子荀卿與夫百家諸子之辭相與援引而句字未甞同彼蓋知夫在理而不在字也自六書之名起論者槩之以為分張本末顧亦是矣而後儒之生患無以成問學更從而為之辭欲廢其五而歸其一牽合之風從是長矣蓋康成之學得於求善良者也而許慎之學得于發慮憲者也皆不知先王之所貴不在於此林罕區區出其後其亦勇於謏聞者乎嗚呼先王之深意亡矣於罕乎何誅讀李文饒集余與凌雲先生論立功立言先生稱有道者必能立功而立功者不必皆有道余獨論立言以為士必不得已於言則文不可以不工蓋意有餘而文不足則如吃人之辯訟心未始不虚理未始不直然而或屈者無助於辭而已矣噫古今之人茍有所見則必加思加思必有得有得矣而不欲著之言以示世殆非人情然而偉談劇論不聞人人各有者此非文不足故歟先生不以余説為非余讀李文饒所著書見其汲汲於論譔患無以傳諸世也而文乃淺近卑粗不能揮斥其意不知當時何以自謂為可其亦雖吃而不能無訟者歟可憐哉若人也文饒未在相府時事業已有可稱羈排蠻夷而捘遏僧巫皆已非常及其遭㑹昭肅奮然有刷滌寰瀛之志於是傾胸寫心以就經綸㑹昌之政危全於雅矣雖天不相其終然文饒之功既自不細而不能自免於朋黨之非及一不幸身被竄抑則焦焦無以自安窮愁著書至於非望誣僧孺焉甚矣文饒之不足於道也夫惟全才足德之士言而人不得加損動而世不知違從意文饒之所以為文饒者有未肩於此歟題爾雅後爾雅非三代之書也其作于秦漢之經家乎鄭康成以為出於孔子門人者妄也三代之英其學在于持氣正心充德性於神明以為行業彼尚不貴著書不尚傳經而曽形名訓詁之肯為哉世俗之儒善望影以象形見孔子云商可言詩遂以詩序為子夏所作且孔子亦言賜可與言詩矣今獨何愛而不言商賜共作詩序乎蓋孔子之教人學詩而以多識鳥獸草木之名為足以辨之要將由此以究觀性命之理焉耳今夫謂爾雅為出於孔門者非據此而言之歟嗟乎幸而論語所記此叚不明所告何人爾即令明之説者肯捨之耶甚矣説儒之喜妄也余考此書所陳訓例往往與他書不合唯對毛氏詩説則多同余故知其作于秦漢之間今世所傳五經正義者引用辨證毎取此書然反時時破毁焉原作爾雅人之意正欲以定形名道訓詁焉後世之宗例是故傳合經家而陳之乃合不果定又或不通則謂之何欲助説儒而儒隨復攻之借盜糧而資賊兵爾雅亦有是哉題論衡後傳言蔡伯喈初得此書常秘玩以助談或搜其帳中見之輒抱以去邕且丁寧戒以勿廣也嗟乎邕不得為賢儒豈不宜哉夫飾小辯以驚俗充之二十萬言既自不足多道邕則欲以獨傳為􅂈人之功何繆如之良金美玉天下之公寶為其貴於可用耳小夫下人偶獲寸片則卧握行懷如恐人之弗知又兢兢或吾冦也而金玉果非天下所無信以充書為果可用乎孰禦天下之同貴有如不然也邕之志慮曽小夫下人之及耶書盧仝集後世之論交以器能名位相若且合云者斯不然也周孔顔孟當世無二人則高身獨往没齒無與而已乎斯不然也明矣盖生同世術同學跡相於志相依焉斯交而已其才器之小大参差固不足間然非大賢莫能并容其間以取全也庸常之人不足以論此唐三百年文儒為盛然莫盛於元和以來韓退之其名教宗主歟而懇懇推道栁宗元皇甫湜李翺李觀張籍孟郊侯喜歐陽詹盧仝軰遜服卑卑如不足者退之豈真宜坐其下哉斯以見韓之大賢也數君皆能自致於有聞然各有終身之蔽又當時於韓各有輕侻處不聞韓以為間益見韓之賢也已數人中盧仝跡獨不著然考之仝於交中為劣者盖仝荒縱怪慠人也仝之文章今猶有在者四十餘篇歌詩銘序雜焉自其文章以觀其所存有所照已其無足可道也顧無退之則仝亦何有嗚呼交友之難時㑹之難道學又難徒使吾重歎於今日也古人吾不得與矣安得全交者而見之哉書長江集後島之詩約而覃明而深傑健而閒易故為不可多得韓退之稱島為文身大不及膽又云姦窮怪變得往往造平澹者予考於集信然今世之人皆知賞識島詩至論其所以為島則未必知也彼徒吟之曰西風吹渭水落葉滿長安又曰鳥宿池邊樹僧敲月下門云云以島之高妙在此嗟乎是不害為不知島者也安得真知島者而與之論哉此詩有許栁為序者其篇第與今衆本不同又特不多蓋余所收集本已三百八十篇云書賦編後十四五時隨羣兒誦今體賦日欣欣焉比十七八遂工倣之亦不多厭二十以後稍不喜尚然益知賦之態狀革萌自吾出江淮行橐齎書絶無賦集或時同輩談及往往收睫閉聴等之惡畏今年旅窮加憂同居輒讓以理舊習謂可由以求祿仕吾貧窮甚果不免此因復借其文以讀讀之乆擷其善者得四十餘題手録聚之資技癢云噫亦足以自笑矣北人與南人㑹京師相與置酒獨設橄㰖為盤具南人縱啖之甚美核幾不免而北人初咂齒未加深顰蹙而投諸地南人黙笑焉已而酒數行他無以食者北人􅀈懆起從地而復引嚙之顧謂南賔天下味良于養人者宜不止此當今之時我急無以慰喉牙爾借吾有八珍五鼎之享則今日之舉未為不知味也嗚呼吾真類若人矣古人有言不遭者可無不為若我者非不遭者之為耶熈寧巳酉上元日桐城南牕題王祥對或問王祥其有道之士歟用孝悌為聞人出處視時治亂尊榮克終為晉臣冠非有道其何能此對曰祥而有道孰而無道者當東漢之㣲曹氏窺覦不得天位不饜此匹妻孺子所共知祥於此時避地隠居似有志義者一日幡然起就臣位豈以為身能軒輊於時乎吾固疑祥以孝友為尊榮資其後高貴鄉公立祥以定䇿封侯司馬氏賊而殺之而祥熟視未有以如何也方枕股而哭以為忠矣司馬氏之逆其根株與曹氏並起迹其强悍盖非祥所能遏顧為祥計則義不仕焉可也而祥不去異時晉王受册祥方與鄭冲争一屈膝此所謂與人巨舟而靳澆斛者也夫魏晉之事祥不得為不占始末者茍以為義則不當哭且受拜矣茍以為不義則白首公卿之位無救其亡區區哭拜為不為何益或言祥非不知宜去以為亟去則掇禍於姦雄之手是以全身隠忍此亦非是蓋姦雄之所禍者禍其可忌之人而已若夫材謀氣略非巳之敵且不與之較則無事忌之故王莽不誅揚雄宋武不逼陶潛而近代朱全忠亦不殺司空圖也以祥之恂恂在野與在朝毎無心於忼慨彼固揣摩其無能厲已矣雖去之保無禍然則祥雖以孝友取尊榮終之一無益治亂之人而已祥之哭高貴鄉公也曰老臣無狀嗟乎祥亦自知歟是真無狀者也安得謂有道
