body:
  text: 提要灌園集二十巻别集類二宋臣等謹案灌園集二十巻宋吕南公撰南公字次儒南城人宋史文苑傳稱其於書無所不讀於文不肯綴緝陳言熈寧中士方推崇馬融王肅許慎之業案熈寧中科舉所用乃王安石三經新義及字説非馬融王肅許慎之學此語殊為乖妄宋史荒陋此亦一端謹附糾其謬剽掠臨摹南公度不能逐時好一試禮闈不偶退築室灌園不復以進取為意元祐初立十科薦士中書舍人曽肇上疏薦其不事俗學安貧守道堪充師表廷議欲授以官未及而卒陳振孫書録觧題稱南公欲修三國志名其齋曰衮斧將成而南公卒書亦不傳惟其子郁編次遺文為三十巻然刋板久佚流傳遂絶僅存抄本吕次儒集一巻惟録麻姑山詩二十四首福山詩一首及錢鄧州不燒紙鏹頌義鷹志龍母墓三篇盖後人從宋文鑑及麻姑山志抄撮而成十不存一今據永樂大典所載裒輯薈萃篇帙尚夥謹依類排次釐為二十巻雖不必盡符原數視世所傳本則賅備多矣南公與汪秘校論文書自言於列莊六經百家十八代史因文見道沈酣而演繹之私心自許謂文學之事雖使聖人復生不得廢吾所是惟當勒成一家俟之百世又曰堯舜以來楊馬以前與夫韓栁之作此某所謂文者若乃塲屋詭偽刼剽穿鑿猥冗之文則某之所耻者必若黄河泰山峻厚髙簡渾灝奔注與天地齊同而日月不能老之者此某之所以究心今讀其集雖所言不無過夸然其覃精殫思以力追秦漢要亦毅然不惑於俗學者也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀灌園集原序劉夢得嘗稱瀟湘間無土山無濁水民乘是氣往往清慧而文吾鄕麻源地氣殊異江山炳靈視瀟湘間為不足道近時人物磊落相望其位于朝光顯者固多而隱於韋布卓立傑出如灌園先生者世未必知之曾子固獨愛重其文謂麻姑秀氣世不乏人豈虛言哉先生㓜而警敏力學不倦於書無所不讀發為文章雄深浩渺自成一家羞同舉子軰綴緝陳言氣象萎苶迎合有司之好熙寧初嘗預薦試春闈不利退而築室灌園不復以進取為意益務著書講道發揮聖賢妙旨且借史筆褒善貶惡垂世立訓遂以衮斧名所居齋先生所養如此視一第得失奚足為輕重耶元祐中在朝諸公交口稱薦欲命以官而先生不幸蚤世咸用䀌傷余先君昔與之遊備知其賢每嘆南城豪傑之士如李㤗伯王補之及先生其才皆有大過人者而所享皆不永泰伯補之雖得卑位則旋而死先生且未及仕造物者何奪之速殆難以理推蓋命也夫先生姓吕氏諱南公字次儒其子郁亦有學問能世其家收拾先生遺稿編成三十巻紹興壬戌余領漕江右廵行到鄉郁携以見訪且屬為序欲傳不朽因循乆未暇作後二年移憲浙部不逺千里以書來請益堅義不得辭於是乎書南豐符行中序欽定四庫全書灌園集目錄巻一五言古詩巻二五言古詩巻三五言古詩巻四七言古詩五言律詩巻五七言律詩巻六七言律詩五言絶句七言絶句詩餘巻七議論序巻八序巻九記巻十書巻十一書巻十二書巻十三書巻十四書巻十五書啟巻十六傳頌贊銘巻十七雜著巻十八雜著巻十九墓表墓誌墓誌銘巻二十墓誌銘祭文
