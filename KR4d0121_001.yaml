body:
  text: 灌園集卷一宋吕南公撰五言古詩題仁樂亭真山蓄幽奇偽山逞瑰怪峰巒紛變現座席疑廣大未穿披雲屐對此亦清快虎泉昔聞孤女子遇虎斯泉側高僧為追訶弭耳不敢食歲月幾何時稱談如宿夕故知事可傳豈限涔泓窄虛假行虛假復虛假名陶不知瓦養子役于人不如生犬馬公私嚴忌諱勢利關取捨奉生既疏違喪死更茍且苴麻不敢服桐竹何由把未得久哀呼方當勤唯喏百年聞罔極一瞬經廬下豈不近冠裳驅牽到乖寡沾沾荷鋤子言動只山野終制負凶縗興辭淚如瀉諸儒論鄙俗不若都人雅請問兩間民誰為稱情者遊子篇遊子朱門兒行樂畏不足遐方寒苦士自贊乞隨逐朝馳錦韉末夕宴鳳屏曲雄豪棄殘賸聲色化耳目來時布素衣羞耻見羅縠幾許膏粱味嗜好諱水菽勞勞車馬塵苒苒歲月速家書懶拆封舊業廢編牘間嘗夢故國驚覺如被辱安知愜快餘窮愁入皮肉趨承偶踰節况味稍踡局長年倚恩輝積漸致輕瀆因逢故人語始歎誤程躅都城名利場豈不多所欲從前入關客無慮共貧毒商鄽聚珍資科舉仰廪祿神乎奪我魄而獨迷所屬何人不謀身計慮自不淑寄聲風塵子哀恨吾已酷當知帝里遊有禍亦有福莓莓原上田莓莓原上田春至早已種墢墢樊間圃蔬好亦培壅農家樂地利倚此擬微俸依隨節序停領略兒孫衆徒耕有歡語各息無愁夢冷看里諸生焦心望鄉貢和道先從義同過張掾梅花下飲二首山人如寒松無可媚鶯蝶諒非清峻契誰肯略顧接春城偶來至豪士懶舉睫幽幽法曹廳一往乃敢輒主人雖壯齒酷愛文字業相看論古書術不計勇怯陳家俊公子德義敦慶葉聞我適過從逢衣遽披攝老成北扉掾喜客若漁獵招呼倒清樽促迫信重疊梅花香樹下共醉死牛脅勿憂侵暮冷坐我有氈㲲飛飛落梅英繞座不待折煌煌畫蠟燭未夜已戒設徵詩為罰令獻白作飲節談高衡或爭笑猛倒還絶李侯解縣印心注象魏闕座中惜分𬒮勸酒更酷烈春先顯父筍冬外尹吉鱉肴佳爼未竟酒美壺頻竭更籌屢聞轉歸乘不許謁誰能避酩酊但恨落角月渠中水咨爾渠中水源流本何許特無停滀分得此奔逝苦過村穢濯溉合澗渾沙土還當歸海日亦助雲濤巨野翠堂重城似郊坰接眼盡蒼翠無復見枯疏共疑春每至丘樊豈少此野叟不自貴鴉聲鴉聲譟人凶聽者知慘然忠言論禍福受之如不聞禽口不可緘人言因義發畏禽而忽人使我心如割小蟲大蚓身尺餘輝彩盈首尾小蟲未知名長不過半指相遭籬畔草錯愕雜憂喜孤征有令凶忿鬭莫我止交攻久騰突反覆召傾毁蚓跳欲忘生蟲怒乃抵死奔衝徹心腹劫捷沸唇觜方磨雨䀶沙又墮足迹水肥無敏才智短有毒牙齒吾豪且深侵彼困漫決起壯軀俄奄奄恨血稍泚泚蟲休遂馳歸少頃復臨􅜻安詳銜蚓鼻拖攃繞籬址却納幽穴中其將食之矣人間有勝負不在校形體樓蘭雖雄王命盡傅介子新家巨無霸一戰亦為鬼茍惟性資悍端可制魁偉君看小蟲威何獨畏封豕有蟲堂陰闕曲沼其浸可濫觴有蟲宅其間遊息能自將名號亂龜鱉形軀亞蜣蜋何知一生微頗以氣調張秋風七八月泓浸稍減常低回尚飄然未若謀穴藏十月水泉竭泥沙暴枯霜迷迷舊坻堮影迹類已藏延綿盈昃多天雨斷霈雱皆言此蟲絶軀殼應碎殭咨嗟亦含氣所託異慨慷邇來節令改泰卦直春陽甘霖一夕飛灌注成濊汪凌晨沼面漲蟲輩早奮揚上下逞風操同形喜相望如知出處時故以逼仄忘余嘗舍其側終始得瞻相因思物理深未易草草量江海非不大其魚每屠傷此沼固𥚹淺其蟲乃靈長浮生短與修有命不可襄運數茍未盡憂悲豈其戕安危與時俱窮達須預防所以真至人如往皆暇遑勝因院莊嚴起何代幽佚惟天與有衆倚耕桑無人歎寒暑嵐氛蠹金碧谷響酬鐘鼓白晝方丈西猶眠聽經虎招豫亭飲愛酒不日醉多為病相妨飢虛或傷脾飲過亦腐腸略困尚舉白既頽方卧牀沈迷劇淹旬得疾豈可禳嘔泄憎膳食乖慵豈冠裳愁醒甫旦朝衰苶還慨慷已復念傾倒咨呼問瓶􅣙妻兒惡吾貧誡我以死亡載讀伯倫傳懦𠂻更強梁與其憂百年孰若夭醉鄉家釀苦屢竭市沽乏錢囊進歌五柳陶聊美天祿揚幸近豫亭叟其人固同方有田百頃肥秫稌歲益倉憐我數寂寞招邀共深觴醒往酩酊歸不悟日月長有或致酬酢肴蔬雜矜張叟來坐酣酣肯問味惡良我蹇嗜墳史叟豪樂笙簧相殊不相關對酌即兩忘如此粗適矣誰猶辨低昻寧須賣菜傭豈俟白面郎今日又得酒忍為獨沽嘗泔魚取芳鮮煮狗到爛香及我未病困㪺斟足相當亟來勿蜘蹰午影上北廊濟道過飲偶成長句酤酒𣙜吏杓買魚市兒籃雖非爛腸宴亦知足一酣冬景忽卓午晴雲喪曇曇室廬絶絲竹文字入笑談以此稱出俗相看庶無慙解衫挂前楹豈問布與藍追講石陂會秋霜正黃柑傅翁最後至嘯詠能交參題詩廡東閣醉卧堂西庵論子赴官職可余老耕蠶俱為樂榆枋非效溪壑貪摻袂歌慷慨暌離各情含寄書建水涯年厯滿四三不慮復見日乃于郡樓南子為赤髯叟我有學語男問訊養生具僅能無一簪固知寒儒分未易過石甔棄置且勿道行觴趣空壜將來難預期既往已備諳聊盡酩酊興安能每憂惔疇昔疇昔林野居布絮不粗完及為羇旅人被服乃綺紈何以出勝處為君究其端籬蘇不馥郁傳自故老言魯邦無君子子賤豈所倫東方足文史得飽在長安蘇秦主父偃亦各有後歎况乎今異古而本無一㕓自非稍激昻何以脫飢寒辭鄉挈囊書豈敢言王官茍免溝壑禍微生已成全文章蓋有力溫燠此其源遂離厮養科首尾只十年篋衣亦何者聊足覆衰殘有破得紉補有新得縫刓因嗟為短詩所以記初難粟熟二首昨者小麥熟野人稍相寬新粟今又黃喜聞不青乾補助復幾許久飢情所難譬如轍間魚勺水亦暫安澤國農事苦無功及丘樊方與三日晴湖岸車已喧所以終歲勤不能離薄田里豪多曠土徒用養茅菅雖有願耕手賦收重夷蠻秪今二種利稀若管中斑偶穢可勸後必荒誰繼前幸哉雨露仁副此倚望歡種田亦耕山投隙若避毆辛勤望成熟得慰飢歉口彼豪豈知苦踞坐科秉籔􅉃刻以誅收奇贏復何有尚喜不荒空呼鄰買杯酒宿凌雲山中留寄元禮凌雲山下村逆旅路旁宅南征為吾歸寄卧偶一夕無人伴幽語孤詠到平昔瞻懷此山人曾是同硯席蕭蕭古破屋文字堆四壁青燈照題評皎月論肝膈為詩有盈卷飲酒無賸滴携笻繞平坡班草尚遙碧栽松此山上共看遍岡脊要約過人長俱來蔭芳色羈蹤忽分袂不啻十載隔世故日紛紜舊遊空想憶今來此山下松老似百尺欲訪松主人其車已他適徘徊重咨歎輾轉對窗隙晨雞一何慵傾聽久不得春風吹殘月半夜屋角白難眠却求衣起望河漢仄寄聲巖扄去華髮勿強摘善醉真良圖高談盡癡策雲泉與朝市處處堪偃息桑榆景可量名利不足識無因接清話趁曉拊征軛已度滕家橋回頭更悽惻哭劉郎中谷風拂層氷萬凍倐忽流陽暉照積雪寸片不得留郎中氷雪人清潔映此州誰令司命家速以風日收得非峻節士地下亦急求哀哉吳隱之已矣公儀休衆皆殖貨利我獨嫉貪牟衆皆似芳春我獨如霜秋多藏豈不裕害義固所羞謀身豈不急有命其何憂辛勤洛宋倅明白旴郡侯未知居此官數有斯人不孤耿一德性紛綸萬揶揄嗚呼五十年平步落九幽象闕方肅肅銘旌遽悠悠吁嗟高論儒何以示素修仕則慕貴顯貧仍憂子孫陽窮詐恬淡此道久滿門嗟乎郎中心違衆輒十分登科未弱冠白首兩朱轓笑談傾一坐絶口勢利言遙聞朱頓流索水洗耳根服不至布絮食不辭羔豚自然清白行皎皎不可昏杳杳浚郊縣蕭蕭柏林原節士今已矣誰表三尺墳初釀歲稔穀價卑家家有新釀諸鄰皆屢醉吾舍只空盎封書乞餘米故舊不我相淹旬乃分酬如憊始賜杖搔然且湛熾督迫薪火旺衰遲念杯觴伺立久骯髒夜聞觱沸韻側枕屢欣暢朝來見浮蛆喜氣愈豪壯槽端乍流瀝指面已淫漾肴蔬故稀荒被服稍質當無賓與酬酢引滿自東向須臾就醺酣豈藉紅粉唱人生但能醉此外何足望憂勤欲奚為一譽抵千謗瓶罌幸未竭吾盞且頻康回思冷醒時愁寂可懲創隔墻聞酨氣涎活復嗟悵非無畢公心堅壁詎窺傍如今粗沾給後得戒初喪太息富貴間平生易遺忘雜興時情豈不脆轉若輪行車昨日僕役兒今朝賓友徒問之何因爾勢利已相如福祿固足駭流品胡能拘淺草有孱兔汙淵無瘦魚宜矣潔介士望望成逺疏題迎賓亭僧間有餘日憐客尋幽隈開亭翠岡腹延佇心徘徊年年車馬多誰是思山來緑淨橋涵虛正深明扶檻跨空闊共喜雲退避更憎魚撥刺相從有文酒歡快到夜月為子舉杯酒為子舉杯酒軒然放吟聲豈無哀噫調不盡幽鬱情念此高簡器早為貧緒縈迷陽乞衣食拍拍歲月更人生負意氣曷不懷光晶譬如堅貞松豈為霜霰生永慚茍活迹胸府針芒并獨夜悠悠此世路窘窘諸生業究竟非所宜俱為謬參涉三年就羈旅萬事轉拘劫故山歸無月獨夜夢黃葉塵埃塵埃倚風日放蕩乘空飛既眯馳者目亦緇遊子衣雨汁忽散漫低徊化汙泥憧憧要歧路致困在輪蹄六合局萬有成存各從宜升沉俱害物咄此其天姿鄧夫子吾交鄧夫子富有免俗氣包含吉人道混協時輩事讀書三十年恬寞無所嗜物古少明眼聲希難側耳自同崑岡石堅厚保英粹不畏埃壒染非求霖露漬幽姿審如此鐫錯安得致余生鮮諧合幸此蒙羼厠上嶽眺高逺趨濤玩滂濞由來魏王瓠不在惠施棄戲作數目詩一㕓徒自受想象聖人氓二耜慚沮溺疲羸不善耕三時徒飽食何力助戎兵四部雖該涉心非太學生五噫聊慷慨那復慕光榮六逸如堪繼相邀且倒傾七弦休撫弄里耳恱鏗轟八殺賓宜懼過門豈敢迎九年儲莫望吟醉但忘情十室論忠信吾窮或有名南干水清泚南干水北至白石角中間所經過左右恣衝搏來當高岸破去復新田作洲磧幾淵潭灣渦或垠堮余思二十載更易見已數唯此磐陀磯愈潄愈堅確不然磯陰地何足化溪壑固知制變材可健不可弱上山行臨鳥徑前下馬理屐齒林風清不徹石路晴如洗何處是招提東峯薄雲起夜聽車舍哀歌有感而作晝歌蟬焦焦夜歌蚊灑灑隨牛繞輪轉濁汙常滿把雖歌未嘗樂至苦不敢捨豈知清涼屋中有悲酸者甘雨不肯降吾車幾時休溫風忽噴然調苦聲更愁仰視河漢轉天星愈繁稠寄言擊壤人與爾非同流蠅驥超超飛驥尾獵獵蒼蠅翼託止如雅素主之無避色相從輒騰踏穩望千里益朝芻鴈田粟夕飲龍淵液天山峻杳繚過若影撩隙神官下旁闖展折形歎惜為言螴蜳類命自臭穢得胡然謬携載凂爾雲天骼是時決驟次何莫懷辟易駸駸驊騮前擬越窮髮北仙風響琳琅忽遇九方伯殷勤致羈絆審按題肉力咨嗟絶塵足恨乏軼羣德悲此中道驥憤死秀岡側蒼蠅試回首海霧光圛圛進途當此窮退路安可識寄聲人間世逺致毋近測棲翔度材分勿妄希彩色永鑒蠅驥窮無妨每相擇魚蝦神龍在重淵羣魚喜回環自矜龍族類安佚無後艱曉戲腥浪餘暮遊浮沫間輕則逺拂渚深之下窮灣或掉其尾萃或昻其首頒或揚鬛鋒鋭或耀鱗文斑衆蝦亦恣睢不慮器質孱跳骹弄牙鬚翕習事狠頑漁師畏龍威不敢數往還操舟變色過戰汗常盈顔雖有網與矢豈容垂且彎魚蝦尚忿慍出沒如嫉姦一朝風雷動波蕩若銀山神龍捨淵去恍惚達九關魚蝦不自喻固欲嚴追攀奔衝競上擊細大不肯間須臾雲霧息墮落如見刪或委頓砂礫或摧傷草菅里兒爭擇拾窮血彌望殷漁師嘯其徒氣貌特愈􅍀漉淵盡取之不復計鋝鍰魚蝦雖有悔已死誰悲澘憶亨甫詩老海上去三年斷音塵初非乘桴行正以廪食勤夢想不悟逺聲容藐難親忍無一紙書不寄故國人昨日見其子來歸自東濱能言别後意憔悴不可聞一被吏責繞心腸載愁輪忘飱躡偷黨閲月馳空村勞事欲歌詠匆匆未成文遂於筆硯間章句絶所陳亦復病肺渴尋常廢清樽唯餘滿頷鬚增進玉雪痕伊昔坐學舍蕭條恨長貧題詩日數首大醉必繼旬仰望官祿戶謂如隔天雲豈思曵尾龜勝却居檻猿不肯空谷卧願為監綬奔毫釐一失差千里豈得論嗟我實蹇拙平生畏侯門乃無詩老愁何耻鳥獸羣寄朱九北風吹寒聲切烈催歲暮中歲楚人怨愁絶不忍賦念子太學居辛勤即誰訴陰爐擁文火敗襖感陳絮無錢買酒醪醒坐若酣酗三年詁訓藝一月江淮路歸夢識親庭都城非屺岵干時無好命費力效章句堆箱纂織辭何以貿泉布男兒營養意汲汲水東注三釜若後時萬鍾猶不顧勉思豹變義勿守株下兔道傍見乞士捕蝨夕陽拂西岡黃淡映古道晚風吹高林病葉落如掃飢人瘦於繖俯默坐沙草扶危猶強興力憊輒反倒還持藍縷縫委曲捕蝨蚤視荒數拈空殺緩或失腦悠然不能罷似欲鋭鈎考寧思百骸間羣蟻即入保傍行笑相顧慧悟信難早噆傷乃知嫌餒死豈謂好方為大銷滅而畏小苦惱何有就薪蒸先愁稍枯稿衣青嗔罵賤髮白諱呼老與爾不同年誰能共懷抱
