body:
  text: 灌園集卷十五宋吕南公撰書上曽龍圖書知府學士閣下某南城之東野寒人少時自慮其智力蹇薄不足以參農商工技下風故妄意於文學蓋十五而讀書二十而思義以為文者言詞之大美以天地之化四時之運人物之成世古今之無窮其間變故顯幽治亂盛衰賢愚勸戒一切藉文而後經逺其所關繫如此雖古之人處之以力行之餘事然觀書契以來特立之士未有不善於文者也士無志於立則已必有志焉則文何可以卑淺所見既爾故自唐虞至於近代經子史集説解志載聞無不求得無不讀若是者數年於是探索短長補綴同異隱以心靈之所明嘗奮筆而書之所獲多矣猶未敢遽以為至也益取古之作者所成反復熟爛之期於合似而止蓋年三十餘矣其所造詣粗若有就而遭值時變當路者以能文為賤工方且推崇馬融王肅許慎之事業以風場屋而剽章掠句補拆臨摹之藝藹然大行以韓栁之顯傳宜已不可掩然而後生脫略往往輕之况於未顯傳者其何以露鋒而出彩君子之道有得於中則外之貴賤無以損益於我也則某於今豈有所歉而若有焉何也竊以自古文學之興其人之所出隆汚不一然其必有合比也有大過人者立乎世則相望而宗師之孔孟之門是已世無大過人者猶有以致交逰之樂建安七子梁府十友與夫蘭臺之聚烏衣之遊是已近觀李唐文最盛於元和而退之所與一時文士畢在相歡之地若張籍歐陽行周東南之羈人賈島劉義朔北之異類而皆收拾引掖使至有聞而况勢迹之親者士患無所有而已不患無所依歸惟此時為然國朝文先有栁仲塗倡率吹噓預其曹者各有聲實慶厯以後有歐陽永叔而閣下為之流亞海內諸生出入門墻倚賴輝澤者凡不知其幾人矣夫生而知學與學而有文皆離倫之效以某之不敏亦何敢以此自張然方之今昔得所合比之徒以不辱其後塵今乃孤行獨息若無所容則其所以有歉歟仲塗歐陽聞而知之者也惟閣下之命世可以見而知之而攀援仰望又幸有今日之密邇此其所以願於納謁也夫中國之有江西而江西之有洪府其位任亦重矣人莫不知趨重位希貴勢而某十年之間七八過洪未嘗納謁於府門非不能也則今日之願拜光儀不為省閣之官牧伯之權而來也伏惟賜亮謹獻雜文一卷幸垂覽焉答李講師書前辱見過又示以周易餘義五十篇翻讀竟帙欣喜不能自停老丈之得志於經功效固自不淺以某之不肖智識謬陋何足以快睛睫於此耶多幸多幸某於易嘗學之矣而未始先於求言言之不敢先求則所以學者特岌岌乎師心而已矣蓋嘗以為使天下而世有聖人則易雖不作乃無不可使天下而世多賢人則易之傳解復誰倚賴何者道可以心行故也今惟世數不幸每希乏於聖賢而學諸生又動拘率而按道於文字之間宜其易惑而難通也奈何世而無經學而無傳斯不可已且夫道非出於聖人也蓋其用亦明於聖人耳是故資道以作經資道以作經於聖人乎何有而紛紛之徒乃欲拜經以為道母此其所以駴眙於經之所言歟孔孟以前學者不務傳經以見道鮮至於疑惑由漢以後傳經之士相望而道益不明豈其經不可以傳耶有心不師而無言不疑故亦自困于狂而已矣何由見道夫道之所以為易也以無為本而經之所以為易則文有以助於無道一而言之二焉豈得已哉修乎教而已矣然而未始不一也起意於先而立言於有是非一耶得意於言而忘意於道是非一耶人能知夫一之二而二之一則是不足以明之又况於駴眙乎其言哉唯夫知此者寡是故茍有以知之則宜蒙敬慕昔者某嘗讀漢以來衆家傳易之書矣方讀之時或笑其狂或怒其恣或悲其暗及其久矣則遂以為不足煩吾笑怒與悲焉因輒忘之乃中心所以敬慕而有加無損者王韓氏而止耳為其能知一之二而二之一故也他人未及知此則雖千百其徒何能為易之軒輊乎聽其自暗自狂自恣可也故天下業不可以無經則衆家之書作與不作存與不存皆不足論若王韓氏則不可容易視之讀王韓氏書而尚不悟易則終不足以學易矣易且不足與學其又可與行道歟觀餘義之所申知老丈之所以設心展才當亦為此方之衆家有不愧處至於未免排斥王韓則為難允老丈豈欲求異於經家耶將以行道而廢經則異不必求也又世所傳子夏學者亦嘗讀之蓋借名甚髙而持論特卑者疑其漢儒詐託果誠出於卜氏則不已辱孔門哉彼頴達則唇舌家之役徒耳何足恭涉然餘義所非往往并及若輩如令譬擬於王韓似亦不倫也成人與成人談於堂上而先生或未是之即騃孺子戲於堂下而謬言焉又何足怪願老丈嘗試察之與饒元禮論史書借示十國志已略讀終篇此茍作之書也得在元禮藏中何其優幸試為左右説其不足收之略蓋史之作以才過人為主其法必合於春秋然後當司馬遷為史不甚合春秋然而號稱最良者其才髙也班固之才不及遷而措置謹密則過之故亦配遷流傳范曄以下卑乎陋矣陳夀以史為志論者或謂之善以余觀之猶為未盡何者三國皆漢盜而曹操先篡無以服人心是以袁劉諸人睢盱競起其事與戰國無異不當以秦為宜傳周也况曹氏威強比秦不侔逺甚然則夀以史為志者猶言三國不足以優劣姑並記其事云爾雖然夀何知春秋之法哉春秋雖據魯為內而尊王之外未嘗謂諸國為盜賊亦書某師某人而已夀以魏為紀吳蜀則不為紀而其次第則以建號之先後列之雖不類據魯為內之體然猶無害至敘魏事則往往名權備又書吳賊蜀冦此無謂也若以曹氏為宜傳漢則是王莽亦無罪乎春秋之意夀固不足以知之且其才又弱則其為書不盡善也固宜李延夀為北史各自標建無姓名賊冦之誤其敘事才致亦優於夀此粗可也魏徵劉昫之徒皆夀之罪人日者唐書遭會歐陽諸公商略法度其措置文采遂與班馬爭路可見吾宋文學之盛高映纍古矣前年初讀薛居正五代史病其有劉昫之謬思見歐陽公所修書而無由得不知永叔如何處五代之亂也大概十國之事皆如孫權劉備而五代則曹操司馬懿耳但漢末天下為三故吳蜀之勢視魏為弱魏力固勝吳蜀也唐末以天下為十則五代之力弱於魏而十國之弱又可知故力足則與汴洛相持淮南兩川是也力不足則偽辭聘貢廣南閩越是也力最不足則茍占地利借臣幸活荆潭是也吾以為使孔子記此書不過以五代為魯耳必不謂十國為盜也蓋曹操之謀篡也非不欲速也以其天下未易服故隱忍而俟之若當時無吳蜀袁劉則建安以後無漢厯矣然則吳蜀非願盜漢因魏之篡而自度不能臣事之故不獲已而成國也十國之亂何以異之黃巢之後唐力不振而朱溫首懷曹魏之心何嫌英雄不服乎蓋如桓玄侯景安史勛巢然後謂之盜十國豈類此乎永叔書未可見然使不能辨此則未免不合於春秋鄙哉十國之茍作也其文不及居正其標建不及陳夀扶憊強行而已矣書此國之事則皆知稱我而其君則姓名之又以盜賊名彼國至於書彼國則又以盜賊名此國此噂沓背憎之人耳司馬遷所謂世家者謂其諸傳世有家也其體與近世實録同今為十國世家又為列傳此何等法蓋十二諸侯有因上世得封者有因中世亂而盜國者方其稱公亦書公稱王亦書王稱帝亦書帝所以不沒其實與春秋所書諸侯皆稱公同意然春秋生不名唯死一名之葬復稱公此孔子之深旨司馬遷於世家名次其爵蓋春秋有傳世家無外傳不得不然今乃題某地某人世家而首尾則又姓名其人甚矣其無識也彼既建號改年廟祖宗陵墳墓矣而猶謂之衆民乎若以其亂可貶則春秋戰國非不亂孔子司馬遷非不知貶也其餘措置文采一無所取而世或傳之疑好事者欲見事迹故爾雖然此書事迹蓋略矣嘗以吳録江南録江南别録江南野録等書校此吳蜀二志可見其略天下大定録固略然此書往往遺其所載今新唐書楊行密傳最有功凡行密之善可道者畢載於篇中又於京師見永叔所作錢鏐傳亦甚核詳蓋永叔多收野史記傳而去取從容也但不知永叔書盡載十國君臣事迹果否不盡載則又未免闕遺矣春秋之法要當一肆吾力但猶俟盡見永叔書乃為之吾能論其措置不疑其文采也元禮慱學好書且廣收藏異日不怠則修選之功當靖共之自今可訪索十國野史記傳庶幾獲廣記備言之益此外未須議某不日南行矣經過當面見馳此故不宣悉幸察幸察啓上知縣啓伏以執事才刃優長而屈於一邑一邑之人情物宜固已無所不照若乃原田之沃瘠閭比之蕃耗陂澤之涸盈山林之童茂工之良窳商之通滯農之勤惰士之賢不肖皆莫逃於政術之中而某之事業實在辭學下風謂之賢則或不足謂之不肖則太妄蓋亦執事之所有以處之矣夫未仕而交際於諸侯非盛古之禮意然而世變已久則違衆不足以為高也視今無事於造請之人唯不能學與未嘗學而杜門者或願之耳而某區區之姓名猶未免於舉子科防則非杜門之時也非其時而不見其所可見則旁口將傲慢之相傷是故不得不畏雖然使某必進執事之門乎徒上謁則庸衆常為之徒贄書則懷假倩之疑畏傲慢之謗而得紛紛之疑益非善計故當少露文業以致夫賢不肖之情狀謹獻雜體詩文一編雖未足以究平生之所長然而細流土壤可占其高深之萬一伏惟探缿餘間嘗賜披覽亦以驗其非偶然而前者也代人上知府待制啓伏審知府待制抗章天陛得郡海濵辭南昌之要藩就東牟之外地有將相之業而不謀事任當風雲之會而樂處寬間此盛德之難攀維羣心之所服恭以知府待制懿文經國鴻藻掞天溫溫大德之基慥慥中庸之器早軒翔於册府實表映於書林獻可納言簡在之心屢沃出藩入侍具瞻之望良高仁宗以奬拔未終今聖以知聞亟委魏舒領袖上目送以為榮和嶠棟梁衆神伏而咸待一昨鎮臨遐徼安集殊氓垂全文武之勳俄被均勞之命蓋許國雖堅於志而成功亦在於天矧眷注之方隆佇登延之非晚豈繄千里能滯真賢仰祈撫字之餘茂養保調之福某欽風有日拜德無階側聆旌戟之臨遙深桑梓之慶限紆銅墨阻侍堂皇卑情無任悚息依歸之至為人謝舉知啓學者入官所以行道於世君子薦士所以報上之恩蓋將成天下之公非止遂匹夫之獲惟其事出而弊見故有名豐而實凶求之者無慎終如始之思引之者有深情厚貌之患賢若葛亮而虧明於馬謖勇若魏勃而取誚於灌嬰豈徒乖立事之奉期又以起稱人之深戒大者有是下焉可知嘗觀艱棘於來今固已倍蓰於治古夫合衆人之性行而責在上之畢照用此日之保任而定終身之不愆熟而思之既自難矣而况員以歲限例將法繩顧惟所借之私信乃不輕之務向非富有於德業何足承蒙於品題以某甚愚於人不逮幼為待試之末藝晚得徒勞之小官方兹效蒞職之勤詎敢望當途之援不虞遭值亦預褒揚此蓋伏遇運判明公豈弟存心寬平遇物深為國簡才之念切視人如已之思茂惟采菲之仁曲成推轂之賜敢不凌兢教意循服官針庶幾尺寸之長不負髙明之舉為人謝舉知啓君子所謹莫大乎進身人臣之能尤見於知士士未嘗無而知或不至身孰不愛而進或非夫惟難能所以發則哲之慚而不謹亦以取自輕之纍賢者之論由是觀大臣之逺近先王之治所以考碩德之偽真蓋義命未盡則窮達易迷其初志尚不齊則賞拔各從其類究觀世道之既薄鮮見掄才之克明惟自逞其私心遂不符乎公議言行由是而相戾抑揚以此而多虛以宗元之俊而詒誚於叔文以房琯之器而銷聲於劉秩故奬鑒之得失繫虧全之始終深惟古今何間上下若某之鄙趨時實踈偶從祿仕之下風叨􅊩刑書之末局依明公之敏政懼不肖之瘝官蚤暮凌兢憂未逃於責察智能寡拙敢非望於提携熟知天幸之來輒預幕僚之舉以幾曠之職而免簡書之悚畏以最下之才而荷賢德之甄收恩輝甚洪物議更駭默循涯分豈乏階緣此蓋伏遇知郡郎中樂易存心寬平待下不以己長而棄人之短不以己備而責人之周譬如匠石之於山豈刋焚於朴􅈪亦類冶師之於器各順任其埏鎔故使孱頑亦邀題飾敢不激昂學植祇服官針使髙明無過舉之譏而愚陋近立身之域
