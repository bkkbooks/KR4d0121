body:
  text: 灌園集巻十八宋吕南公撰雜著書劉瑾事劉沛公當國時進士裴煜以文藝往来門下公稱愛之使子瑾與之游友好甚渥煜試南省奏名第一聲譽暴振其交瑾益謹願為姻家瑾莫逆也公之薨煜在修書局自慮可致富貴於初心頗懐去就瑾覺之而未嘗問比瑾仕稍顯而煜老蹉跎得揚州未行而疾病手書抵瑾愬窮蹙以後事為託且尋昔好其辭殊哀瑾方與客飲大醉夜半乃見煜書起歎息未五鼓而詣煜煜見瑾欷歔不自勝瑾曰勿疑矣歸遣其子往拜煜即日成婚煜遂死瑾為經理其家甚備其後瑾為淮南轉運使鄭獬舟過廣陵疾作而殆使客諷告瑾願屈使君一視我死可以目瞑瑾聞之輟食而往獬曰必死念妻息無歸非公孰能撫我瑾以盡力許之獬卒瑾悉槖買田宅鄖溪上以女妻獬子使奉母居焉瑾儒者有雄豪名於天下士論所畏而其所以存待危亡乃如此達傭述淮西達傭傳者逸其名氏傭不習書未嘗知仁義禮樂之説翳茨為居與物無競力能以所工日致百錢以給炊烹或時得羡于常則盡推贏易酒肉以歸夜同婦子宴語又自知吹鐘管間輒以度曲助嬉笑其聲隐然以為常其籬後居有富翁者或夜寢不熟厭聞之一日召傭来前語之曰吾宅室層複京窖棋峙一嵗之息計簿至積案吾生可謂優餘矣而夕夕笑樂有不暇焉汝草茅之子宛轉不越丈尺地日仰手眼者奈何資以爾樂也傭以實告翁曰然爾裁足致百錢遂得爾安必加得焉樂宜亦多者今吾貤汝以百千恣汝所營如月獻息而已傭然之取貲以去自是稍不聞管樂聲既而笑語亦稍貶旬月以往聲如窒矣富翁初怪之未及問而傭来有蹙容以狀問之則曰不主多財偶學之而慮所營失其方故甚憂已營之又苦其或亡故多勞憂勞之興始吾一已嘗之是以管不暇吹繼而家共患焉笑樂并失矣頃與婦子計以為求利於外則甚難茍得優游以終老焉人生至樂也幸彼未可知之外營而廢吾難得之内樂宜不可為然請遂歸所貤以保吾樂於是婦子相與負貲至歸訖讙呼而去東平吕某曰生非財不養然知養生而不知達生其為蔽害深矣不靈之夫厚藏廣掊譬為奴者彼亦豈能紆金褐而嚥珠飯哉通之飽暖而已矣及其墓以豐而見抇子弟以侈縱而鮮若人傾敗遂基罪戾或䧟而家破世辱矣凡以不用達故也誠知聚不足益而害有以根於以安生而率教則何破辱之有迺惑一身而復畀其後以鮮若人不祥莫甚焉達生知道至矣聞古有羲黄氏之民者其人化之而千載不作其後有列莊氏之書者其言盡之而知者不以行孰意淮西之傭而得此也世指不知書軰為愚夫豈果然哉余在桐鄉客有道傭者因誌之是為達傭述平凉夫人傳平凉淡夫人諱修小字嬋娟不知其先所自来或言其族當夏禹時已盛於林邑其支庶往往顯聞於荆揚之間曰簜曰簵皆名載帝籍嵗進其子弟待用于京師人到今稱之夫人大父叔清位宜春長其别子居餘干者曰編實生夫人夫人初生胞有紫錦紋家人異之及長翹然出其類宜春公曰吾子孫亦盛矣以今視之莫不適於用顧用有貴賤則所遇為不可知安得吾修不参於用之賤耶異時將作梁生聞宜春語以告於翰林文公以為宜配君子翰林公曰淡氏妬乎曰無之又曰淫乎曰無之公曰然吾固聞若家之富清風矣當今之時吾惡夫温柔而無節者吾熱中蓋乆生謹為我納淡氏為吾室人亟之勿緩於是將作生請於其家議以法度成之翰林愛焉常曰此吾股肱之任夫人不茍言笑平居未嘗下榻人或怪其似息媯翰林曰不然是全於順者耳上有事於南郊翰林以夫人請於朝初得封郡於平凉世皆稱曰平凉夫人自是貴豪争求配如夫人淡氏之嬪遂半天下他日緇黄之屋亦竊有之翰林太息曰嗟乎吾不早獲南郊之請險使夫人與狗配齊號且宜春公之所憚果賤於此歟夫人侍翰林常半嵗不離次必天霣霜乃退就别室其見引抑無所喜恨時以為難翰林宴休夫人必與俱其在風軒翰林醉且睡熟拶夫人墮地稍傷翰林驚起援而撫之曰怨我乎夫人曰不敢然由此不自任時時不免嚄唶翰林曰我於子乎非附炎之偶今惟不幸故取困與傷使召將作生曰夫人疾吾重勞之若為我選其姪娣之宜者以来夫人始退閒翰林猶顧憐不忘戒家人勿或妄毁嵗乆乃亡無子以火葬其後事在表文贊曰吾於平凉見守道之福焉漢氏以前文字之傳陋矣簡籍所寄淡氏之功最大然則修之享封顧不宜哉初修有兄佳靚略等而剛塞過甚故將作生以配丁氏丁氏苦家也日䝉椎斧之憂虓其頂者數矣終不蘄避其頑忍蓋如此其季弟亦轉妙然以輭薄乗於時賤與薪芻不異唯平凉在枝葉中静正豐閒作配文家虚而不詘親而不䙝榮名始終嘉愛無極嗚呼盛矣義鷹志旴南陸氏世雄於貲子弟矜玩好往往以之易學問售竒訪異以為常他日遇山夫賣猴雛取而蓄之甚馴縱其游息門内外毋復羈檢嵗乆矣猴益老意嚮類姦然猴牡猴也見婦女必跳梁悚抃如將近之陸氏患焉謀掊死之未施手而猴先驚畏登屋僻去以避禍彈石不得中人力不能追凡夜寂猴輒潛下取飲食人動則引遁無如之何㑹少年自䖍来臂俊蒼鷹陸氏之弟往從之郊視其搏攝無虚嚮因就與語薄告以猴害少年許諾為擒之即俱還據髙隅發鷹韝已發則逞逞摩空下瞰得猴處猴猶坐不動伺鷹垂近隐舉瓦以扞身鷹不能得也奮焉穿雲以逝漸眇黙不可見於是主客不知所為方相慰以壺饌未敢議所以謝少年也明日忽聞空中有鈐聲少年色動意其鷹也捨盃噦嚼疾趨昨日立處仰瞻之果鷹來也方復搏翔下擊猴仍用前計以自全鷹失攫􅸈揚翮以過後一鷹繼至猴不疑也遂中其擒少年招得所臂鷹而遂擒者委猴而去蓋少年之鷹往招之而来助者也吕南公曰羽毛之居生也縱横乎林莽之間而順適乎天地之内同而異異而同彼其鷹類非一種聚而已也何少年之所養適當攫􅸈之不勝而遂能招夫助己者耶夫以通晝夕之奔逝蓋不知經渉㡬千萬里之逺而㡬十百之羣隊彼豈有呴呴之語言沾沾之勢貌以相諷動者耶至其見助者又未必並棲共育者也而輒相從乎所末如何之害彼曽人之與耶今人生同州聚同鄉上之人防之以政刑而端良博厚之士尸其教觀其平居束冠衣媚聲氣以相翕習有謂之為無志氣行義則起不平之色亦從而恨之惟其一旦攖介患害則人人自苦也曰吾愛髪膚又曰吾力不勝也埋頭縮手背嗟而斜睨以陽託於畏慎之名此一門之内有之矣况婣族耶婣族且有此况州閭相識耶是曽二鷹之無知奚志氣行義之各得耶嗚呼人禽之所以異者形名而已矣就形名以索實吾豈敢知治平之末年余初出山延陵劉縣尉扶為余道此余耿歎焉劉君謂余盍歌之如少陵所詩鶻報虵事余辭以未能也姑志之亦書其所歎於後矜玩好者可以戒而不如鷹者可以慙及其戒且慙歟劉君與予皆幸矣是夏六月志善學説贈蔡升之善學者行身循乎故常不善學者行身俟乎顯光俟顯光者得亦失之循故常者失亦得之故常不害顯光而顯光有時害故常其理然也人之生日兩其食則不羸寒暑得其衣則不悲事父母養妻息睦其族善其鄰各視其力與資此成世以来未之有改而天下情所同冝者也是之謂故常食不止于飽而已至于備水陸之珍衣不止於暖而已至于窮女手之竒炫爵禄娶右家氣勢足以蓋州黨聲稱足以耀宗姻此成世以來未之必得而天下之情所同好者也是之謂顯光故常有義顯光有命義無所俟命不可意古之所學者勤于因義而已矣非所以先于命也茍為先命而後義則是飢寒方迫而坐湏水陸之珍女手之竒然後御耳幾何其不相率而乾楛哉于娶于養皆然幾何其不相率而滅絶哉人道之大原有所興矣不知此而言學吾不知其能學矣昔余客撫州州人有語余以周先事者云先至道咸平間進士連被鄉薦俊譽沸然先亦自負以必達或勸以娶妻治産輙怒以報之曰不晚捧桂枝出宸廷而貴人女争于東華門上結我矣何問下里人哉乆之先不復得志于科塲而俊譽日消蹉跎空屋中年五十餘鰥卧以死死之日家惟病母頭白齒缺無升布勺米自活先既死而母亦卒于餓矣此非俟顯光者乎吾鄉先生王補之弱冠已議婚是時家甚貧或怪其汲汲者補之曰堂有親水菽雖菲淡要有以奉承之或論之父前父亦曰官可無也婚時不可違其後補之起家以經術為天下宗師非循故常者乎夫先與補之其終皆命也惟其始不肯俟顯光與不肯循故常為異耳較其害不害何如哉從余游而舊者陳留蔡畋字升之其人齒壯尚未娶今乃有言曰二親皆六十矣而畋之室無婦欲娶則患貧不娶則憂失時如之何余不欲其先命而後義也作善學説遺之貧坑說送傅公濟世有貧坑其名甚古而其地日新相傳上皇之時曽未有此疑其帝鴻以後稍䧟而傾經延秦漢乍虚乍盈而莫可填坑之所在非逺非近非幽非顯謂之并包而不貯穀帛金珠謂之偏發而周匝天下皆見非廣也而無邊非深也而無底非盡焚也而長焦熬非盡淖也而長濡滯無封疆限禁而在者不容輕逸無王長嘯結而來者不悟其多無舜禹之徳化而土風自儉陋無戰國之従衡而事務自勤煩人之墮其中者輙失故態昔之辯者反啞前之勇者成怯身雖大賢而不必見尊先雖甚貴而不必見畏蓋有一人墮焉而家隨之者矣未見家墮而身獨免者也蓋有未墮而憂虞者矣未見已墮而讙欣者也是故智者蘄避而愚者以為諱為人上者懲此以勤政為人長者指此以戒禍惡之如鼠防之如虎而墮者猶紛紛而莫勝數由今而論坑之所受可謂盛矣而盛不害乎窮嗟乎天豈不仁乎奈何兆此以梏民於窮也或曰人而已矣天何預焉然則何以蘄避而有免者耶雖然已墮而終能脱去者可謂得天人之助矣頃余適墮之初正見公濟隨其父亨甫占次於其間則交參居游以數年嘗相悲矣而未知所以相安顧視圜坑之人莫非失意而各能以力僅濟於衣食唯儒其名者獨艱焉則又蹙然而推咎曰坑之山川固不利於儒乎坑之鬼神固不祐於儒乎今又其文章筆墨為之祟歟俄而亨父惛兮茫然若寢寐之回然望西以奮時則以為若人也奮而已矣今且焉徃而非坑乎未幾亨甫震其讙聲殷然若在雲表坑人驚而索之莫得見者徒覺其音辭暢亮舒愉而已於是始知亨父脫迹此坑而莫余告也皆曰亨甫賢哉謂之得助於天人不亦宜乎方是之時公濟亦軒軒西首且言貧坑之毒也吾儒謂之威極而浮屠人謂之地獄今吾父幸脫去吾家既隨之然我將佐吾父務令去之必逺無使兩耳復聞坑之呻吟以動吾心余於是而羡焉為之歌魏碩䑕之詩送之曰逝將去女適彼樂土樂土樂土爰得我所曰公濟乎勉之為我謝亨甫吾愧無以從公游然相悲之言從是息矣困蚓說時雨既休物類如醒蚓之壤潛者亦覘然而騰於垤蜿蜒以恣遊俄而造乎蟻聚之間蟻衆初為之辟易以驚已復欲有以嘗之乃追而縁其後頗覺其不能自救也則又馳而跨其顱轉噆其膚蚓不勝其侵震縮而已於是蟻徒識其果無威能也相號於穴傾老小以來環而傷之蚓困於戰跋㡬死嗟乎明不足以對物才不足以周身而恃已長以恣其所之其不困於侵侮也幸哉蚊蠅說蚊之近人童子知欲撲之為其毒之足以傷人也蠅之近人非能致毒也而以其生長之汙亦争滅之與憎蚊同嗚呼行身之曽不善也不在乎術之足以毒人茍為素所由者未免於汙則亦足以害其身而已矣忠戒余館鄭氏書堂一年其朝夕飱饔之所陳殘賸滓沾擲狼戾鄰之尨日遊索焉舍而安之無復知故主者堂之僮逐之不為沮其家呼之不為聞也夜尚卧堂間妥妥甚安異人至則起而迎吠不待嗾遣嗟乎食之移情乃至於此彼豈以為忠適然歟余於是而有感蓋古之所謂忠者必由其道忠於非所宜忠何道之云阿衡不幸而五去五就後世翻覆憸人更援之以濟其幸視一己之利害而定其趨捨不顧社稷民人之存亡也而曰視天而已且天安肯命人為翻覆自利者乎余以為由余陳平之迹恕於亂世可也用盛王之法裁之則有所不免傷人臣之有已而無君感厖事作忠戒
